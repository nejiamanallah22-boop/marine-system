<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام إدارة الأسطول البحري - النسخة الكاملة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cairo', 'Segoe UI', Tahoma, sans-serif; background: linear-gradient(135deg, #0f3460, #16213e); min-height: 100vh; padding: 20px; }
        
        /* شاشة الدخول */
        .login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #0f3460, #16213e); display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .login-card { background: white; padding: 40px; border-radius: 20px; width: 380px; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .login-card h2 { color: #0f3460; margin: 15px 0; }
        .login-card input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; }
        .login-card button { width: 100%; padding: 12px; background: #0f3460; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; }
        .login-card button:hover { background: #1a4a7a; }
        
        /* التطبيق الرئيسي */
        .app-container { max-width: 1400px; margin: auto; background: white; border-radius: 20px; padding: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
        .hidden { display: none !important; }
        
        /* الهيدر */
        .header { background: linear-gradient(135deg, #0f3460, #1a4a7a); color: white; padding: 20px; border-radius: 15px; margin-bottom: 20px; }
        .header h1 { text-align: center; }
        .user-bar { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.2); }
        .user-bar span { background: rgba(255,255,255,0.2); padding: 5px 15px; border-radius: 20px; }
        
        /* أزرار التنقل */
        .nav-buttons { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; flex-wrap: wrap; }
        .nav-btn { padding: 10px 20px; border: none; border-radius: 25px; cursor: pointer; background: #f0f2f5; font-weight: bold; transition: 0.3s; }
        .nav-btn:hover { background: #0f3460; color: white; transform: translateY(-2px); }
        .nav-btn.primary { background: #0f3460; color: white; }
        .nav-btn.warning { background: #f39c12; color: white; }
        .nav-btn.success { background: #27ae60; color: white; }
        .nav-btn.danger { background: #e74c3c; color: white; }
        .nav-btn.purple { background: #8e44ad; color: white; }
        
        /* نموذج الإدخال */
        .form-area { background: #f8f9fa; padding: 20px; border-radius: 15px; margin-bottom: 20px; display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; }
        .form-area input, .form-area select { padding: 10px; border: 1px solid #ddd; border-radius: 8px; }
        
        /* شريط الفلتر */
        .filter-bar { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
        .filter-bar input, .filter-bar select { padding: 10px; border: 1px solid #ddd; border-radius: 8px; flex: 1; min-width: 150px; }
        
        /* الجداول */
        .table-container { overflow-x: auto; max-height: 500px; overflow-y: auto; border: 1px solid #ddd; border-radius: 10px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: center; border-bottom: 1px solid #ddd; }
        th { background: #0f3460; color: white; position: sticky; top: 0; }
        tr:hover { background: #f5f5f5; }
        
        /* الألوان حسب الحالة */
        .status-good { color: #27ae60; font-weight: bold; }
        .status-bad { color: #e74c3c; font-weight: bold; }
        .status-maint { color: #f39c12; font-weight: bold; }
        
        /* البطاقات الإحصائية */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .stat-card { background: linear-gradient(135deg, #667eea, #764ba2); color: white; padding: 15px; border-radius: 15px; text-align: center; cursor: pointer; }
        .stat-card .number { font-size: 32px; font-weight: bold; }
        
        /* جداول الأقاليم */
        .region-card { background: #f8f9fa; border-radius: 15px; margin-bottom: 15px; overflow: hidden; }
        .region-header { background: #0f3460; color: white; padding: 12px; font-weight: bold; }
        .high-eff { background-color: #d4edda; }
        .mid-eff { background-color: #fff3cd; }
        .low-eff { background-color: #f8d7da; }
        
        /* الأزرار */
        .btn-save { background: #27ae60; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; }
        .btn-edit { background: #f39c12; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; margin: 2px; }
        .btn-delete { background: #e74c3c; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; margin: 2px; }
        .btn-blue { background: #3498db; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; }
        .btn-red { background: #e74c3c; color: white; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; }
        
        /* التنبيهات */
        .toast { position: fixed; bottom: 20px; right: 20px; background: #27ae60; color: white; padding: 12px 24px; border-radius: 10px; z-index: 10000; animation: fadeOut 3s ease forwards; }
        @keyframes fadeOut { 0% { opacity: 1; } 70% { opacity: 1; } 100% { opacity: 0; visibility: hidden; } }
        
        @media (max-width: 768px) { body { padding: 10px; } .form-area { grid-template-columns: 1fr; } .nav-btn { padding: 8px 12px; font-size: 12px; } th, td { padding: 8px; font-size: 12px; } }
    </style>
</head>
<body>

<!-- شاشة الدخول -->
<div id="loginScreen" class="login-screen">
    <div class="login-card">
        <i class="fas fa-ship" style="font-size: 50px; color: #0f3460;"></i>
        <h2>⚓ نظام إدارة الأسطول البحري</h2>
        <input type="text" id="loginUser" placeholder="اسم المستخدم">
        <input type="password" id="loginPass" placeholder="كلمة المرور">
        <button id="loginBtn">دخول <i class="fas fa-sign-in-alt"></i></button>
        <div id="loginError" style="color: red; margin-top: 10px;"></div>
    </div>
</div>

<!-- التطبيق الرئيسي -->
<div id="mainApp" class="app-container" style="display: none;">
    <!-- الهيدر -->
    <div class="header">
        <h1><i class="fas fa-anchor"></i> منظومة متابعة الوسائل البحرية <i class="fas fa-ship"></i></h1>
        <div class="user-bar">
            <span id="userInfo"><i class="fas fa-user-shield"></i> مستخدم</span>
            <button id="logoutBtn" class="btn-red"><i class="fas fa-sign-out-alt"></i> خروج</button>
        </div>
    </div>

    <!-- أزرار التنقل -->
    <div class="nav-buttons">
        <button class="nav-btn primary" id="navMain">📋 السجل العام</button>
        <button class="nav-btn warning" id="navMaint">🔧 سجل الصيانة</button>
        <button class="nav-btn success" id="navStats">📊 جاهزية الأسطول</button>
        <button class="nav-btn" id="navSupport">💬 الدعم الفني</button>
        <button class="nav-btn purple" id="navTrack" style="display: none;">📜 تتبع المستخدمين</button>
        <button class="nav-btn danger" id="navUsers" style="display: none;">👥 إدارة المستخدمين</button>
        <button class="nav-btn" onclick="window.print()">🖨️ طباعة</button>
    </div>

    <!-- نموذج الإدخال -->
    <div id="formArea" class="form-area">
        <input type="text" id="vName" placeholder="اسم المركب">
        <input type="text" id="vNumber" placeholder="الرقم">
        <input type="number" id="vLength" placeholder="الطول (م)">
        <select id="vRegion" onchange="updateZones()">
            <option value="">الإقليم</option>
            <option value="الشمال">الشمال</option>
            <option value="الساحل">الساحل</option>
            <option value="الوسط">الوسط</option>
            <option value="الجنوب">الجنوب</option>
        </select>
        <select id="vZone"><option value="">المنطقة</option></select>
        <input type="text" id="vPort" placeholder="الميناء">
        <select id="vStatus">
            <option value="صالح">صالح</option>
            <option value="معطب">معطب</option>
            <option value="صيانة">صيانة</option>
        </select>
        <input type="text" id="vBreakdown" placeholder="نوع العطب">
        <input type="date" id="vDate">
        <button class="btn-save" id="saveBtn"><i class="fas fa-save"></i> حفظ</button>
        <button class="btn-blue" id="clearBtn"><i class="fas fa-undo"></i> جديد</button>
    </div>

    <!-- صفحة السجل العام -->
    <div id="pageMain">
        <div class="filter-bar">
            <input type="text" id="searchMain" placeholder="🔍 بحث..." onkeyup="loadVessels()">
            <select id="filterCat" onchange="loadVessels()"><option value="الكل">كل الفئات</option></select>
            <select id="filterReg" onchange="loadVessels()"><option value="الكل">كل الأقاليم</option></select>
            <button class="btn-blue" id="refreshMainBtn"><i class="fas fa-sync-alt"></i> تحديث</button>
        </div>
        <div class="table-container">
            <table id="mainTable">
                <thead><tr><th>الاسم</th><th>الرقم</th><th>الطول</th><th>الفئة</th><th>الإقليم</th><th>المنطقة</th><th>الميناء</th><th>الحالة</th><th>العطب</th><th>التاريخ</th><th>إجراء</th></tr></thead>
                <tbody id="mainBody"></tbody>
            </table>
        </div>
    </div>

    <!-- صفحة سجل الصيانة -->
    <div id="pageMaint" class="hidden">
        <div class="filter-bar">
            <input type="text" id="searchMaint" placeholder="🔍 بحث..." onkeyup="loadMaint()">
            <select id="filterMaintReg" onchange="loadMaint()"><option value="الكل">كل الأقاليم</option></select>
            <input type="date" id="dateFrom" placeholder="من تاريخ" onchange="loadMaint()">
            <input type="date" id="dateTo" placeholder="إلى تاريخ" onchange="loadMaint()">
            <button class="btn-blue" id="resetMaintBtn">إعادة ضبط</button>
        </div>
        <div class="table-container">
            <table><thead><tr><th>الاسم</th><th>الإقليم</th><th>الحالة</th><th>العطب</th><th>التاريخ</th></tr></thead><tbody id="maintBody"></tbody></table>
        </div>
    </div>

    <!-- صفحة جاهزية الأسطول -->
    <div id="pageStats" class="hidden">
        <div class="filter-bar">
            <select id="filterRegionStats" onchange="renderStats()"><option value="الكل">الكل</option><option value="الشمال">الشمال</option><option value="الساحل">الساحل</option><option value="الوسط">الوسط</option><option value="الجنوب">الجنوب</option></select>
            <button class="btn-blue" id="refreshStatsBtn"><i class="fas fa-sync-alt"></i> تحديث</button>
        </div>
        <div id="statsContent"></div>
    </div>

    <!-- صفحة الدعم الفني -->
    <div id="pageSupport" class="hidden">
        <div class="form-area" style="grid-template-columns: 1fr;">
            <input type="text" id="ticketTitle" placeholder="عنوان التذكرة">
            <textarea id="ticketMsg" rows="4" placeholder="الرسالة..."></textarea>
            <button class="btn-save" id="sendTicketBtn">إرسال تذكرة</button>
        </div>
        <div id="ticketsList"></div>
    </div>

    <!-- صفحة تتبع المستخدمين -->
    <div id="pageTrack" class="hidden">
        <div class="filter-bar">
            <input type="date" id="trackStart" onchange="loadLogs()">
            <input type="date" id="trackEnd" onchange="loadLogs()">
            <button class="btn-blue" id="resetTrackBtn">إعادة ضبط</button>
        </div>
        <div class="table-container"><table><thead><tr><th>التاريخ</th><th>الوقت</th><th>المستخدم</th><th>الإجراء</th><th>التفاصيل</th></tr></thead><tbody id="trackBody"></tbody></table></div>
    </div>

    <!-- صفحة إدارة المستخدمين -->
    <div id="pageUsers" class="hidden">
        <div class="form-area">
            <input type="text" id="newUser" placeholder="اسم المستخدم">
            <input type="password" id="newPass" placeholder="كلمة المرور">
            <select id="newRole"><option value="مشاهد">مشاهد</option><option value="محرر">محرر</option><option value="مسؤول">مسؤول</option></select>
            <button class="btn-save" id="addUserBtn">إضافة مستخدم</button>
        </div>
        <div class="table-container"><table><thead><tr><th>المستخدم</th><th>الصلاحية</th><th>الحالة</th><th>تغيير كلمة المرور</th><th>حذف</th></tr></thead><tbody id="usersBody"></tbody></table></div>
    </div>
</div>

<script>
// ==================== البيانات ====================
let currentUser = null;
let vessels = [];
let users = [];
let logs = [];
let tickets = [];
let editId = null;
let selectedUserId = null;

const ZONES = { "الشمال": ["تونس", "بنزرت", "طبرقة"], "الساحل": ["سوسة", "المنستير", "نابل"], "الوسط": ["صفاقس", "المهدية", "قرقنة"], "الجنوب": ["جرجيس", "جربة", "قابس"] };
const CATEGORIES = ["البروق", "صقور", "خوافر", "زوارق مزدوجة", "طوافات"];

// ==================== دوال مساعدة ====================
function showToast(msg, isError = false) {
    let toast = document.createElement('div');
    toast.className = 'toast';
    toast.style.background = isError ? '#e74c3c' : '#27ae60';
    toast.innerHTML = msg;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
}

function getCategory(length) {
    let l = parseFloat(length);
    if (l === 11) return "البروق";
    if (l >= 8 && l <= 12) return "صقور";
    if (l > 12 && l <= 25) return "خوافر";
    if (l >= 30) return "طوافات";
    return "زوارق مزدوجة";
}

function canEdit() { return currentUser && (currentUser.role === "مسؤول" || currentUser.role === "محرر"); }
function canDelete() { return currentUser && currentUser.role === "مسؤول"; }
function canManageUsers() { return currentUser && currentUser.role === "مسؤول"; }

function updateZones() {
    let reg = document.getElementById('vRegion').value;
    let zoneSel = document.getElementById('vZone');
    zoneSel.innerHTML = '<option value="">المنطقة</option>';
    if (ZONES[reg]) ZONES[reg].forEach(z => zoneSel.innerHTML += `<option value="${z}">${z}</option>`);
}

function addLog(action, details) {
    if (!currentUser) return;
    let now = new Date();
    logs.unshift({
        id: Date.now(),
        date: now.toLocaleDateString('ar-TN'),
        time: now.toLocaleTimeString('ar-TN'),
        username: currentUser.username,
        role: currentUser.role,
        action: action,
        details: details
    });
    if (logs.length > 500) logs.pop();
    localStorage.setItem('logs', JSON.stringify(logs));
}

// ==================== تهيئة البيانات ====================
function initData() {
    if (!localStorage.getItem('vessels')) {
        vessels = [
            { id: 1, name: "البروق-1", number: "B001", length: 11, category: "البروق", region: "الشمال", zone: "تونس", port: "تونس", status: "صالح", breakdown: "", date: "" },
            { id: 2, name: "صقر-1", number: "S001", length: 10, category: "صقور", region: "الساحل", zone: "سوسة", port: "سوسة", status: "صالح", breakdown: "", date: "" },
            { id: 3, name: "خوفة-1", number: "K001", length: 20, category: "خوافر", region: "الوسط", zone: "صفاقس", port: "صفاقس", status: "معطب", breakdown: "محرك", date: "2024-01-15" },
            { id: 4, name: "زورق-1", number: "Z001", length: 15, category: "زوارق مزدوجة", region: "الجنوب", zone: "جربة", port: "جربة", status: "صيانة", breakdown: "كهرباء", date: "2024-01-20" }
        ];
        localStorage.setItem('vessels', JSON.stringify(vessels));
    } else { vessels = JSON.parse(localStorage.getItem('vessels')); }

    if (!localStorage.getItem('users')) {
        users = [
            { id: 1, username: "admin", password: "admin123", role: "مسؤول", enabled: true },
            { id: 2, username: "editor", password: "editor123", role: "محرر", enabled: true },
            { id: 3, username: "viewer", password: "viewer123", role: "مشاهد", enabled: true }
        ];
        localStorage.setItem('users', JSON.stringify(users));
    } else { users = JSON.parse(localStorage.getItem('users')); }

    if (!localStorage.getItem('logs')) { logs = []; localStorage.setItem('logs', JSON.stringify(logs)); } 
    else { logs = JSON.parse(localStorage.getItem('logs')); }

    if (!localStorage.getItem('tickets')) { tickets = []; localStorage.setItem('tickets', JSON.stringify(tickets)); } 
    else { tickets = JSON.parse(localStorage.getItem('tickets')); }
}

function saveAll() {
    localStorage.setItem('vessels', JSON.stringify(vessels));
    localStorage.setItem('users', JSON.stringify(users));
    localStorage.setItem('tickets', JSON.stringify(tickets));
}

// ==================== تسجيل الدخول ====================
document.getElementById('loginBtn').onclick = function() {
    let username = document.getElementById('loginUser').value.trim();
    let password = document.getElementById('loginPass').value.trim();
    let user = users.find(u => u.username === username && u.password === password && u.enabled === true);
    
    if (user) {
        currentUser = user;
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('mainApp').style.display = 'block';
        document.getElementById('userInfo').innerHTML = `<i class="fas fa-user-shield"></i> ${user.username} | ${user.role}`;
        
        let isAdmin = user.role === "مسؤول";
        let isViewer = user.role === "مشاهد";
        
        document.getElementById('navTrack').style.display = isAdmin ? 'inline-block' : 'none';
        document.getElementById('navUsers').style.display = isAdmin ? 'inline-block' : 'none';
        document.getElementById('formArea').style.display = isViewer ? 'none' : 'grid';
        
        // تعبئة القوائم
        let filterCat = document.getElementById('filterCat');
        filterCat.innerHTML = '<option value="الكل">كل الفئات</option>';
        CATEGORIES.forEach(c => filterCat.innerHTML += `<option value="${c}">${c}</option>`);
        
        let filterReg = document.getElementById('filterReg');
        filterReg.innerHTML = '<option value="الكل">كل الأقاليم</option>';
        Object.keys(ZONES).forEach(r => filterReg.innerHTML += `<option value="${r}">${r}</option>`);
        
        let filterMaintReg = document.getElementById('filterMaintReg');
        filterMaintReg.innerHTML = '<option value="الكل">كل الأقاليم</option>';
        Object.keys(ZONES).forEach(r => filterMaintReg.innerHTML += `<option value="${r}">${r}</option>`);
        
        let filterRegionStats = document.getElementById('filterRegionStats');
        filterRegionStats.innerHTML = '<option value="الكل">الكل</option><option value="الشمال">الشمال</option><option value="الساحل">الساحل</option><option value="الوسط">الوسط</option><option value="الجنوب">الجنوب</option>';
        
        document.getElementById('vRegion').addEventListener('change', updateZones);
        
        loadVessels();
        loadTickets();
        if (isAdmin) loadUsers();
        if (isAdmin) loadLogs();
        
        addLog("تسجيل دخول", `قام المستخدم ${username} بتسجيل الدخول`);
        showToast(`مرحباً ${username}`);
    } else {
        document.getElementById('loginError').innerHTML = 'اسم المستخدم أو كلمة المرور غير صحيحة';
    }
};

// ==================== زر الخروج (يعمل 100%) ====================
document.getElementById('logoutBtn').onclick = function() {
    if (confirm('هل أنت متأكد من تسجيل الخروج؟')) {
        if (currentUser) addLog("تسجيل خروج", `قام المستخدم ${currentUser.username} بتسجيل الخروج`);
        currentUser = null;
        editId = null;
        document.getElementById('mainApp').style.display = 'none';
        document.getElementById('loginScreen').style.display = 'flex';
        document.getElementById('loginUser').value = '';
        document.getElementById('loginPass').value = '';
        document.getElementById('loginError').innerHTML = '';
        showToast("تم تسجيل الخروج بنجاح");
    }
};

// ==================== إدارة المراكب ====================
function saveVessel() {
    if (!canEdit()) { showToast("ليس لديك صلاحية!", true); return; }
    let name = document.getElementById('vName').value.trim();
    if (!name) { showToast("الاسم مطلوب", true); return; }
    
    let vessel = {
        id: editId || Date.now(),
        name: name,
        number: document.getElementById('vNumber').value,
        length: parseFloat(document.getElementById('vLength').value) || 0,
        category: getCategory(document.getElementById('vLength').value),
        region: document.getElementById('vRegion').value,
        zone: document.getElementById('vZone').value,
        port: document.getElementById('vPort').value,
        status: document.getElementById('vStatus').value,
        breakdown: document.getElementById('vBreakdown').value,
        date: document.getElementById('vDate').value
    };
    
    if (editId) {
        let index = vessels.findIndex(v => v.id === editId);
        if (index !== -1) vessels[index] = vessel;
        addLog("تعديل مركب", `تم تعديل المركب "${name}"`);
        showToast("تم التحديث");
    } else {
        vessels.push(vessel);
        addLog("إضافة مركب", `تم إضافة المركب "${name}"`);
        showToast("تم الإضافة");
    }
    saveAll();
    clearForm();
    loadVessels();
}

function editVessel(id) {
    if (!canEdit()) { showToast("ليس لديك صلاحية!", true); return; }
    let v = vessels.find(v => v.id === id);
    if (v) {
        editId = id;
        document.getElementById('vName').value = v.name;
        document.getElementById('vNumber').value = v.number;
        document.getElementById('vLength').value = v.length;
        document.getElementById('vRegion').value = v.region;
        updateZones();
        setTimeout(() => document.getElementById('vZone').value = v.zone, 50);
        document.getElementById('vPort').value = v.port;
        document.getElementById('vStatus').value = v.status;
        document.getElementById('vBreakdown').value = v.breakdown;
        document.getElementById('vDate').value = v.date;
        window.scrollTo(0, 0);
        showToast("قم بالتعديل ثم اضغط حفظ");
    }
}

function deleteVessel(id) {
    if (!canDelete()) { showToast("ليس لديك صلاحية للحذف!", true); return; }
    let vessel = vessels.find(v => v.id === id);
    if (confirm(`هل أنت متأكد من حذف "${vessel?.name}"؟`)) {
        vessels = vessels.filter(v => v.id !== id);
        saveAll();
        addLog("حذف مركب", `تم حذف المركب "${vessel?.name}"`);
        loadVessels();
        showToast("تم الحذف");
    }
}

function clearForm() {
    editId = null;
    document.getElementById('vName').value = '';
    document.getElementById('vNumber').value = '';
    document.getElementById('vLength').value = '';
    document.getElementById('vRegion').value = '';
    document.getElementById('vZone').innerHTML = '<option value="">المنطقة</option>';
    document.getElementById('vPort').value = '';
    document.getElementById('vStatus').value = 'صالح';
    document.getElementById('vBreakdown').value = '';
    document.getElementById('vDate').value = '';
}

document.getElementById('saveBtn').onclick = saveVessel;
document.getElementById('clearBtn').onclick = clearForm;

// ==================== عرض البيانات ====================
function loadVessels() {
    let search = document.getElementById('searchMain').value.toLowerCase();
    let filterCat = document.getElementById('filterCat').value;
    let filterReg = document.getElementById('filterReg').value;
    
    let filtered = vessels.filter(v => {
        if (filterCat !== 'الكل' && v.category !== filterCat) return false;
        if (filterReg !== 'الكل' && v.region !== filterReg) return false;
        if (search && !v.name.toLowerCase().includes(search) && !v.number.toLowerCase().includes(search)) return false;
        return true;
    });
    
    let html = '';
    filtered.forEach(v => {
        let statusClass = v.status === 'صالح' ? 'status-good' : (v.status === 'معطب' ? 'status-bad' : 'status-maint');
        html += `<tr>
            <td>${v.name}${editId === v.id ? ' ✏️' : ''}</td>
            <td>${v.number || '-'}</td>
            <td>${v.length || '-'}</td>
            <td>${v.category || '-'}</td>
            <td>${v.region || '-'}</td>
            <td>${v.zone || '-'}</td>
            <td>${v.port || '-'}</td>
            <td class="${statusClass}">${v.status}</td>
            <td>${v.breakdown || '-'}</td>
            <td>${v.date || '-'}</td>
            <td>
                ${canEdit() ? `<button class="btn-edit" onclick="editVessel(${v.id})"><i class="fas fa-edit"></i></button>` : ''}
                ${canDelete() ? `<button class="btn-delete" onclick="deleteVessel(${v.id})"><i class="fas fa-trash"></i></button>` : ''}
            </td>
        </tr>`;
    });
    document.getElementById('mainBody').innerHTML = html || '<tr><td colspan="11">لا توجد بيانات</td></tr>';
    renderStats();
}

function loadMaint() {
    let search = document.getElementById('searchMaint').value.toLowerCase();
    let filterReg = document.getElementById('filterMaintReg').value;
    let dateFrom = document.getElementById('dateFrom').value;
    let dateTo = document.getElementById('dateTo').value;
    
    let filtered = vessels.filter(v => v.status === 'معطب' || v.status === 'صيانة');
    if (filterReg !== 'الكل') filtered = filtered.filter(v => v.region === filterReg);
    if (dateFrom) filtered = filtered.filter(v => v.date && v.date >= dateFrom);
    if (dateTo) filtered = filtered.filter(v => v.date && v.date <= dateTo);
    if (search) filtered = filtered.filter(v => v.name.toLowerCase().includes(search));
    
    let html = '';
    filtered.forEach(v => {
        let statusClass = v.status === 'صالح' ? 'status-good' : (v.status === 'معطب' ? 'status-bad' : 'status-maint');
        html += `<tr>
            <td>${v.name}</td>
            <td>${v.region || '-'}</td>
            <td class="${statusClass}">${v.status}</td>
            <td>${v.breakdown || '-'}</td>
            <td>${v.date || '-'}</td>
        </tr>`;
    });
    document.getElementById('maintBody').innerHTML = html || '<tr><td colspan="5">لا توجد مراكب معطوبة</td></tr>';
}

function renderStats() {
    let total = vessels.length;
    let good = vessels.filter(v => v.status === 'صالح').length;
    let broken = vessels.filter(v => v.status === 'معطب').length;
    let maint = vessels.filter(v => v.status === 'صيانة').length;
    let efficiency = total ? ((good / total) * 100).toFixed(1) : 0;
    
    let html = `<div class="stats-grid">
        <div class="stat-card"><div class="number">${total}</div><div>إجمالي المراكب</div></div>
        <div class="stat-card"><div class="number">${good}</div><div>✅ صالح</div></div>
        <div class="stat-card"><div class="number">${maint}</div><div>🔧 صيانة</div></div>
        <div class="stat-card"><div class="number">${broken}</div><div>⚠️ معطب</div></div>
        <div class="stat-card"><div class="number">${efficiency}%</div><div>📈 الجاهزية</div></div>
    </div>`;
    
    let selectedRegion = document.getElementById('filterRegionStats').value;
    let regionsToShow = selectedRegion === 'الكل' ? ['الشمال', 'الساحل', 'الوسط', 'الجنوب'] : [selectedRegion];
    
    regionsToShow.forEach(region => {
        let regData = vessels.filter(v => v.region === region);
        let regTotal = regData.length;
        let regGood = regData.filter(v => v.status === 'صالح').length;
        let regEff = regTotal ? ((regGood / regTotal) * 100).toFixed(1) : 0;
        
        html += `<div class="region-card">
            <div class="region-header">📍 إقليم ${region} - الجاهزية: ${regEff}% (${regGood}/${regTotal})</div>
            <div style="padding: 10px;"><table style="width:100%"><thead><tr><th>الفئة</th><th>عدد الصالح</th><th>عدد المعطوب</th><th>نسبة النجاعة</th></tr></thead><tbody>`;
        
        CATEGORIES.forEach(cat => {
            let catData = regData.filter(v => v.category === cat);
            let ok = catData.filter(v => v.status === 'صالح').length;
            let br = catData.length - ok;
            let pct = catData.length ? ((ok / catData.length) * 100).toFixed(1) : 0;
            let rowClass = pct >= 80 ? 'high-eff' : (pct >= 50 ? 'mid-eff' : 'low-eff');
            html += `<tr class="${rowClass}"><td>${cat}</td><td style="color:green">${ok}</td><td style="color:red">${br}</td><td><strong>${pct}%</strong></td></tr>`;
        });
        html += `</tbody></table></div></div>`;
    });
    document.getElementById('statsContent').innerHTML = html;
}

// ==================== التذاكر ====================
function loadTickets() {
    let userTickets = tickets.filter(t => t.username === currentUser.username);
    let html = '<div class="table-container"><table><thead><tr><th>التاريخ</th><th>العنوان</th><th>الحالة</th></tr></thead><tbody>';
    if (userTickets.length === 0) html += '<tr><td colspan="3">لا توجد تذاكر</td></tr>';
    else userTickets.forEach(t => html += `<tr><td>${t.date}</td><td>${t.title}</td><td>${t.status}</td></tr>`);
    html += '</tbody></table></div>';
    document.getElementById('ticketsList').innerHTML = html;
}

function sendTicket() {
    let title = document.getElementById('ticketTitle').value.trim();
    let msg = document.getElementById('ticketMsg').value.trim();
    if (!title || !msg) { showToast("يرجى إدخال عنوان ورسالة", true); return; }
    tickets.push({
        id: Date.now(),
        date: new Date().toLocaleDateString('ar-TN'),
        username: currentUser.username,
        title: title,
        message: msg,
        status: 'قيد المعالجة'
    });
    saveAll();
    addLog("إرسال تذكرة", `تم إرسال تذكرة: "${title}"`);
    document.getElementById('ticketTitle').value = '';
    document.getElementById('ticketMsg').value = '';
    loadTickets();
    showToast("تم إرسال التذكرة");
}

document.getElementById('sendTicketBtn').onclick = sendTicket;

// ==================== السجلات ====================
function loadLogs() {
    if (!canManageUsers()) return;
    let start = document.getElementById('trackStart').value;
    let end = document.getElementById('trackEnd').value;
    let filtered = [...logs];
    if (start) filtered = filtered.filter(l => l.date && l.date.split('/').reverse().join('-') >= start);
    if (end) filtered = filtered.filter(l => l.date && l.date.split('/').reverse().join('-') <= end);
    let html = '';
    filtered.forEach(l => html += `<tr><td>${l.date || '-'}</td><td>${l.time || '-'}</td><td>${l.username || '-'}</td><td>${l.action || '-'}</td><td>${l.details || '-'}</td></tr>`);
    document.getElementById('trackBody').innerHTML = html || '<td><td colspan="5">لا توجد نشاطات</td></tr>';
}

document.getElementById('resetTrackBtn').onclick = function() {
    document.getElementById('trackStart').value = '';
    document.getElementById('trackEnd').value = '';
    loadLogs();
};

// ==================== المستخدمين ====================
function loadUsers() {
    if (!canManageUsers()) return;
    let html = '';
    users.forEach(u => {
        html += `<tr>
            <td>${u.username}</td>
            <td>${u.role}</td>
            <td class="${u.enabled ? 'status-good' : 'status-bad'}">${u.enabled ? 'مفعل' : 'معطل'}</td>
            <td><button class="btn-edit" onclick="openPassModal(${u.id}, '${u.username}')">تغيير</button></td>
            <td>${currentUser.id !== u.id ? `<button class="btn-delete" onclick="deleteUser(${u.id})">حذف</button>` : '-'}</td>
        </tr>`;
    });
    document.getElementById('usersBody').innerHTML = html;
}

function addUser() {
    if (!canManageUsers()) { showToast("ليس لديك صلاحية!", true); return; }
    let username = document.getElementById('newUser').value.trim();
    let password = document.getElementById('newPass').value.trim();
    let role = document.getElementById('newRole').value;
    if (!username || !password) { showToast("يرجى إدخال اسم وكلمة مرور", true); return; }
    if (users.find(u => u.username === username)) { showToast("المستخدم موجود", true); return; }
    users.push({ id: Date.now(), username, password, role, enabled: true });
    saveAll();
    addLog("إدارة مستخدمين", `تم إضافة مستخدم جديد: "${username}"`);
    document.getElementById('newUser').value = '';
    document.getElementById('newPass').value = '';
    loadUsers();
    showToast("تم إضافة المستخدم");
}

function openPassModal(userId, userName) {
    selectedUserId = userId;
    let newPass = prompt(`تغيير كلمة المرور للمستخدم: ${userName}\nكلمة المرور الجديدة:`);
    if (newPass && newPass.length >= 4) {
        let user = users.find(u => u.id === userId);
        if (user) user.password = newPass;
        saveAll();
        addLog("إدارة مستخدمين", `تم تغيير كلمة مرور المستخدم "${userName}"`);
        loadUsers();
        showToast("تم تغيير كلمة المرور");
    } else if (newPass) {
        showToast("كلمة المرور 4 أحرف على الأقل", true);
    }
}

function deleteUser(userId) {
    if (confirm("هل أنت متأكد من الحذف؟")) {
        let user = users.find(u => u.id === userId);
        users = users.filter(u => u.id !== userId);
        saveAll();
        addLog("إدارة مستخدمين", `تم حذف المستخدم "${user?.username}"`);
        loadUsers();
        showToast("تم حذف المستخدم");
    }
}

document.getElementById('addUserBtn').onclick = addUser;

// ==================== أزرار التحديث ====================
document.getElementById('refreshMainBtn').onclick = function() { loadVessels(); showToast("تم تحديث السجل العام"); };
document.getElementById('refreshStatsBtn').onclick = function() { renderStats(); showToast("تم تحديث الإحصائيات"); };
document.getElementById('resetMaintBtn').onclick = function() {
    document.getElementById('searchMaint').value = '';
    document.getElementById('filterMaintReg').value = 'الكل';
    document.getElementById('dateFrom').value = '';
    document.getElementById('dateTo').value = '';
    loadMaint();
    showToast("تم إعادة ضبط الفلاتر");
};

// ==================== التنقل بين الصفحات ====================
function showPage(page) {
    document.getElementById('pageMain').classList.add('hidden');
    document.getElementById('pageMaint').classList.add('hidden');
    document.getElementById('pageStats').classList.add('hidden');
    document.getElementById('pageSupport').classList.add('hidden');
    document.getElementById('pageTrack').classList.add('hidden');
    document.getElementById('pageUsers').classList.add('hidden');
    document.getElementById(`page${page}`).classList.remove('hidden');
    if (page === 'Maint') loadMaint();
    if (page === 'Stats') renderStats();
    if (page === 'Support') loadTickets();
    if (page === 'Track') loadLogs();
    if (page === 'Users') loadUsers();
}

document.getElementById('navMain').onclick = () => showPage('Main');
document.getElementById('navMaint').onclick = () => showPage('Maint');
document.getElementById('navStats').onclick = () => showPage('Stats');
document.getElementById('navSupport').onclick = () => showPage('Support');
document.getElementById('navTrack').onclick = () => showPage('Track');
document.getElementById('navUsers').onclick = () => showPage('Users');

// ==================== التشغيل ====================
initData();
document.getElementById('vRegion').addEventListener('change', updateZones);
</script>
