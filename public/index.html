<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام إدارة الأسطول البحري</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cairo', Tahoma, sans-serif; background: linear-gradient(135deg, #0f3460, #16213e); min-height: 100vh; padding: 20px; }
        .login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #0f3460, #16213e); display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .login-card { background: white; padding: 40px; border-radius: 20px; width: 380px; text-align: center; }
        .login-card input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; }
        .login-card button { width: 100%; padding: 12px; background: #0f3460; color: white; border: none; border-radius: 8px; cursor: pointer; }
        .app-container { max-width: 1400px; margin: auto; background: white; border-radius: 20px; padding: 20px; }
        .hidden { display: none !important; }
        .header { background: linear-gradient(135deg, #0f3460, #1a4a7a); color: white; padding: 20px; border-radius: 15px; margin-bottom: 20px; text-align: center; }
        .nav-buttons { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; flex-wrap: wrap; }
        .nav-btn { padding: 10px 20px; border: none; border-radius: 25px; cursor: pointer; background: #f0f2f5; font-weight: bold; }
        .nav-btn:hover { background: #0f3460; color: white; }
        .form-area { background: #f8f9fa; padding: 20px; border-radius: 15px; margin-bottom: 20px; display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; }
        .form-area input, .form-area select { padding: 10px; border: 1px solid #ddd; border-radius: 8px; }
        .filter-bar { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .filter-bar input, .filter-bar select { padding: 10px; border: 1px solid #ddd; border-radius: 8px; flex: 1; }
        .table-container { overflow-x: auto; max-height: 500px; overflow-y: auto; border: 1px solid #eee; border-radius: 10px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: center; border-bottom: 1px solid #eee; }
        th { background: #0f3460; color: white; position: sticky; top: 0; }
        .status-good { color: #27ae60; font-weight: bold; }
        .status-bad { color: #e74c3c; font-weight: bold; }
        .status-maint { color: #f39c12; font-weight: bold; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .stat-card { background: linear-gradient(135deg, #667eea, #764ba2); color: white; padding: 15px; border-radius: 15px; text-align: center; cursor: pointer; }
        .stat-card .number { font-size: 28px; font-weight: bold; }
        .btn-save { background: #27ae60; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; }
        .btn-edit { background: #f39c12; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; margin: 2px; }
        .btn-delete { background: #e74c3c; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; margin: 2px; }
        .btn-blue { background: #3498db; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; }
        .toast { position: fixed; bottom: 20px; right: 20px; background: #27ae60; color: white; padding: 12px 24px; border-radius: 10px; z-index: 10000; animation: fadeOut 3s ease forwards; }
        @keyframes fadeOut { 0% { opacity: 1; } 70% { opacity: 1; } 100% { opacity: 0; visibility: hidden; } }
        @media (max-width: 768px) { body { padding: 10px; } .form-area { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<!-- شاشة الدخول -->
<div id="loginScreen" class="login-screen">
    <div class="login-card">
        <i class="fas fa-ship" style="font-size: 50px; color: #0f3460;"></i>
        <h2>نظام إدارة الأسطول البحري</h2>
        <input type="text" id="loginUser" placeholder="اسم المستخدم">
        <input type="password" id="loginPass" placeholder="كلمة المرور">
        <button onclick="login()">دخول</button>
        <div id="loginError" style="color: red; margin-top: 10px; display: none;"></div>
        <hr style="margin: 15px 0;">
        <p style="font-size: 12px;">admin / admin123 | editor / editor123 | viewer / viewer123</p>
    </div>
</div>

<!-- التطبيق الرئيسي -->
<div id="mainApp" class="app-container" style="display: none;">
    <div class="header">
        <h1>⚓ منظومة متابعة الوسائل البحرية ⚓</h1>
        <div style="margin-top: 10px;">
            <span id="userInfo"></span>
            <button onclick="logout()" style="background: #e74c3c; color: white; border: none; padding: 5px 15px; border-radius: 20px; margin-right: 10px;">خروج</button>
        </div>
    </div>

    <div class="nav-buttons">
        <button class="nav-btn" onclick="showPage('list')">📋 السجل العام</button>
        <button class="nav-btn" onclick="showPage('maint')">🔧 سجل الصيانة</button>
        <button class="nav-btn" onclick="showPage('stats')">📊 الإحصائيات</button>
        <button class="nav-btn" onclick="showPage('support')">💬 الدعم الفني</button>
        <button id="usersBtn" class="nav-btn" onclick="showPage('users')" style="display: none;">👥 المستخدمين</button>
        <button class="nav-btn" onclick="exportToExcel()">📎 Excel</button>
    </div>

    <!-- نموذج الإدخال -->
    <div id="formArea" class="form-area">
        <input type="text" id="name" placeholder="اسم المركب">
        <input type="text" id="number" placeholder="الرقم">
        <input type="number" id="length" placeholder="الطول (م)">
        <select id="region">
            <option value="">الإقليم</option>
            <option value="الشمال">الشمال</option>
            <option value="الساحل">الساحل</option>
            <option value="الوسط">الوسط</option>
            <option value="الجنوب">الجنوب</option>
        </select>
        <select id="zone"><option value="">المنطقة</option></select>
        <input type="text" id="port" placeholder="الميناء">
        <select id="status">
            <option value="صالح">صالح</option>
            <option value="معطب">معطب</option>
            <option value="صيانة">صيانة</option>
        </select>
        <input type="text" id="breakdown" placeholder="نوع العطب">
        <input type="date" id="breakdownDate">
        <input type="date" id="endDate" placeholder="تاريخ الانتهاء">
        <button class="btn-save" onclick="saveVessel()">💾 حفظ</button>
        <button class="btn-blue" onclick="clearForm()">🔄 جديد</button>
    </div>

    <!-- صفحة السجل العام -->
    <div id="pageList">
        <div class="filter-bar">
            <input type="text" id="search" placeholder="بحث..." onkeyup="loadVessels()">
            <select id="filterCat" onchange="loadVessels()"><option value="الكل">كل الفئات</option></select>
            <select id="filterReg" onchange="loadVessels()"><option value="الكل">كل الأقاليم</option></select>
            <button class="btn-blue" onclick="clearSearch()">مسح</button>
        </div>
        <div class="table-container">
            <table>
                <thead><tr><th>الاسم</th><th>الرقم</th><th>الطول</th><th>الفئة</th><th>الإقليم</th><th>المنطقة</th><th>الميناء</th><th>الحالة</th><th>العطب</th><th>التاريخ</th><th>إجراء</th></tr></thead>
                <tbody id="listBody"></tbody>
            </table>
        </div>
    </div>

    <!-- صفحة سجل الصيانة -->
    <div id="pageMaint" class="hidden">
        <div class="filter-bar">
            <input type="text" id="maintSearch" placeholder="بحث..." onkeyup="loadMaint()">
            <select id="maintReg" onchange="loadMaint()"><option value="الكل">كل الأقاليم</option></select>
        </div>
        <div class="table-container">
            <table>
                <thead><tr><th>الاسم</th><th>الإقليم</th><th>الحالة</th><th>العطب</th><th>تاريخ العطب</th><th>تاريخ الانتهاء</th></tr></thead>
                <tbody id="maintBody"></tbody>
            </table>
        </div>
    </div>

    <!-- صفحة الإحصائيات -->
    <div id="pageStats" class="hidden">
        <div class="stats-grid" id="statsCards"></div>
        <canvas id="statusChart" style="max-height: 300px; margin-bottom: 20px;"></canvas>
        <canvas id="categoryChart" style="max-height: 300px;"></canvas>
    </div>

    <!-- صفحة الدعم الفني -->
    <div id="pageSupport" class="hidden">
        <div class="form-area" style="grid-template-columns: 1fr;">
            <input type="text" id="ticketTitle" placeholder="عنوان التذكرة">
            <textarea id="ticketMsg" rows="4" placeholder="الرسالة..."></textarea>
            <button class="btn-save" onclick="sendTicket()">إرسال تذكرة</button>
        </div>
        <div id="ticketsList"></div>
    </div>

    <!-- صفحة المستخدمين -->
    <div id="pageUsers" class="hidden">
        <div class="form-area">
            <input type="text" id="newUser" placeholder="اسم المستخدم">
            <input type="password" id="newPass" placeholder="كلمة المرور">
            <select id="newRole">
                <option value="مشاهد">مشاهد</option>
                <option value="محرر">محرر</option>
                <option value="مسؤول">مسؤول</option>
            </select>
            <button class="btn-save" onclick="addUser()">إضافة مستخدم</button>
        </div>
        <div class="table-container">
            <table>
                <thead><tr><th>المستخدم</th><th>الصلاحية</th><th>الحالة</th><th>تغيير كلمة المرور</th><th>حذف</th></tr></thead>
                <tbody id="usersBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // ==================== المتغيرات ====================
    let currentUser = null;
    let allVessels = [];
    let allUsers = [];
    let editId = null;
    let statusChart = null;
    let categoryChart = null;

    const ZONES = { "الشمال": ["تونس", "بنزرت", "طبرقة"], "الساحل": ["سوسة", "المنستير", "نابل"], "الوسط": ["صفاقس", "المهدية", "قرقنة"], "الجنوب": ["جرجيس", "جربة", "قابس"] };
    const CATEGORIES = ["البروق", "صقور", "خوافر", "زوارق مزدوجة", "طوافات"];

    // ==================== دوال مساعدة ====================
    function showToast(msg, isError = false) {
        let toast = document.createElement('div');
        toast.className = 'toast';
        toast.style.background = isError ? '#e74c3c' : '#27ae60';
        toast.innerHTML = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    function getCategory(length) {
        let l = parseFloat(length);
        if (l === 11) return "البروق";
        if (l >= 8 && l <= 12) return "صقور";
        if (l > 12 && l <= 25) return "خوافر";
        if (l >= 30) return "طوافات";
        return "زوارق مزدوجة";
    }

    function updateZones() {
        let reg = document.getElementById('region').value;
        let zoneSel = document.getElementById('zone');
        zoneSel.innerHTML = '<option value="">المنطقة</option>';
        if (ZONES[reg]) ZONES[reg].forEach(z => zoneSel.innerHTML += `<option value="${z}">${z}</option>`);
    }

    // ==================== API Calls ====================
    async function apiCall(endpoint, method = 'GET', body = null) {
        const options = { method, headers: { 'Content-Type': 'application/json' } };
        if (body) options.body = JSON.stringify(body);
        const response = await fetch(`/api${endpoint}`, options);
        return await response.json();
    }

    async function loadVessels() {
        allVessels = await apiCall('/vessels');
        renderList();
        renderStats();
        renderMaint();
    }

    async function loadUsers() {
        if (currentUser?.role !== 'مسؤول') return;
        allUsers = await apiCall('/users');
        renderUsers();
    }

    // ==================== تسجيل الدخول ====================
    async function login() {
        let username = document.getElementById('loginUser').value.trim();
        let password = document.getElementById('loginPass').value.trim();
        let errorDiv = document.getElementById('loginError');

        if (!username || !password) {
            errorDiv.innerHTML = "يرجى إدخال اسم المستخدم وكلمة المرور";
            errorDiv.style.display = "block";
            return;
        }

        let result = await apiCall('/login', 'POST', { username, password });

        if (result.success) {
            currentUser = result.user;
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            document.getElementById('userInfo').innerHTML = `<i class="fas fa-user-shield"></i> ${currentUser.username} | ${currentUser.role}`;

            let isAdmin = currentUser.role === 'مسؤول';
            let isViewer = currentUser.role === 'مشاهد';

            document.getElementById('usersBtn').style.display = isAdmin ? 'inline-block' : 'none';
            document.getElementById('formArea').style.display = isViewer ? 'none' : 'grid';

            // تعبئة القوائم
            let filterCat = document.getElementById('filterCat');
            filterCat.innerHTML = '<option value="الكل">كل الفئات</option>';
            CATEGORIES.forEach(c => filterCat.innerHTML += `<option value="${c}">${c}</option>`);

            let filterReg = document.getElementById('filterReg');
            filterReg.innerHTML = '<option value="الكل">كل الأقاليم</option>';
            Object.keys(ZONES).forEach(r => filterReg.innerHTML += `<option value="${r}">${r}</option>`);

            let maintReg = document.getElementById('maintReg');
            maintReg.innerHTML = '<option value="الكل">كل الأقاليم</option>';
            Object.keys(ZONES).forEach(r => maintReg.innerHTML += `<option value="${r}">${r}</option>`);

            document.getElementById('region').addEventListener('change', updateZones);

            await loadVessels();
            if (isAdmin) await loadUsers();
            await loadTickets();

            showToast(`مرحباً ${username}`);
        } else {
            errorDiv.innerHTML = result.error || "بيانات الدخول غير صحيحة";
            errorDiv.style.display = "block";
        }
    }

    function logout() {
        currentUser = null;
        editId = null;
        document.getElementById('loginScreen').style.display = 'flex';
        document.getElementById('mainApp').style.display = 'none';
        showToast("تم تسجيل الخروج");
    }

    // ==================== إدارة المراكب ====================
    async function saveVessel() {
        if (!currentUser || (currentUser.role !== 'مسؤول' && currentUser.role !== 'محرر')) {
            showToast("ليس لديك صلاحية!", true);
            return;
        }

        let name = document.getElementById('name').value.trim();
        if (!name) { showToast("الاسم مطلوب", true); return; }

        let vessel = {
            id: editId,
            name, number: document.getElementById('number').value,
            length: parseFloat(document.getElementById('length').value) || 0,
            category: getCategory(document.getElementById('length').value),
            region: document.getElementById('region').value,
            zone: document.getElementById('zone').value,
            port: document.getElementById('port').value,
            status: document.getElementById('status').value,
            breakdown: document.getElementById('breakdown').value,
            breakdownDate: document.getElementById('breakdownDate').value,
            endDate: document.getElementById('endDate').value
        };

        if (editId) {
            await apiCall(`/vessels/${editId}`, 'PUT', vessel);
            showToast("تم التحديث");
        } else {
            await apiCall('/vessels', 'POST', vessel);
            showToast("تم الإضافة");
        }

        editId = null;
        clearForm();
        await loadVessels();
    }

    async function editVessel(id) {
        if (!currentUser || (currentUser.role !== 'مسؤول' && currentUser.role !== 'محرر')) {
            showToast("ليس لديك صلاحية!", true);
            return;
        }
        let v = allVessels.find(v => v.id === id);
        if (v) {
            editId = id;
            document.getElementById('name').value = v.name;
            document.getElementById('number').value = v.number;
            document.getElementById('length').value = v.length;
            document.getElementById('region').value = v.region;
            updateZones();
            setTimeout(() => document.getElementById('zone').value = v.zone, 50);
            document.getElementById('port').value = v.port;
            document.getElementById('status').value = v.status;
            document.getElementById('breakdown').value = v.breakdown;
            document.getElementById('breakdownDate').value = v.breakdownDate;
            document.getElementById('endDate').value = v.endDate;
            window.scrollTo(0, 0);
            showToast("قم بالتعديل ثم اضغط حفظ");
        }
    }

    async function deleteVessel(id) {
        if (!currentUser || currentUser.role !== 'مسؤول') {
            showToast("ليس لديك صلاحية للحذف!", true);
            return;
        }
        if (confirm("هل أنت متأكد من الحذف؟")) {
            await apiCall(`/vessels/${id}`, 'DELETE');
            await loadVessels();
            showToast("تم الحذف");
        }
    }

    function clearForm() {
        editId = null;
        document.getElementById('name').value = '';
        document.getElementById('number').value = '';
        document.getElementById('length').value = '';
        document.getElementById('region').value = '';
        document.getElementById('zone').innerHTML = '<option value="">المنطقة</option>';
        document.getElementById('port').value = '';
        document.getElementById('status').value = 'صالح';
        document.getElementById('breakdown').value = '';
        document.getElementById('breakdownDate').value = '';
        document.getElementById('endDate').value = '';
    }

    // ==================== العرض ====================
    function renderList() {
        let search = document.getElementById('search').value.toLowerCase();
        let filterCat = document.getElementById('filterCat').value;
        let filterReg = document.getElementById('filterReg').value;

        let filtered = allVessels.filter(v => {
            if (filterCat !== 'الكل' && v.category !== filterCat) return false;
            if (filterReg !== 'الكل' && v.region !== filterReg) return false;
            if (search && !v.name.toLowerCase().includes(search) && !v.number.toLowerCase().includes(search)) return false;
            return true;
        });

        let html = '';
        filtered.forEach(v => {
            let statusClass = v.status === 'صالح' ? 'status-good' : (v.status === 'معطب' ? 'status-bad' : 'status-maint');
            html += `<tr>
                <td>${v.name}${editId === v.id ? ' ✏️' : ''}</td>
                <td>${v.number || '-'}</td>
                <td>${v.length || '-'}</td>
                <td>${v.category || '-'}</td>
                <td>${v.region || '-'}</td>
                <td>${v.zone || '-'}</td>
                <td>${v.port || '-'}</td>
                <td class="${statusClass}">${v.status}</td>
                <td>${v.breakdown || '-'}</td>
                <td>${v.breakdownDate || '-'}</td>
                <td>
                    ${(currentUser.role === 'مسؤول' || currentUser.role === 'محرر') ? `<button class="btn-edit" onclick="editVessel(${v.id})"><i class="fas fa-edit"></i></button>` : ''}
                    ${currentUser.role === 'مسؤول' ? `<button class="btn-delete" onclick="deleteVessel(${v.id})"><i class="fas fa-trash"></i></button>` : ''}
                </td>
            </tr>`;
        });
        document.getElementById('listBody').innerHTML = html || '<tr><td colspan="11">لا توجد بيانات</td></tr>';
    }

    function renderMaint() {
        let search = document.getElementById('maintSearch').value.toLowerCase();
        let filterReg = document.getElementById('maintReg').value;

        let filtered = allVessels.filter(v => (v.status === 'معطب' || v.status === 'صيانة'));
        if (filterReg !== 'الكل') filtered = filtered.filter(v => v.region === filterReg);
        if (search) filtered = filtered.filter(v => v.name.toLowerCase().includes(search));

        let html = '';
        filtered.forEach(v => {
            let statusClass = v.status === 'صالح' ? 'status-good' : (v.status === 'معطب' ? 'status-bad' : 'status-maint');
            html += `<tr>
                <td>${v.name}</td>
                <td>${v.region || '-'}</td>
                <td class="${statusClass}">${v.status}</td>
                <td>${v.breakdown || '-'}</td>
                <td>${v.breakdownDate || '-'}</td>
                <td>${v.endDate || '-'}</td>
            </tr>`;
        });
        document.getElementById('maintBody').innerHTML = html || '<tr><td colspan="6">لا توجد مراكب معطوبة</td></tr>';
    }

    function renderStats() {
        let total = allVessels.length;
        let good = allVessels.filter(v => v.status === 'صالح').length;
        let broken = allVessels.filter(v => v.status === 'معطب').length;
        let maint = allVessels.filter(v => v.status === 'صيانة').length;
        let efficiency = total ? ((good / total) * 100).toFixed(1) : 0;

        document.getElementById('statsCards').innerHTML = `
            <div class="stat-card"><div class="number">${total}</div><div>إجمالي المراكب</div></div>
            <div class="stat-card"><div class="number">${good}</div><div>صالح</div></div>
            <div class="stat-card"><div class="number">${maint}</div><div>صيانة</div></div>
            <div class="stat-card"><div class="number">${broken}</div><div>معطب</div></div>
            <div class="stat-card"><div class="number">${efficiency}%</div><div>الجاهزية</div></div>
        `;

        let catCount = {};
        CATEGORIES.forEach(c => catCount[c] = allVessels.filter(v => v.category === c).length);

        if (statusChart) statusChart.destroy();
        if (categoryChart) categoryChart.destroy();

        statusChart = new Chart(document.getElementById('statusChart'), {
            type: 'doughnut',
            data: { labels: ['صالح', 'صيانة', 'معطب'], datasets: [{ data: [good, maint, broken], backgroundColor: ['#27ae60', '#f39c12', '#e74c3c'] }] }
        });

        categoryChart = new Chart(document.getElementById('categoryChart'), {
            type: 'bar',
            data: { labels: CATEGORIES, datasets: [{ label: 'عدد المراكب', data: CATEGORIES.map(c => catCount[c]), backgroundColor: '#0f3460' }] }
        });
    }

    // ==================== التذاكر ====================
    async function loadTickets() {
        let tickets = await apiCall('/tickets');
        let userTickets = tickets.filter(t => t.username === currentUser.username);
        let html = '<div class="table-container"><table><thead><tr><th>التاريخ</th><th>العنوان</th><th>الحالة</th></tr></thead><tbody>';
        if (userTickets.length === 0) html += '<tr><td colspan="3">لا توجد تذاكر</td></tr>';
        else userTickets.forEach(t => html += `<tr><td>${t.date}</td><td>${t.title}</td><td>${t.status}</td></tr>`);
        html += '</tbody></table></div>';
        document.getElementById('ticketsList').innerHTML = html;
    }

    async function sendTicket() {
        let title = document.getElementById('ticketTitle').value.trim();
        let msg = document.getElementById('ticketMsg').value.trim();
        if (!title || !msg) { showToast("يرجى إدخال عنوان ورسالة", true); return; }
        await apiCall('/tickets', 'POST', { username: currentUser.username, title, message: msg });
        document.getElementById('ticketTitle').value = '';
        document.getElementById('ticketMsg').value = '';
        await loadTickets();
        showToast("تم إرسال التذكرة");
    }

    // ==================== المستخدمين ====================
    function renderUsers() {
        if (currentUser.role !== 'مسؤول') return;
        let html = '';
        allUsers.forEach(u => {
            html += `<tr>
                <td>${u.username}</td>
                <td>${u.role}</td>
                <td class="${u.enabled ? 'status-good' : 'status-bad'}">${u.enabled ? 'مفعل' : 'معطل'}</td>
                <td><button class="btn-edit" onclick="changePassword(${u.id})">تغيير</button></td>
                <td>${currentUser.id !== u.id ? `<button class="btn-delete" onclick="deleteUser(${u.id})">حذف</button>` : '-'}</td>
            </tr>`;
        });
        document.getElementById('usersBody').innerHTML = html;
    }

    async function addUser() {
        if (currentUser.role !== 'مسؤول') return;
        let username = document.getElementById('newUser').value.trim();
        let password = document.getElementById('newPass').value.trim();
        let role = document.getElementById('newRole').value;
        if (!username || !password) { showToast("يرجى إدخال اسم وكلمة مرور", true); return; }
        let result = await apiCall('/users', 'POST', { username, password, role });
        if (result.success) {
            document.getElementById('newUser').value = '';
            document.getElementById('newPass').value = '';
            await loadUsers();
            showToast("تم إضافة المستخدم");
        } else {
            showToast(result.error, true);
        }
    }

    async function changePassword(userId) {
        let newPass = prompt("كلمة المرور الجديدة:");
        if (newPass && newPass.length >= 4) {
            await apiCall(`/users/${userId}/password`, 'PUT', { password: newPass });
            showToast("تم تغيير كلمة المرور");
        } else if (newPass) {
            showToast("كلمة المرور 4 أحرف على الأقل", true);
        }
    }

    async function deleteUser(userId) {
        if (confirm("هل أنت متأكد من الحذف؟")) {
            await apiCall(`/users/${userId}`, 'DELETE');
            await loadUsers();
            showToast("تم حذف المستخدم");
        }
    }

    // ==================== تصدير ====================
    function exportToExcel() {
        let ws = XLSX.utils.json_to_sheet(allVessels);
        let wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Vessels");
        XLSX.writeFile(wb, `vessels_${new Date().toISOString().split('T')[0]}.xlsx`);
        showToast("تم التصدير إلى Excel");
    }

    // ==================== تنقل بين الصفحات ====================
    function clearSearch() {
        document.getElementById('search').value = '';
        loadVessels();
    }

    function showPage(page) {
        document.getElementById('pageList').classList.add('hidden');
        document.getElementById('pageMaint').classList.add('hidden');
        document.getElementById('pageStats').classList.add('hidden');
        document.getElementById('pageSupport').classList.add('hidden');
        document.getElementById('pageUsers').classList.add('hidden');
        document.getElementById(`page${page.charAt(0).toUpperCase() + page.slice(1)}`).classList.remove('hidden');
        if (page === 'stats') renderStats();
        if (page === 'maint') renderMaint();
        if (page === 'support') loadTickets();
        if (page === 'users') loadUsers();
    }

    document.getElementById('region').addEventListener('change', updateZones);
</script>
</body>
</html>
