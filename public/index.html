<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>منظومة الوسائل البحرية</title>
    <style>
        body { font-family: Arial; margin: 20px; background: #f0f2f5; direction: rtl; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 20px; border-radius: 10px; }
        .header { background: #0f3460; color: white; padding: 15px; border-radius: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .btn { padding: 8px 15px; border: none; border-radius: 5px; cursor: pointer; }
        .btn-green { background: #28a745; color: white; }
        .btn-red { background: #dc3545; color: white; }
        .btn-orange { background: #fd7e14; color: white; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        th { background: #0f3460; color: white; }
        .input-group { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
        .input-group input, .input-group select { padding: 8px; border: 1px solid #ddd; border-radius: 5px; flex: 1; min-width: 120px; }
        .status-صالح { color: green; font-weight: bold; }
        .status-معطب { color: red; font-weight: bold; }
        .status-صيانة { color: orange; font-weight: bold; }
        .nav { display: flex; gap: 10px; margin-bottom: 20px; }
        .nav-btn { padding: 10px 20px; background: #e9ecef; border: none; cursor: pointer; border-radius: 5px; }
        .nav-btn.active { background: #0f3460; color: white; }
        .hidden { display: none; }
        .login-box { background: white; padding: 40px; border-radius: 10px; width: 350px; margin: 100px auto; text-align: center; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
        .login-box input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; }
        .login-box button { width: 100%; padding: 10px; background: #0f3460; color: white; border: none; border-radius: 5px; cursor: pointer; }
        #loginOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #0f3460, #16213e); display: flex; justify-content: center; align-items: center; z-index: 9999; }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-box">
        <h2>⚓ منظومة الوسائل البحرية</h2>
        <input type="text" id="username" placeholder="اسم المستخدم">
        <input type="password" id="password" placeholder="كلمة المرور">
        <button onclick="doLogin()">دخول</button>
        <div id="loginError" style="color: red; margin-top: 10px;"></div>
    </div>
</div>

<div id="mainApp" class="container" style="display: none;">
    <div class="header">
        <div><strong>⚓ منظومة متابعة الوسائل البحرية</strong><br><small>Développeur: أمان الله ناجي</small></div>
        <div><span id="userRole"></span> <button class="btn btn-red" onclick="logout()">خروج</button></div>
    </div>

    <div class="nav">
        <button class="nav-btn active" onclick="showPage('main')">📋 السجل العام</button>
        <button class="nav-btn" onclick="showPage('maint')">🔧 سجل الصيانة</button>
    </div>

    <div class="input-group" id="inputArea">
        <input type="text" id="iName" placeholder="اسم المركب">
        <input type="text" id="iNum" placeholder="الرقم">
        <input type="number" id="iLen" placeholder="الطول">
        <select id="iReg"><option value="">الإقليم</option><option value="الشمال">الشمال</option><option value="الساحل">الساحل</option><option value="الوسط">الوسط</option><option value="الجنوب">الجنوب</option></select>
        <select id="iStat"><option value="صالح">صالح</option><option value="معطب">معطب</option><option value="صيانة">صيانة</option></select>
        <input type="text" id="iBreak" placeholder="نوع العطب">
        <input type="date" id="iDate">
        <button class="btn btn-green" onclick="addItem()">➕ حفظ</button>
        <button class="btn btn-orange" onclick="clearForm()">🔄 جديد</button>
    </div>

    <div id="pageMain">
        <table width="100%">
            <thead><tr><th>الاسم</th><th>الرقم</th><th>الطول</th><th>الإقليم</th><th>الحالة</th><th>العطب</th><th>إجراء</th></tr></thead>
            <tbody id="mainBody"></tbody>
        </table>
    </div>

    <div id="pageMaint" class="hidden">
        <table width="100%">
            <thead><tr><th>الاسم</th><th>الإقليم</th><th>الحالة</th><th>العطب</th><th>تاريخ العطب</th></tr></thead>
            <tbody id="maintBody"></tbody>
        </table>
    </div>
</div>

<script>
// بيانات أولية
let vessels = [
    { id: 1, name: 'البروق 1', number: 'B001', length: 11, region: 'الشمال', status: 'صالح', breakdown: '', breakdownDate: '' },
    { id: 2, name: 'صقر 1', number: 'S001', length: 10, region: 'الساحل', status: 'صالح', breakdown: '', breakdownDate: '' },
    { id: 3, name: 'خافرة 1', number: 'K001', length: 20, region: 'الوسط', status: 'معطب', breakdown: 'عطل محرك', breakdownDate: '2025-03-10' }
];
let nextId = 4;
let currentUser = null;
let editingId = null;

// تحميل من localStorage
try {
    let saved = localStorage.getItem('marine_vessels');
    if (saved) {
        vessels = JSON.parse(saved);
        nextId = vessels.length ? Math.max(...vessels.map(v => v.id)) + 1 : 1;
    }
} catch(e) {}

function save() {
    localStorage.setItem('marine_vessels', JSON.stringify(vessels));
}

function renderMain() {
    let html = '';
    for (let v of vessels) {
        html += `<tr>
            <td><b>${v.name}</b>${editingId === v.id ? ' ✏️' : ''}</td>
            <td>${v.number || '-'}</td>
            <td>${v.length || '-'}</td>
            <td>${v.region || '-'}</td>
            <td class="status-${v.status}">${v.status}</td>
            <td>${v.breakdown || '-'}</td>
            <td>
                <button class="btn btn-orange" onclick="editItem(${v.id})" style="padding:5px 10px">تعديل</button>
                <button class="btn btn-red" onclick="delItem(${v.id})" style="padding:5px 10px">حذف</button>
            </td>
        </tr>`;
    }
    document.getElementById('mainBody').innerHTML = html || '<tr><td colspan="7">لا توجد مراكب</td></tr>';
}

function renderMaint() {
    let filtered = vessels.filter(v => v.status === 'معطب' || v.status === 'صيانة');
    let html = '';
    for (let v of filtered) {
        html += `<tr>
            <td><b>${v.name}</b></td>
            <td>${v.region || '-'}</td>
            <td class="status-${v.status}">${v.status}</td>
            <td>${v.breakdown || '-'}</td>
            <td>${v.breakdownDate || '-'}</td>
        </tr>`;
    }
    document.getElementById('maintBody').innerHTML = html || '<tr><td colspan="5">لا توجد مراكب معطوبة</td></tr>';
}

function addItem() {
    let name = document.getElementById('iName').value.trim();
    if (!name) { alert('الاسم مطلوب'); return; }
    
    let stat = document.getElementById('iStat').value;
    let fDate = document.getElementById('iDate').value;
    if ((stat === 'معطب' || stat === 'صيانة') && !fDate) { alert('تاريخ العطب مطلوب'); return; }
    
    let vessel = {
        id: editingId || nextId++,
        name: name,
        number: document.getElementById('iNum').value,
        length: parseFloat(document.getElementById('iLen').value) || 0,
        region: document.getElementById('iReg').value,
        status: stat,
        breakdown: document.getElementById('iBreak').value,
        breakdownDate: fDate
    };
    
    if (editingId) {
        let index = vessels.findIndex(v => v.id === editingId);
        if (index !== -1) vessels[index] = vessel;
        alert('✅ تم التعديل بنجاح');
        editingId = null;
    } else {
        vessels.push(vessel);
        alert('✅ تم الإضافة بنجاح');
    }
    
    save();
    clearForm();
    renderMain();
    renderMaint();
}

function editItem(id) {
    let v = vessels.find(v => v.id === id);
    if (v) {
        editingId = id;
        document.getElementById('iName').value = v.name;
        document.getElementById('iNum').value = v.number;
        document.getElementById('iLen').value = v.length;
        document.getElementById('iReg').value = v.region;
        document.getElementById('iStat').value = v.status;
        document.getElementById('iBreak').value = v.breakdown;
        document.getElementById('iDate').value = v.breakdownDate;
        window.scrollTo(0, 0);
        renderMain();
        alert('✏️ قم بتعديل البيانات ثم اضغط حفظ');
    }
}

function delItem(id) {
    if (confirm('هل أنت متأكد من الحذف؟')) {
        vessels = vessels.filter(v => v.id !== id);
        save();
        renderMain();
        renderMaint();
        alert('✅ تم الحذف بنجاح');
    }
}

function clearForm() {
    editingId = null;
    document.getElementById('iName').value = '';
    document.getElementById('iNum').value = '';
    document.getElementById('iLen').value = '';
    document.getElementById('iReg').value = '';
    document.getElementById('iStat').value = 'صالح';
    document.getElementById('iBreak').value = '';
    document.getElementById('iDate').value = '';
    renderMain();
    alert('🗑️ تم مسح النموذج');
}

function doLogin() {
    let username = document.getElementById('username').value;
    let password = document.getElementById('password').value;
    if (username === 'admin' && password === '1234') {
        currentUser = { username: 'admin', role: 'مسؤول' };
        document.getElementById('loginOverlay').style.display = 'none';
        document.getElementById('mainApp').style.display = 'block';
        document.getElementById('userRole').innerHTML = '👤 admin | مسؤول';
        renderMain();
        renderMaint();
    } else {
        document.getElementById('loginError').innerHTML = 'اسم المستخدم أو كلمة المرور غير صحيحة';
    }
}

function logout() {
    currentUser = null;
    editingId = null;
    document.getElementById('loginOverlay').style.display = 'flex';
    document.getElementById('mainApp').style.display = 'none';
    document.getElementById('username').value = '';
    document.getElementById('password').value = '';
    alert('تم تسجيل الخروج');
}

function showPage(page) {
    let btns = document.querySelectorAll('.nav-btn');
    btns.forEach(btn => btn.classList.remove('active'));
    event.target.classList.add('active');
    document.getElementById('pageMain').classList.add('hidden');
    document.getElementById('pageMaint').classList.add('hidden');
    if (page === 'main') document.getElementById('pageMain').classList.remove('hidden');
    else document.getElementById('pageMaint').classList.remove('hidden');
}

// ربط الدوال
window.doLogin = doLogin;
window.logout = logout;
window.showPage = showPage;
window.addItem = addItem;
window.editItem = editItem;
window.delItem = delItem;
window.clearForm = clearForm;
</script>
</body>
</html>
