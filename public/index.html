<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>منظومة الوسائل البحرية</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Segoe UI',Tahoma,sans-serif;background:#f0f2f5;padding:20px;direction:rtl}
        .login-container{position:fixed;top:0;left:0;width:100%;height:100%;background:#2c3e50;display:flex;justify-content:center;align-items:center;z-index:9999}
        .login-card{background:white;padding:40px;border-radius:16px;width:350px;text-align:center}
        .login-card input{width:100%;padding:12px;margin:10px 0;border:1px solid #ddd;border-radius:8px}
        .login-card button{width:100%;padding:12px;background:#2c3e50;color:white;border:none;border-radius:8px;cursor:pointer}
        .container{max-width:1400px;margin:auto;background:white;padding:20px;border-radius:16px}
        .nav{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
        .nav button{padding:10px 20px;background:#34495e;color:white;border:none;border-radius:8px;cursor:pointer}
        .hidden{display:none}
        .form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:15px;margin-bottom:20px;background:#f8f9fa;padding:20px;border-radius:12px}
        input,select{padding:10px;border:1px solid #ddd;border-radius:6px;width:100%}
        table{width:100%;border-collapse:collapse;margin-top:15px}
        th,td{border:1px solid #ddd;padding:12px;text-align:center}
        th{background:#34495e;color:white}
        .btn{padding:8px 16px;border:none;border-radius:6px;cursor:pointer;color:white}
        .btn-green{background:#27ae60}
        .btn-red{background:#e74c3c}
        .btn-orange{background:#f39c12}
        .btn-blue{background:#2980b9}
        .btn-cyan{background:#17a2b8}
        .toast{position:fixed;bottom:20px;right:20px;background:#27ae60;color:white;padding:12px 24px;border-radius:8px;animation:fadeout 3s forwards;z-index:10000}
        @keyframes fadeout{0%{opacity:1}80%{opacity:1}100%{opacity:0;visibility:hidden}}
        .map-container{height:500px;width:100%;margin:15px 0;border-radius:10px;overflow:hidden;border:2px solid #2980b9}
        #trackMap{height:100%;width:100%}
        .status-صالح{color:green;font-weight:bold}
        .status-معطب{color:red;font-weight:bold}
        .status-صيانة{color:orange;font-weight:bold}
        @media print{.nav,.form-grid,.btn,.map-container{display:none}}
    </style>
</head>
<body>

<div id="loginContainer" class="login-container">
    <div class="login-card">
        <h2>⚓ منظومة الوسائل البحرية</h2>
        <input type="text" id="username" placeholder="اسم المستخدم">
        <input type="password" id="password" placeholder="كلمة المرور">
        <button onclick="doLogin()">دخول</button>
        <div id="loginError" style="color:red;margin-top:10px"></div>
    </div>
</div>

<div id="mainApp" class="container" style="display:none">
    <div class="nav">
        <button onclick="showPage('vessels')">⚓ الأسطول البحري</button>
        <button onclick="showPage('maint')">🛠️ سجل الصيانة</button>
        <button onclick="showPage('stats')">📈 الإحصائيات</button>
        <button onclick="showPage('map')">🗺️ الخريطة</button>
        <button onclick="showPage('users')">👥 المستخدمين</button>
        <button onclick="logout()">🚪 خروج</button>
    </div>

    <!-- صفحة الأسطول البحري -->
    <div id="vesselsPage">
        <div class="form-grid">
            <input type="text" id="name" placeholder="اسم المركب">
            <input type="text" id="num" placeholder="الرقم">
            <input type="number" id="len" placeholder="الطول">
            <input type="text" id="reg" placeholder="الإقليم">
            <input type="text" id="zone" placeholder="المنطقة">
            <input type="text" id="port" placeholder="الميناء">
            <select id="stat"><option value="صالح">صالح</option><option value="معطب">معطب</option><option value="صيانة">صيانة</option></select>
            <input type="text" id="breakdown" placeholder="العطب">
            <input type="date" id="damageDate">
            <input type="date" id="endDate">
            <button class="btn btn-green" onclick="addVessel()">➕ إضافة</button>
        </div>
        <div style="overflow-x:auto"><table id="vesselsTable"><thead><tr><th>الاسم</th><th>الرقم</th><th>الطول</th><th>الإقليم</th><th>المنطقة</th><th>الميناء</th><th>الحالة</th><th>العطب</th><th>تاريخ العطب</th><th>الانتهاء</th><th>إجراء</th></tr></thead><tbody id="vesselsBody"><tr><td colspan="11">جاري التحميل...</tr></tbody></table></div>
    </div>

    <!-- صفحة سجل الصيانة -->
    <div id="maintPage" class="hidden">
        <div class="form-grid">
            <input type="text" id="searchMaint" placeholder="بحث" onkeyup="loadMaint()">
            <select id="filterReg" onchange="loadMaint()"><option value="الكل">الكل</option><option value="الشمال">الشمال</option><option value="الساحل">الساحل</option><option value="الوسط">الوسط</option><option value="الجنوب">الجنوب</option></select>
            <button class="btn btn-blue" onclick="loadMaint()">تحديث</button>
        </div>
        <div style="overflow-x:auto"><table id="maintTable"><thead><tr><th>الاسم</th><th>الرقم</th><th>الإقليم</th><th>المنطقة</th><th>الحالة</th><th>العطب</th><th>تاريخ العطب</th><th>الانتهاء</th><th>إجراء</th></tr></thead><tbody id="maintBody"><tr><td colspan="9">جاري التحميل...</tr></tbody></table></div>
    </div>

    <!-- صفحة الإحصائيات -->
    <div id="statsPage" class="hidden">
        <div id="statsCards" style="display:flex;gap:15px;flex-wrap:wrap;margin-bottom:20px"></div>
        <canvas id="statsChart" width="400" height="200" style="max-width:100%"></canvas>
    </div>

    <!-- صفحة الخريطة -->
    <div id="mapPage" class="hidden">
        <div class="form-grid">
            <button class="btn btn-cyan" onclick="startTracking()" id="startBtn">📍 بدء تتبع موقعي</button>
            <button class="btn btn-red" onclick="stopTracking()" id="stopBtn" style="display:none">⏹️ إيقاف التتبع</button>
            <button class="btn btn-green" onclick="loadLocations()">🔄 تحديث الخريطة</button>
        </div>
        <div id="mapStatus" style="text-align:center;margin:10px;color:#666"></div>
        <div class="map-container"><div id="trackMap"></div></div>
    </div>

    <!-- صفحة المستخدمين -->
    <div id="usersPage" class="hidden">
        <div class="form-grid">
            <input type="text" id="uname" placeholder="اسم المستخدم">
            <input type="password" id="upass" placeholder="كلمة السر">
            <select id="urole"><option value="مشاهد">مشاهد</option><option value="محرر">محرر</option><option value="مسؤول">مسؤول</option></select>
            <button class="btn btn-green" onclick="addUser()">➕ إضافة</button>
        </div>
        <div style="overflow-x:auto"><table id="usersTable"><thead><tr><th>الاسم</th><th>الصلاحية</th><th>الحالة</th><th>تغيير كلمة المرور</th><th>تعطيل/تفعيل</th><th>حذف</th></tr></thead><tbody id="usersBody"><tr><td colspan="6">جاري التحميل...</tr></tbody></table></div>
    </div>
</div>

<script>
let currentUser=null, statsChart=null;
let trackingMap=null, trackingMarkers={}, trackingInterval=null, socket=null;

function showToast(msg,isErr){let t=document.createElement('div');t.className='toast';t.style.background=isErr?'#e74c3c':'#27ae60';t.innerHTML=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),3000);}

async function apiCall(url,method,body=null){
    let opts={method,headers:{'Content-Type':'application/json'}};
    if(body)opts.body=JSON.stringify(body);
    let res=await fetch(url,opts);
    if(!res.ok)throw new Error(await res.text());
    return res.json();
}

async function doLogin(){
    let u=document.getElementById('username').value.trim();
    let p=document.getElementById('password').value.trim();
    let errDiv=document.getElementById('loginError');
    if(!u||!p){errDiv.innerText='يرجى إدخال البيانات';return;}
    try{
        let user=await apiCall('/api/login','POST',{name:u,pass:p});
        currentUser=user;
        document.getElementById('loginContainer').style.display='none';
        document.getElementById('mainApp').style.display='block';
        await loadVessels();
        await loadStats();
        if(currentUser.role==='مسؤول')await loadUsers();
        initSocket();
        initMap();
        showToast(`مرحباً ${u}`);
    }catch(e){errDiv.innerText='بيانات غير صحيحة';}
}

async function logout(){
    if(trackingInterval)stopTracking();
    await apiCall('/api/logout','POST');
    currentUser=null;
    document.getElementById('loginContainer').style.display='flex';
    document.getElementById('mainApp').style.display='none';
}

function showPage(page){
    document.getElementById('vesselsPage').classList.add('hidden');
    document.getElementById('maintPage').classList.add('hidden');
    document.getElementById('statsPage').classList.add('hidden');
    document.getElementById('mapPage').classList.add('hidden');
    document.getElementById('usersPage').classList.add('hidden');
    if(page==='vessels')document.getElementById('vesselsPage').classList.remove('hidden');
    else if(page==='maint'){document.getElementById('maintPage').classList.remove('hidden');loadMaint();}
    else if(page==='stats'){document.getElementById('statsPage').classList.remove('hidden');loadStats();}
    else if(page==='map'){document.getElementById('mapPage').classList.remove('hidden');if(trackingMap)trackingMap.invalidateSize();loadLocations();}
    else if(page==='users'){if(currentUser?.role==='مسؤول'){document.getElementById('usersPage').classList.remove('hidden');loadUsers();}else showToast('غير مسموح',1);}
}

async function loadVessels(){
    try{
        let vessels=await apiCall('/api/vessels','GET');
        let tbody=document.getElementById('vesselsBody');
        if(vessels.length===0){tbody.innerHTML='<tr><td colspan="11">لا توجد مراكب</tr>';return;}
        let canEdit=currentUser.role==='مسؤول'||currentUser.role==='محرر';
        let canDelete=currentUser.role==='مسؤول';
        tbody.innerHTML=vessels.map(v=>`<tr><td>${v.name}</td><td>${v.num||'-'}</td><td>${v.len||'-'}</td><td>${v.reg||'-'}</td><td>${v.zone||'-'}</td><td>${v.port||'-'}</td><td class="status-${v.stat}">${v.stat}</td><td>${v.break||'-'}</td><td>${v.fDate?new Date(v.fDate).toLocaleDateString('ar-EG'):'-'}</td><td>${v.eDate?new Date(v.eDate).toLocaleDateString('ar-EG'):'-'}</td><td>${canEdit?`<button class="btn btn-orange" onclick="editVessel('${v._id}')">تعديل</button>`:''}${canDelete?`<button class="btn btn-red" onclick="deleteVessel('${v._id}')">حذف</button>`:''}</td></tr>`).join('');
    }catch(e){showToast('خطأ في التحميل',1);}
}

async function addVessel(){
    if(currentUser.role==='مشاهد')return showToast('لا صلاحية',1);
    let vessel={
        name:document.getElementById('name').value,
        num:document.getElementById('num').value,
        len:parseFloat(document.getElementById('len').value)||0,
        reg:document.getElementById('reg').value,
        zone:document.getElementById('zone').value,
        port:document.getElementById('port').value,
        stat:document.getElementById('stat').value,
        break:document.getElementById('breakdown').value,
        fDate:document.getElementById('damageDate').value,
        eDate:document.getElementById('endDate').value
    };
    if(!vessel.name)return showToast('الاسم مطلوب',1);
    try{
        await apiCall('/api/vessels','POST',vessel);
        showToast('تم الإضافة');
        document.querySelectorAll('#vesselsPage .form-grid input').forEach(i=>i.value='');
        await loadVessels();await loadMaint();await loadStats();
    }catch(e){showToast('خطأ: '+e.message,1);}
}

async function editVessel(id){
    let vessels=await apiCall('/api/vessels','GET');
    let v=vessels.find(x=>x._id===id);
    if(v){
        document.getElementById('name').value=v.name;
        document.getElementById('num').value=v.num||'';
        document.getElementById('len').value=v.len||'';
        document.getElementById('reg').value=v.reg||'';
        document.getElementById('zone').value=v.zone||'';
        document.getElementById('port').value=v.port||'';
        document.getElementById('stat').value=v.stat||'صالح';
        document.getElementById('breakdown').value=v.break||'';
        document.getElementById('damageDate').value=v.fDate?v.fDate.split('T')[0]:'';
        document.getElementById('endDate').value=v.eDate?v.eDate.split('T')[0]:'';
        window.scrollTo(0,0);
        let orig=document.querySelector('#vesselsPage .form-grid button:last-child').onclick;
        document.querySelector('#vesselsPage .form-grid button:last-child').onclick=async()=>{
            let updated={
                name:document.getElementById('name').value,
                num:document.getElementById('num').value,
                len:parseFloat(document.getElementById('len').value)||0,
                reg:document.getElementById('reg').value,
                zone:document.getElementById('zone').value,
                port:document.getElementById('port').value,
                stat:document.getElementById('stat').value,
                break:document.getElementById('breakdown').value,
                fDate:document.getElementById('damageDate').value,
                eDate:document.getElementById('endDate').value
            };
            await apiCall(`/api/vessels/${id}`,'PUT',updated);
            showToast('تم التحديث');
            document.querySelectorAll('#vesselsPage .form-grid input').forEach(i=>i.value='');
            document.querySelector('#vesselsPage .form-grid button:last-child').onclick=orig;
            await loadVessels();await loadMaint();await loadStats();
        };
    }
}

async function deleteVessel(id){
    if(!confirm('تأكيد الحذف؟'))return;
    await apiCall(`/api/vessels/${id}`,'DELETE');
    showToast('تم الحذف');
    await loadVessels();await loadMaint();await loadStats();
}

async function loadMaint(){
    try{
        let vessels=await apiCall('/api/vessels','GET');
        let filter=document.getElementById('filterReg').value;
        let search=document.getElementById('searchMaint').value.toLowerCase();
        let filtered=vessels.filter(v=>(v.stat==='معطب'||v.stat==='صيانة')&&(filter==='الكل'||v.reg===filter)&&(!search||v.name.toLowerCase().includes(search)));
        let tbody=document.getElementById('maintBody');
        if(filtered.length===0){tbody.innerHTML='<tr><td colspan="9">لا توجد مراكب معطوبة</tr>';return;}
        tbody.innerHTML=filtered.map(v=>`<tr><td>${v.name}</td><td>${v.num||'-'}</td><td>${v.reg||'-'}</td><td>${v.zone||'-'}</td><td class="status-${v.stat}">${v.stat}</td><td>${v.break||'-'}</td><td>${v.fDate?new Date(v.fDate).toLocaleDateString('ar-EG'):'-'}</td><td>${v.eDate?new Date(v.eDate).toLocaleDateString('ar-EG'):'-'}</td><td><button class="btn btn-orange" onclick="editVessel('${v._id}')">تعديل</button></td></tr>`).join('');
    }catch(e){showToast('خطأ',1);}
}

async function loadStats(){
    try{
        let vessels=await apiCall('/api/vessels','GET');
        let total=vessels.length;
        let ok=vessels.filter(v=>v.stat==='صالح').length;
        let maint=vessels.filter(v=>v.stat==='صيانة').length;
        let broken=vessels.filter(v=>v.stat==='معطب').length;
        let eff=total?(ok/total*100).toFixed(1):0;
        document.getElementById('statsCards').innerHTML=`<div style="background:white;padding:15px;border-radius:10px;text-align:center;flex:1"><div style="font-size:28px;font-weight:bold">${total}</div><div>الإجمالي</div></div><div style="background:white;padding:15px;border-radius:10px;text-align:center;flex:1"><div style="font-size:28px;font-weight:bold;color:green">${ok}</div><div>صالح</div></div><div style="background:white;padding:15px;border-radius:10px;text-align:center;flex:1"><div style="font-size:28px;font-weight:bold;color:orange">${maint}</div><div>صيانة</div></div><div style="background:white;padding:15px;border-radius:10px;text-align:center;flex:1"><div style="font-size:28px;font-weight:bold;color:red">${broken}</div><div>معطب</div></div><div style="background:white;padding:15px;border-radius:10px;text-align:center;flex:1"><div style="font-size:28px;font-weight:bold">${eff}%</div><div>الجاهزية</div></div>`;
        if(statsChart)statsChart.destroy();
        statsChart=new Chart(document.getElementById('statsChart'),{type:'doughnut',data:{labels:['صالح','صيانة','معطب'],datasets:[{data:[ok,maint,broken],backgroundColor:['#27ae60','#f39c12','#e74c3c']}]}});
    }catch(e){}
}

function initSocket(){if(socket)return;socket=io();socket.on('receive-location',(d)=>{updateMapMarker(d.userName,d.lat,d.lng,d.time);showToast(`📍 موقع ${d.userName}`);});}
function initMap(){if(trackingMap)return;trackingMap=L.map('trackMap').setView([34.5,9.5],7);L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{attribution:'© OSM'}).addTo(trackingMap);}
function updateMapMarker(n,lat,lng,t){if(!trackingMap)initMap();if(trackingMarkers[n]){trackingMarkers[n].setLatLng([lat,lng]);trackingMarkers[n].bindPopup(`<b>${n}</b><br>📍 ${lat},${lng}`);}else{let m=L.marker([lat,lng]).addTo(trackingMap);m.bindPopup(`<b>${n}</b><br>📍 ${lat},${lng}`);trackingMarkers[n]=m;}trackingMap.setView([lat,lng],12);}
function startTracking(){if(!currentUser)return showToast('تسجيل الدخول أولاً',1);if(!navigator.geolocation)return showToast('GPS غير مدعوم',1);if(!socket)initSocket();trackingInterval=setInterval(()=>{navigator.geolocation.getCurrentPosition(p=>{let{latitude:lat,longitude:lng}=p.coords;if(socket) socket.emit('send-location',{userName:currentUser.name,userRole:currentUser.role,lat,lng});document.getElementById('mapStatus').innerHTML=`📍 يتم المشاركة... ${lat.toFixed(6)}, ${lng.toFixed(6)}`;},()=>{document.getElementById('mapStatus').innerHTML='❌ خطأ في GPS';},{enableHighAccuracy:true,timeout:5000});},5000);document.getElementById('startBtn').style.display='none';document.getElementById('stopBtn').style.display='inline-block';showToast('✅ بدأ التتبع');}
function stopTracking(){if(trackingInterval)clearInterval(trackingInterval);document.getElementById('startBtn').style.display='inline-block';document.getElementById('stopBtn').style.display='none';document.getElementById('mapStatus').innerHTML='⏹️ توقف التتبع';showToast('⏹️ تم الإيقاف');}
async function loadLocations(){try{let l=await(await fetch('/api/locations')).json();if(!trackingMap)initMap();Object.values(trackingMarkers).forEach(m=>m.remove());trackingMarkers={};l.forEach(loc=>updateMapMarker(loc.userName,loc.lat,loc.lng,loc.timestamp));showToast(`✅ تم تحميل ${l.length} موقع`);}catch(e){showToast('❌ خطأ',1);}}
async function loadUsers(){if(currentUser?.role!=='مسؤول')return;try{let users=await apiCall('/api/users','GET');let tbody=document.getElementById('usersBody');if(users.length===0){tbody.innerHTML='<tr><td colspan="6">لا توجد مستخدمين</tr>';return;}tbody.innerHTML=users.map(u=>`<tr><td>${u.name}</td><td>${u.role}</td><td class="${u.enabled?'status-صالح':'status-معطب'}">${u.enabled?'مفعل':'معطل'}</td><td><button class="btn btn-orange" onclick="changePass('${u._id}')">تغيير</button></td><td>${u.enabled?`<button class="btn btn-warning" onclick="toggleUser('${u._id}',false)">تعطيل</button>`:`<button class="btn btn-green" onclick="toggleUser('${u._id}',true)">تفعيل</button>`}</td><td><button class="btn btn-red" onclick="deleteUser('${u._id}')">حذف</button></td></tr>`).join('');}catch(e){showToast('خطأ',1);}}
async function addUser(){let name=document.getElementById('uname').value.trim();let pass=document.getElementById('upass').value.trim();let role=document.getElementById('urole').value;if(!name||!pass)return showToast('املأ الحقول',1);try{await apiCall('/api/users','POST',{name,pass,role,enabled:true});showToast('تم الإضافة');document.getElementById('uname').value='';document.getElementById('upass').value='';await loadUsers();}catch(e){showToast(e.message,1);}}
async function changePass(id){let np=prompt('كلمة المرور الجديدة');if(!np)return;try{let users=await apiCall('/api/users','GET');let user=users.find(u=>u._id===id);if(user){user.pass=np;await apiCall(`/api/users/${id}`,'PUT',user);showToast('تم التغيير');await loadUsers();}}catch(e){showToast('خطأ',1);}}
async function toggleUser(id,enable){try{let users=await apiCall('/api/users','GET');let user=users.find(u=>u._id===id);if(user){user.enabled=enable;await apiCall(`/api/users/${id}`,'PUT',user);showToast(enable?'تم التفعيل':'تم التعطيل');await loadUsers();}}catch(e){showToast('خطأ',1);}}
async function deleteUser(id){if(!confirm('حذف المستخدم؟'))return;await apiCall(`/api/users/${id}`,'DELETE');showToast('تم الحذف');await loadUsers();}
</script>
</body>
</html>
