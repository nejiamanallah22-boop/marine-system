<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام إدارة الأسطول</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cairo', 'Segoe UI', sans-serif; background: linear-gradient(135deg, #0f3460, #16213e); min-height: 100vh; padding: 20px; }
        .login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #0f3460, #16213e); display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .login-card { background: white; padding: 40px; border-radius: 20px; width: 380px; text-align: center; }
        .login-card input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; }
        .login-card button { width: 100%; padding: 12px; background: #0f3460; color: white; border: none; border-radius: 8px; cursor: pointer; }
        .app-container { max-width: 1400px; margin: auto; background: white; border-radius: 20px; padding: 20px; }
        .hidden { display: none !important; }
        .header { background: #0f3460; color: white; padding: 20px; border-radius: 15px; margin-bottom: 20px; }
        .user-bar { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.2); }
        .nav { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; flex-wrap: wrap; }
        .nav-btn { padding: 10px 20px; border: none; border-radius: 25px; cursor: pointer; background: #f0f2f5; font-weight: bold; }
        .nav-btn.primary { background: #0f3460; color: white; }
        .nav-btn.warning { background: #f39c12; color: white; }
        .nav-btn.success { background: #27ae60; color: white; }
        .nav-btn.danger { background: #e74c3c; color: white; }
        .nav-btn.purple { background: #8e44ad; color: white; }
        .input-area { background: #f8f9fa; padding: 20px; border-radius: 15px; margin-bottom: 20px; display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; }
        .input-area input, .input-area select { padding: 10px; border: 1px solid #ddd; border-radius: 8px; }
        .filter-bar { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .filter-bar input, .filter-bar select { padding: 10px; border: 1px solid #ddd; border-radius: 8px; flex: 1; }
        .table-container { overflow-x: auto; max-height: 500px; overflow-y: auto; border: 1px solid #ddd; border-radius: 10px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: center; border-bottom: 1px solid #ddd; }
        th { background: #0f3460; color: white; position: sticky; top: 0; }
        .status-good { color: #27ae60; font-weight: bold; }
        .status-bad { color: #e74c3c; font-weight: bold; }
        .status-maint { color: #f39c12; font-weight: bold; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .stat-card { background: linear-gradient(135deg, #667eea, #764ba2); color: white; padding: 15px; border-radius: 15px; text-align: center; cursor: pointer; }
        .stat-card .number { font-size: 32px; font-weight: bold; }
        .btn-save { background: #27ae60; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; }
        .btn-edit { background: #f39c12; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; margin: 2px; }
        .btn-delete { background: #e74c3c; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; margin: 2px; }
        .btn-blue { background: #3498db; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; }
        .btn-red { background: #e74c3c; color: white; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; }
        .toast { position: fixed; bottom: 20px; right: 20px; background: #27ae60; color: white; padding: 12px 24px; border-radius: 10px; z-index: 10000; animation: fadeOut 3s ease forwards; }
        @keyframes fadeOut { 0% { opacity: 1; } 70% { opacity: 1; } 100% { opacity: 0; visibility: hidden; } }
        @media (max-width: 768px) { body { padding: 10px; } .input-area { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<!-- شاشة الدخول -->
<div id="loginScreen" class="login-screen">
    <div class="login-card">
        <i class="fas fa-ship" style="font-size: 50px; color: #0f3460;"></i>
        <h2>نظام إدارة الأسطول البحري</h2>
        <input type="text" id="loginUser" placeholder="اسم المستخدم">
        <input type="password" id="loginPass" placeholder="كلمة المرور">
        <button id="loginBtn">دخول</button>
        <div id="loginMsg" style="color: red; margin-top: 10px;"></div>
    </div>
</div>

<!-- التطبيق الرئيسي -->
<div id="mainApp" class="app-container" style="display: none;">
    <div class="header">
        <h1>⚓ منظومة متابعة الوسائل البحرية ⚓</h1>
        <div class="user-bar">
            <span id="userInfo">مستخدم</span>
            <button id="logoutBtn" class="btn-red"><i class="fas fa-sign-out-alt"></i> خروج</button>
        </div>
    </div>

    <div class="nav">
        <button class="nav-btn primary" data-page="main">📋 السجل العام</button>
        <button class="nav-btn warning" data-page="maint">🔧 سجل الصيانة</button>
        <button class="nav-btn success" data-page="stats">📊 جاهزية الأسطول</button>
        <button class="nav-btn" data-page="support">💬 الدعم الفني</button>
        <button class="nav-btn purple" data-page="track" id="trackNav" style="display: none;">📜 تتبع المستخدمين</button>
        <button class="nav-btn danger" data-page="users" id="usersNav" style="display: none;">👥 إدارة المستخدمين</button>
        <button class="nav-btn" onclick="window.print()">🖨️ طباعة</button>
    </div>

    <!-- نموذج الإدخال -->
    <div id="formArea" class="input-area">
        <input type="text" id="vName" placeholder="اسم المركب">
        <input type="text" id="vNumber" placeholder="الرقم">
        <input type="number" id="vLength" placeholder="الطول (م)">
        <select id="vRegion"><option value="">الإقليم</option><option value="الشمال">الشمال</option><option value="الساحل">الساحل</option><option value="الوسط">الوسط</option><option value="الجنوب">الجنوب</option></select>
        <select id="vZone"><option value="">المنطقة</option></select>
        <input type="text" id="vPort" placeholder="الميناء">
        <select id="vStatus"><option value="صالح">صالح</option><option value="معطب">معطب</option><option value="صيانة">صيانة</option></select>
        <input type="text" id="vBreakdown" placeholder="نوع العطب">
        <input type="date" id="vDate">
        <button class="btn-save" id="saveBtn">💾 حفظ</button>
        <button class="btn-blue" id="clearBtn">🔄 جديد</button>
    </div>

    <!-- صفحة السجل العام -->
    <div id="pageMain">
        <div class="filter-bar">
            <input type="text" id="searchMain" placeholder="بحث...">
            <select id="filterCat"><option value="الكل">كل الفئات</option></select>
            <select id="filterReg"><option value="الكل">كل الأقاليم</option></select>
            <button class="btn-blue" id="clearSearchBtn">مسح</button>
            <button class="btn-blue" id="refreshMainBtn">🔄 تحديث</button>
        </div>
        <div class="table-container">
            <table id="mainTable">
                <thead><tr><th>الاسم</th><th>الرقم</th><th>الطول</th><th>الفئة</th><th>الإقليم</th><th>المنطقة</th><th>الميناء</th><th>الحالة</th><th>العطب</th><th>التاريخ</th><th>إجراء</th></tr></thead>
                <tbody id="mainBody"></tbody>
            </table>
        </div>
    </div>

    <!-- صفحة سجل الصيانة -->
    <div id="pageMaint" class="hidden">
        <div class="filter-bar">
            <input type="text" id="searchMaint" placeholder="بحث...">
            <select id="filterMaintReg"><option value="الكل">كل الأقاليم</option></select>
            <input type="date" id="dateFrom" placeholder="من تاريخ">
            <input type="date" id="dateTo" placeholder="إلى تاريخ">
            <button class="btn-blue" id="resetMaintBtn">إعادة ضبط</button>
        </div>
        <div class="table-container">
            <table><thead><tr><th>الاسم</th><th>الإقليم</th><th>الحالة</th><th>العطب</th><th>التاريخ</th></tr></thead><tbody id="maintBody"></tbody></table>
        </div>
    </div>

    <!-- صفحة جاهزية الأسطول -->
    <div id="pageStats" class="hidden">
        <div id="statsCards" class="stats-grid"></div>
        <canvas id="statusChart" style="max-height: 300px; margin-bottom: 20px;"></canvas>
        <canvas id="categoryChart" style="max-height: 300px;"></canvas>
        <div id="regionTables"></div>
    </div>

    <!-- صفحة الدعم الفني -->
    <div id="pageSupport" class="hidden">
        <div class="input-area" style="grid-template-columns: 1fr;">
            <input type="text" id="ticketTitle" placeholder="عنوان التذكرة">
            <textarea id="ticketMsg" rows="4" placeholder="الرسالة..."></textarea>
            <button class="btn-save" id="sendTicketBtn">إرسال تذكرة</button>
        </div>
        <div id="ticketsList"></div>
    </div>

    <!-- صفحة تتبع المستخدمين -->
    <div id="pageTrack" class="hidden">
        <div class="filter-bar">
            <input type="date" id="trackStart">
            <input type="date" id="trackEnd">
            <button class="btn-blue" id="resetTrackBtn">إعادة ضبط</button>
        </div>
        <div class="table-container"><table><thead><tr><th>التاريخ</th><th>الوقت</th><th>المستخدم</th><th>الإجراء</th><th>التفاصيل</th></tr></thead><tbody id="trackBody"></tbody></table></div>
    </div>

    <!-- صفحة إدارة المستخدمين -->
    <div id="pageUsers" class="hidden">
        <div class="input-area">
            <input type="text" id="newUser" placeholder="اسم المستخدم">
            <input type="password" id="newPass" placeholder="كلمة المرور">
            <select id="newRole"><option value="مشاهد">مشاهد</option><option value="محرر">محرر</option><option value="مسؤول">مسؤول</option></select>
            <button class="btn-save" id="addUserBtn">إضافة مستخدم</button>
        </div>
        <div class="table-container"><table><thead><tr><th>المستخدم</th><th>الصلاحية</th><th>الحالة</th><th>تغيير كلمة المرور</th><th>حذف</th></tr></thead><tbody id="usersBody"></tbody></table></div>
    </div>
</div>

<script>
// ==================== المتغيرات ====================
let currentUser = null;
let token = null;
let vessels = [];
let users = [];
let logs = [];
let tickets = [];
let editId = null;
let statusChart = null, categoryChart = null;

const ZONES = { "الشمال": ["تونس", "بنزرت", "طبرقة"], "الساحل": ["سوسة", "المنستير", "نابل"], "الوسط": ["صفاقس", "المهدية", "قرقنة"], "الجنوب": ["جرجيس", "جربة", "قابس"] };
const CATEGORIES = ["البروق", "صقور", "خوافر", "زوارق مزدوجة", "طوافات"];

// ==================== دوال مساعدة ====================
function showToast(msg, isError = false) {
    let toast = document.createElement('div');
    toast.className = 'toast';
    toast.style.background = isError ? '#e74c3c' : '#27ae60';
    toast.innerHTML = msg;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
}

function getCategory(length) {
    let l = parseFloat(length);
    if (l === 11) return "البروق";
    if (l >= 8 && l <= 12) return "صقور";
    if (l > 12 && l <= 25) return "خوافر";
    if (l >= 30) return "طوافات";
    return "زوارق مزدوجة";
}

function canEdit() { return currentUser && (currentUser.role === "مسؤول" || currentUser.role === "محرر"); }
function canDelete() { return currentUser && currentUser.role === "مسؤول"; }
function canManageUsers() { return currentUser && currentUser.role === "مسؤول"; }

function updateZones() {
    let reg = document.getElementById('vRegion').value;
    let zoneSel = document.getElementById('vZone');
    zoneSel.innerHTML = '<option value="">المنطقة</option>';
    if (ZONES[reg]) ZONES[reg].forEach(z => zoneSel.innerHTML += `<option value="${z}">${z}</option>`);
}

// ==================== API Calls ====================
async function apiCall(endpoint, method = 'GET', body = null) {
    const options = { method, headers: { 'Content-Type': 'application/json', 'Authorization': token ? `Bearer ${token}` : '' } };
    if (body) options.body = JSON.stringify(body);
    const response = await fetch(`/api${endpoint}`, options);
    const data = await response.json();
    if (!response.ok) throw new Error(data.error || 'حدث خطأ');
    return data;
}

// ==================== تسجيل الدخول ====================
document.getElementById('loginBtn').onclick = async () => {
    let username = document.getElementById('loginUser').value.trim();
    let password = document.getElementById('loginPass').value.trim();
    if (!username || !password) { document.getElementById('loginMsg').innerHTML = 'يرجى إدخال البيانات'; return; }
    try {
        let res = await fetch('/api/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username, password }) });
        let data = await res.json();
        if (data.success) {
            token = data.token;
            currentUser = data.user;
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            document.getElementById('userInfo').innerHTML = `${currentUser.username} | ${currentUser.role}`;
            let isAdmin = currentUser.role === "مسؤول";
            document.getElementById('trackNav').style.display = isAdmin ? 'inline-block' : 'none';
            document.getElementById('usersNav').style.display = isAdmin ? 'inline-block' : 'none';
            document.getElementById('formArea').style.display = currentUser.role === 'مشاهد' ? 'none' : 'grid';
            // تعبئة القوائم
            let filterCat = document.getElementById('filterCat');
            filterCat.innerHTML = '<option value="الكل">كل الفئات</option>';
            CATEGORIES.forEach(c => filterCat.innerHTML += `<option value="${c}">${c}</option>`);
            let filterReg = document.getElementById('filterReg');
            filterReg.innerHTML = '<option value="الكل">كل الأقاليم</option>';
            Object.keys(ZONES).forEach(r => filterReg.innerHTML += `<option value="${r}">${r}</option>`);
            document.getElementById('vRegion').addEventListener('change', updateZones);
            await loadVessels();
            await loadTickets();
            if (isAdmin) { await loadUsers(); await loadLogs(); }
            showToast(`مرحباً ${username}`);
        } else { document.getElementById('loginMsg').innerHTML = data.error || 'بيانات غير صحيحة'; }
    } catch(e) { document.getElementById('loginMsg').innerHTML = 'خطأ في الاتصال'; }
};

// ==================== زر الخروج (يعمل 100%) ====================
document.getElementById('logoutBtn').onclick = async () => {
    if (confirm('هل أنت متأكد من تسجيل الخروج؟')) {
        if (token) await apiCall('/logout', 'POST').catch(() => {});
        currentUser = null; token = null; editId = null;
        document.getElementById('mainApp').style.display = 'none';
        document.getElementById('loginScreen').style.display = 'flex';
        document.getElementById('loginUser').value = '';
        document.getElementById('loginPass').value = '';
        document.getElementById('loginMsg').innerHTML = '';
        showToast('تم تسجيل الخروج');
    }
};

// ==================== تحميل البيانات ====================
async function loadVessels() {
    vessels = await apiCall('/vessels');
    renderMain();
    renderMaint();
    renderStats();
}
async function loadUsers() { if (canManageUsers()) users = await apiCall('/users'); renderUsers(); }
async function loadLogs() { if (canManageUsers()) logs = await apiCall('/logs'); renderTrack(); }
async function loadTickets() { tickets = await apiCall('/tickets'); renderTickets(); }

// ==================== إدارة المراكب ====================
async function saveVessel() {
    if (!canEdit()) { showToast('ليس لديك صلاحية', true); return; }
    let name = document.getElementById('vName').value.trim();
    if (!name) { showToast('الاسم مطلوب', true); return; }
    let vessel = {
        id: editId,
        name, number: document.getElementById('vNumber').value,
        length: parseFloat(document.getElementById('vLength').value) || 0,
        category: getCategory(document.getElementById('vLength').value),
        region: document.getElementById('vRegion').value,
        zone: document.getElementById('vZone').value,
        port: document.getElementById('vPort').value,
        status: document.getElementById('vStatus').value,
        breakdown_type: document.getElementById('vBreakdown').value,
        breakdown_date: document.getElementById('vDate').value,
        end_date: '', reference: '', support_location: ''
    };
    if (editId) {
        await apiCall(`/vessels/${editId}`, 'PUT', vessel);
        showToast('تم التحديث');
    } else {
        await apiCall('/vessels', 'POST', vessel);
        showToast('تم الإضافة');
    }
    editId = null;
    clearForm();
    await loadVessels();
}

function editVessel(id) {
    if (!canEdit()) { showToast('ليس لديك صلاحية', true); return; }
    let v = vessels.find(v => v.id === id);
    if (v) {
        editId = id;
        document.getElementById('vName').value = v.name;
        document.getElementById('vNumber').value = v.number;
        document.getElementById('vLength').value = v.length;
        document.getElementById('vRegion').value = v.region;
        updateZones();
        setTimeout(() => document.getElementById('vZone').value = v.zone, 50);
        document.getElementById('vPort').value = v.port;
        document.getElementById('vStatus').value = v.status;
        document.getElementById('vBreakdown').value = v.breakdown_type;
        document.getElementById('vDate').value = v.breakdown_date;
        window.scrollTo(0, 0);
        showToast('قم بالتعديل ثم اضغط حفظ');
    }
}

async function deleteVessel(id) {
    if (!canDelete()) { showToast('ليس لديك صلاحية للحذف', true); return; }
    if (confirm('هل أنت متأكد من الحذف؟')) {
        await apiCall(`/vessels/${id}`, 'DELETE');
        await loadVessels();
        showToast('تم الحذف');
    }
}

function clearForm() {
    editId = null;
    document.getElementById('vName').value = '';
    document.getElementById('vNumber').value = '';
    document.getElementById('vLength').value = '';
    document.getElementById('vRegion').value = '';
    document.getElementById('vZone').innerHTML = '<option value="">المنطقة</option>';
    document.getElementById('vPort').value = '';
    document.getElementById('vStatus').value = 'صالح';
    document.getElementById('vBreakdown').value = '';
    document.getElementById('vDate').value = '';
}

// ==================== العرض ====================
function renderMain() {
    let search = document.getElementById('searchMain').value.toLowerCase();
    let filterCat = document.getElementById('filterCat').value;
    let filterReg = document.getElementById('filterReg').value;
    let filtered = vessels.filter(v => {
        if (filterCat !== 'الكل' && v.category !== filterCat) return false;
        if (filterReg !== 'الكل' && v.region !== filterReg) return false;
        if (search && !v.name.toLowerCase().includes(search) && !(v.number || '').toLowerCase().includes(search)) return false;
        return true;
    });
    let html = '';
    filtered.forEach(v => {
        let statusClass = v.status === 'صالح' ? 'status-good' : (v.status === 'معطب' ? 'status-bad' : 'status-maint');
        html += `<tr>
            <td>${v.name}${editId === v.id ? ' ✏️' : ''}</td>
            <td>${v.number || '-'}</td>
            <td>${v.length || '-'}</td>
            <td>${v.category || '-'}</td>
            <td>${v.region || '-'}</td>
            <td>${v.zone || '-'}</td>
            <td>${v.port || '-'}</td>
            <td class="${statusClass}">${v.status}</td>
            <td>${v.breakdown_type || '-'}</td>
            <td>${v.breakdown_date || '-'}</td>
            <td>
                ${canEdit() ? `<button class="btn-edit" onclick="editVessel('${v.id}')"><i class="fas fa-edit"></i></button>` : ''}
                ${canDelete() ? `<button class="btn-delete" onclick="deleteVessel('${v.id}')"><i class="fas fa-trash"></i></button>` : ''}
            </td>
        </tr>`;
    });
    document.getElementById('mainBody').innerHTML = html || '<tr><td colspan="11">لا توجد بيانات<\/td></tr>';
}

function renderMaint() {
    let search = document.getElementById('searchMaint').value.toLowerCase();
    let filterReg = document.getElementById('filterMaintReg').value;
    let dateFrom = document.getElementById('dateFrom').value;
    let dateTo = document.getElementById('dateTo').value;
    let filtered = vessels.filter(v => v.status === 'معطب' || v.status === 'صيانة');
    if (filterReg !== 'الكل') filtered = filtered.filter(v => v.region === filterReg);
    if (dateFrom) filtered = filtered.filter(v => v.breakdown_date && v.breakdown_date >= dateFrom);
    if (dateTo) filtered = filtered.filter(v => v.breakdown_date && v.breakdown_date <= dateTo);
    if (search) filtered = filtered.filter(v => v.name.toLowerCase().includes(search));
    let html = '';
    filtered.forEach(v => {
        let statusClass = v.status === 'صالح' ? 'status-good' : (v.status === 'معطب' ? 'status-bad' : 'status-maint');
        html += `<tr>
            <td>${v.name}</td>
            <td>${v.region || '-'}</td>
            <td class="${statusClass}">${v.status}</td>
            <td>${v.breakdown_type || '-'}</td>
            <td>${v.breakdown_date || '-'}</td>
        </tr>`;
    });
    document.getElementById('maintBody').innerHTML = html || '<td><td colspan="5">لا توجد مراكب معطوبة<\/td></tr>';
}

function renderStats() {
    let total = vessels.length, good = vessels.filter(v => v.status === 'صالح').length, broken = vessels.filter(v => v.status === 'معطب').length, maint = vessels.filter(v => v.status === 'صيانة').length, efficiency = total ? ((good / total) * 100).toFixed(1) : 0;
    document.getElementById('statsCards').innerHTML = `
        <div class="stat-card"><div class="number">${total}</div><div>إجمالي المراكب</div></div>
        <div class="stat-card"><div class="number">${good}</div><div>صالح</div></div>
        <div class="stat-card"><div class="number">${maint}</div><div>صيانة</div></div>
        <div class="stat-card"><div class="number">${broken}</div><div>معطب</div></div>
        <div class="stat-card"><div class="number">${efficiency}%</div><div>الجاهزية</div></div>
    `;
    let catCount = {}; CATEGORIES.forEach(c => catCount[c] = vessels.filter(v => v.category === c).length);
    if (statusChart) statusChart.destroy();
    if (categoryChart) categoryChart.destroy();
    statusChart = new Chart(document.getElementById('statusChart'), { type: 'doughnut', data: { labels: ['صالح', 'صيانة', 'معطب'], datasets: [{ data: [good, maint, broken], backgroundColor: ['#27ae60', '#f39c12', '#e74c3c'] }] } });
    categoryChart = new Chart(document.getElementById('categoryChart'), { type: 'bar', data: { labels: CATEGORIES, datasets: [{ label: 'عدد المراكب', data: CATEGORIES.map(c => catCount[c]), backgroundColor: '#0f3460' }] } });
    // جداول الأقاليم
    let regionHtml = '';
    ['الشمال', 'الساحل', 'الوسط', 'الجنوب'].forEach(region => {
        let regData = vessels.filter(v => v.region === region);
        let regTotal = regData.length, regGood = regData.filter(v => v.status === 'صالح').length, regEff = regTotal ? ((regGood / regTotal) * 100).toFixed(1) : 0;
        regionHtml += `<div style="margin-top:15px; padding:10px; background:#f8f9fa; border-radius:10px;"><h4>📍 إقليم ${region} - الجاهزية: ${regEff}% (${regGood}/${regTotal})</h4><table style="width:100%"><thead><tr><th>الفئة</th><th>عدد الصالح</th><th>عدد المعطوب</th><th>نسبة النجاعة</th></tr></thead><tbody>`;
        CATEGORIES.forEach(cat => {
            let catData = regData.filter(v => v.category === cat);
            let ok = catData.filter(v => v.status === 'صالح').length;
            let br = catData.length - ok;
            let pct = catData.length ? ((ok / catData.length) * 100).toFixed(1) : 0;
            regionHtml += `<tr><td>${cat}</td><td style="color:green">${ok}</td><td style="color:red">${br}</td><td>${pct}%</td></tr>`;
        });
        regionHtml += `</tbody>}</div>`;
    });
    document.getElementById('regionTables').innerHTML = regionHtml;
}

function renderTickets() {
    let userTickets = tickets.filter(t => t.username === currentUser.username);
    let html = '<div class="table-container"><tr><thead><tr><th>التاريخ</th><th>العنوان</th><th>الحالة</th></tr></thead><tbody>';
    if (userTickets.length === 0) html += '<tr><td colspan="3">لا توجد تذاكر<\/td></tr>';
    else userTickets.forEach(t => html += `<tr><td>${t.date}</td><td>${t.subject}</td><td>${t.status}</td></tr>`);
    html += '</tbody></table></div>';
    document.getElementById('ticketsList').innerHTML = html;
}

async function sendTicket() {
    let title = document.getElementById('ticketTitle').value.trim();
    let msg = document.getElementById('ticketMsg').value.trim();
    if (!title || !msg) { showToast('يرجى إدخال عنوان ورسالة', true); return; }
    await apiCall('/tickets', 'POST', { subject: title, message: msg });
    document.getElementById('ticketTitle').value = '';
    document.getElementById('ticketMsg').value = '';
    await loadTickets();
    showToast('تم إرسال التذكرة');
}

function renderTrack() {
    let start = document.getElementById('trackStart').value;
    let end = document.getElementById('trackEnd').value;
    let filtered = [...logs];
    if (start) filtered = filtered.filter(l => l.timestamp && l.timestamp.split('T')[0] >= start);
    if (end) filtered = filtered.filter(l => l.timestamp && l.timestamp.split('T')[0] <= end);
    let html = '';
    filtered.forEach(l => html += `<tr><td>${new Date(l.timestamp).toLocaleDateString('ar-TN')}</td><td>${new Date(l.timestamp).toLocaleTimeString('ar-TN')}</td><td>${l.username}</td><td>${l.action}</td><td>${l.details || '-'}</td></tr>`);
    document.getElementById('trackBody').innerHTML = html || '<tr><td colspan="5">لا توجد نشاطات<\/td></tr>';
}

function renderUsers() {
    if (!canManageUsers()) return;
    let html = '';
    users.forEach(u => {
        html += `<tr>
            <td>${u.username}</td>
            <td>${u.role}</td>
            <td class="${u.enabled ? 'status-good' : 'status-bad'}">${u.enabled ? 'مفعل' : 'معطل'}</td>
            <td><button class="btn-edit" onclick="openPassModal('${u.id}', '${u.username}')">تغيير</button></td>
            <td>${currentUser.id !== u.id ? `<button class="btn-delete" onclick="deleteUser('${u.id}')">حذف</button>` : '-'}</td>
        </tr>`;
    });
    document.getElementById('usersBody').innerHTML = html;
}

async function addUser() {
    if (!canManageUsers()) { showToast('ليس لديك صلاحية', true); return; }
    let username = document.getElementById('newUser').value.trim();
    let password = document.getElementById('newPass').value.trim();
    let role = document.getElementById('newRole').value;
    if (!username || !password) { showToast('يرجى إدخال اسم وكلمة مرور', true); return; }
    await apiCall('/users', 'POST', { username, password, role });
    document.getElementById('newUser').value = '';
    document.getElementById('newPass').value = '';
    await loadUsers();
    showToast('تم إضافة المستخدم');
}

async function openPassModal(userId, userName) {
    let newPass = prompt(`تغيير كلمة المرور للمستخدم: ${userName}\nكلمة المرور الجديدة (8 أحرف على الأقل):`);
    if (newPass && newPass.length >= 8) {
        await apiCall(`/users/${userId}/password`, 'PUT', { password: newPass });
        showToast('تم تغيير كلمة المرور');
    } else if (newPass) { showToast('كلمة المرور 8 أحرف على الأقل', true); }
}

async function deleteUser(userId) {
    if (confirm('هل أنت متأكد من الحذف؟')) {
        await apiCall(`/users/${userId}`, 'DELETE');
        await loadUsers();
        showToast('تم حذف المستخدم');
    }
}

// ==================== أزرار التحديث والفلتر ====================
document.getElementById('saveBtn').onclick = saveVessel;
document.getElementById('clearBtn').onclick = clearForm;
document.getElementById('refreshMainBtn').onclick = () => loadVessels();
document.getElementById('clearSearchBtn').onclick = () => { document.getElementById('searchMain').value = ''; renderMain(); };
document.getElementById('resetMaintBtn').onclick = () => { document.getElementById('searchMaint').value = ''; document.getElementById('filterMaintReg').value = 'الكل'; document.getElementById('dateFrom').value = ''; document.getElementById('dateTo').value = ''; renderMaint(); };
document.getElementById('resetTrackBtn').onclick = () => { document.getElementById('trackStart').value = ''; document.getElementById('trackEnd').value = ''; renderTrack(); };
document.getElementById('sendTicketBtn').onclick = sendTicket;
document.getElementById('addUserBtn').onclick = addUser;
document.getElementById('searchMain').onkeyup = renderMain;
document.getElementById('searchMaint').onkeyup = renderMaint;
document.getElementById('filterCat').onchange = renderMain;
document.getElementById('filterReg').onchange = renderMain;
document.getElementById('filterMaintReg').onchange = renderMaint;
document.getElementById('dateFrom').onchange = renderMaint;
document.getElementById('dateTo').onchange = renderMaint;
document.getElementById('trackStart').onchange = renderTrack;
document.getElementById('trackEnd').onchange = renderTrack;

// ==================== التنقل بين الصفحات ====================
function showPage(page) {
    document.getElementById('pageMain').classList.add('hidden');
    document.getElementById('pageMaint').classList.add('hidden');
    document.getElementById('pageStats').classList.add('hidden');
    document.getElementById('pageSupport').classList.add('hidden');
    document.getElementById('pageTrack').classList.add('hidden');
    document.getElementById('pageUsers').classList.add('hidden');
    document.getElementById(`page${page.charAt(0).toUpperCase() + page.slice(1)}`).classList.remove('hidden');
    if (page === 'maint') renderMaint();
    if (page === 'stats') renderStats();
    if (page === 'support') renderTickets();
    if (page === 'track') renderTrack();
    if (page === 'users') renderUsers();
}

document.querySelectorAll('.nav-btn[data-page]').forEach(btn => {
    btn.onclick = () => showPage(btn.getAttribute('data-page'));
});

document.getElementById('vRegion').addEventListener('change', updateZones);
</script>
</body>
