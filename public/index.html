<script>
    // ==================== المتغيرات العامة ====================
    let currentUser = null;
    let selectedUserId = null;
    let fleetChart = null, categoriesChart = null, comparisonChart = null;
    let currentChartType = 'doughnut';
    
    // متغيرات GPS و Socket
    let trackingInterval = null;
    let trackingMap = null;
    let trackingMarkers = {};
    let socket = null;

    const ZONES_DATA = {
        "الشمال": ["تونس", "بنزرت", "طبرقة"],
        "الساحل": ["سوسة", "المنستير", "نابل"],
        "الوسط": ["صفاقس", "المهدية", "قرقنة"],
        "الجنوب": ["جرجيس", "جربة", "قابس"],
        "وحدة الصيانة والإسناد البحري تونس": ["تونس"],
        "وحدة الصيانة والإسناد البحري المنستير": ["المنستير"],
        "وحدة الصيانة والإسناد البحري صفاقس": ["صفاقس"],
        "وحدة الصيانة والإسناد البحري جرجيس": ["جرجيس"],
        "المجمع الأمني بقبيبة": ["قبيبة"]
    };
    
    const CATS_LIST = ["البروق", "صقور", "خوافر", "زوارق مزدوجة", "طوافات"];

    const REGION_NAMES = {
        "الشمال": "🗺️ الحرس البحري بالشمال",
        "الساحل": "🗺️ الحرس البحري بالساحل",
        "الوسط": "🗺️ الحرس البحري بالوسط",
        "الجنوب": "🗺️ الحرس البحري بالجنوب",
        "وحدة الصيانة والإسناد البحري تونس": "🛠️ وحدة الصيانة تونس",
        "وحدة الصيانة والإسناد البحري المنستير": "🛠️ وحدة الصيانة المنستير",
        "وحدة الصيانة والإسناد البحري صفاقس": "🛠️ وحدة الصيانة صفاقس",
        "وحدة الصيانة والإسناد البحري جرجيس": "🛠️ وحدة الصيانة جرجيس",
        "المجمع الأمني بقبيبة": "🏛️ المجمع الأمني بقبيبة"
    };

    function scrollToTop() { window.scrollTo({ top: 0, behavior: 'smooth' }); }
    function scrollToBottom() { window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' }); }

    function showToast(message, isError = false) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.style.background = isError ? '#d9534f' : '#2e7d32';
        toast.innerHTML = message;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    function formatDate(d) { 
        if(!d) return '-'; 
        try { 
            let date = new Date(d); 
            if(isNaN(date.getTime())) return d; 
            return `${date.getDate().toString().padStart(2,'0')}/${(date.getMonth()+1).toString().padStart(2,'0')}/${date.getFullYear()}`; 
        } catch(e) { return d; } 
    }
    
    function getCat(len) { 
        let n = parseFloat(len); 
        if(n === 11) return "البروق"; 
        if(n >= 8 && n <= 12) return "صقور"; 
        if(n > 12 && n <= 25) return "خوافر"; 
        if(n >= 30) return "طوافات"; 
        return "زوارق مزدوجة"; 
    }
    
    function canEdit() { return currentUser && (currentUser.role === "مسؤول" || currentUser.role === "محرر"); }
    function canDelete() { return currentUser && currentUser.role === "مسؤول"; }
    function canManageUsers() { return currentUser && currentUser.role === "مسؤول"; }

    function getCurrentDate() {
        const now = new Date();
        return `${now.getDate().toString().padStart(2, '0')}/${(now.getMonth() + 1).toString().padStart(2, '0')}/${now.getFullYear()}`;
    }

    function getCurrentTime() {
        const now = new Date();
        return `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;
    }

    // ==================== دوال الاتصال بالسيرفر ====================
    async function apiCall(url, method = 'GET', body = null) {
        const options = { method, headers: { 'Content-Type': 'application/json' } };
        if (body) options.body = JSON.stringify(body);
        const response = await fetch(url, options);
        if (!response.ok) throw new Error(await response.text());
        return response.json();
    }

    async function loadVessels() { return apiCall('/api/vessels'); }
    async function saveVessel(vessel) { return apiCall('/api/vessels', 'POST', vessel); }
    async function updateVessel(id, vessel) { return apiCall(`/api/vessels/${id}`, 'PUT', vessel); }
    async function deleteVessel(id) { return apiCall(`/api/vessels/${id}`, 'DELETE'); }
    
    async function loadUsers() { return apiCall('/api/users'); }
    async function saveUser(user) { return apiCall('/api/users', 'POST', user); }
    async function updateUser(id, user) { return apiCall(`/api/users/${id}`, 'PUT', user); }
    async function deleteUserAPI(id) { return apiCall(`/api/users/${id}`, 'DELETE'); }
    
    async function loadTickets() { return apiCall('/api/tickets'); }
    async function saveTicket(ticket) { return apiCall('/api/tickets', 'POST', ticket); }
    
    async function loadLogs() { return apiCall('/api/logs'); }
    async function saveLog(log) { return apiCall('/api/logs', 'POST', log); }
    
    async function loginAPI(name, pass) { return apiCall('/api/login', 'POST', { name, pass }); }
    async function exportAllDataAPI() { return apiCall('/api/export-all'); }
    async function importAllDataAPI(data) { return apiCall('/api/import-all', 'POST', data); }

    async function logActivity(action, details) { 
        if(!currentUser) return; 
        try {
            await saveLog({
                userName: currentUser.name,
                userRole: currentUser.role,
                action: action,
                details: details,
                date: getCurrentDate(),
                time: getCurrentTime()
            });
        } catch(e) { console.error('Log error:', e); }
    }

    // ==================== دوال GPS و Socket ====================
    function initSocket() {
        if (socket) return;
        socket = io();
        
        socket.on('receive-location', (data) => {
            console.log('📍 موقع مستلم:', data);
            updateMapMarker(data.userName, data.lat, data.lng, data.time);
            showToast(`📍 تم تحديث موقع المستخدم: ${data.userName}`);
        });
    }

    function initTrackingMap() {
        if (trackingMap) return;
        trackingMap = L.map('trackMap').setView([34.5, 9.5], 7);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> contributors'
        }).addTo(trackingMap);
    }

    function updateMapMarker(userName, lat, lng, time) {
        if (!trackingMap) initTrackingMap();
        const key = userName;
        if (trackingMarkers[key]) {
            trackingMarkers[key].setLatLng([lat, lng]);
            trackingMarkers[key].bindPopup(`<b>${userName}</b><br>📍 ${lat}, ${lng}<br>🕐 ${new Date(time).toLocaleString('ar-EG')}`);
        } else {
            const marker = L.marker([lat, lng]).addTo(trackingMap);
            marker.bindPopup(`<b>${userName}</b><br>📍 ${lat}, ${lng}<br>🕐 ${new Date(time).toLocaleString('ar-EG')}`);
            trackingMarkers[key] = marker;
        }
        trackingMap.setView([lat, lng], 12);
    }

    function startTracking() {
        if (!currentUser) {
            showToast("الرجاء تسجيل الدخول أولاً", true);
            return;
        }
        if (!navigator.geolocation) {
            showToast("المتصفح لا يدعم تحديد الموقع", true);
            return;
        }
        
        if (!socket) initSocket();
        
        trackingInterval = setInterval(() => {
            navigator.geolocation.getCurrentPosition((position) => {
                const { latitude, longitude } = position.coords;
                if (socket && currentUser) {
                    socket.emit('send-location', {
                        userName: currentUser.name,
                        userRole: currentUser.role,
                        lat: latitude,
                        lng: longitude
                    });
                    document.getElementById('mapStatus').innerHTML = `📍 يتم مشاركة موقعك... ${latitude.toFixed(6)}, ${longitude.toFixed(6)}`;
                }
            }, (error) => {
                console.error('خطأ في GPS:', error);
                document.getElementById('mapStatus').innerHTML = '❌ تعذر الحصول على الموقع';
            }, { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 });
        }, 5000);
        
        document.getElementById('startTrackingBtn').style.display = 'none';
        document.getElementById('stopTrackingBtn').style.display = 'inline-block';
        showToast("✅ بدأ مشاركة الموقع لحظة بلحظة (كل 5 ثوانٍ)");
    }

    function stopTracking() {
        if (trackingInterval) {
            clearInterval(trackingInterval);
            trackingInterval = null;
        }
        document.getElementById('startTrackingBtn').style.display = 'inline-block';
        document.getElementById('stopTrackingBtn').style.display = 'none';
        document.getElementById('mapStatus').innerHTML = '⏹️ توقفت مشاركة الموقع';
        showToast("⏹️ تم إيقاف مشاركة الموقع");
    }

    async function loadLocations() {
        try {
            const response = await fetch('/api/locations');
            const locations = await response.json();
            if (!trackingMap) initTrackingMap();
            
            Object.values(trackingMarkers).forEach(marker => marker.remove());
            trackingMarkers = {};
            
            locations.forEach(loc => {
                updateMapMarker(loc.userName, loc.lat, loc.lng, loc.timestamp);
            });
            showToast(`✅ تم تحميل ${locations.length} موقع محفوظ`);
        } catch (err) {
            console.error(err);
            showToast("❌ خطأ في تحميل المواقع", true);
        }
    }

    function centerMapOnUser() {
        if (!trackingMap) initTrackingMap();
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(pos => {
                trackingMap.setView([pos.coords.latitude, pos.coords.longitude], 13);
                showToast("🎯 تم التمركز على موقعك");
            }, () => showToast("لا يمكن الحصول على موقعك", true));
        }
    }

    // ==================== دوال التحديث ====================
    async function refreshMain() { await renderMain(); showToast("✅ تم تحديث الأسطول البحري"); }
    async function refreshMaint() { await renderMaint(); showToast("✅ تم تحديث سجل الصيانة"); }
    async function refreshEff() { await renderEff(); showToast("✅ تم تحديث جاهزية الأسطول"); }
    async function refreshTickets() { await renderTickets(); showToast("✅ تم تحديث قائمة التذاكر"); }
    async function refreshTrack() { if(canManageUsers()) { await renderTrack(); showToast("✅ تم تحديث سجل التتبع"); } }
    async function refreshUsers() { if(canManageUsers()) { await renderUsers(); showToast("✅ تم تحديث قائمة المستخدمين"); } }
    
    async function refreshAllPages() { 
        await renderMain(); await renderMaint(); await renderEff(); await renderTickets(); 
        if(canManageUsers()) { await renderUsers(); await renderTrack(); }
        showToast("✅ تم تحديث جميع الصفحات");
    }

    // ==================== دوال الدخول والخروج ====================
    async function doLogin() {
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value.trim();
        const errorDiv = document.getElementById('loginError');
        
        if(!username || !password) {
            errorDiv.innerHTML = "يرجى إدخال اسم المستخدم وكلمة المرور";
            errorDiv.style.display = "block";
            return;
        }
        
        try {
            const user = await loginAPI(username, password);
            if(user.error) {
                errorDiv.innerHTML = user.error;
                errorDiv.style.display = "block";
                return;
            }
            
            currentUser = user;
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            document.getElementById('userRoleDisplay').innerHTML = `👤 ${currentUser.name} | 🔑 ${currentUser.role}`;
            
            // تهيئة Socket والخريطة
            initSocket();
            initTrackingMap();
            
            const isAdmin = currentUser.role === "مسؤول";
            const isViewer = currentUser.role === "مشاهد";
            
            document.getElementById('trackBtn').classList.toggle('hidden', !isAdmin);
            document.getElementById('admBtn').classList.toggle('hidden', !isAdmin);
            document.getElementById('printBtn').style.display = isAdmin ? "inline-block" : "none";
            document.getElementById('exportBtn').style.display = isAdmin ? "inline-flex" : "none";
            document.getElementById('importLabelBtn').style.display = isAdmin ? "inline-flex" : "none";
            document.getElementById('inputArea').classList.toggle('hidden', isViewer);
            
            const fill = (id, list) => {
                const sel = document.getElementById(id);
                if(sel) {
                    sel.innerHTML = '<option value="الكل">الكل</option>';
                    list.forEach(item => sel.innerHTML += `<option value="${item}">${item}</option>`);
                }
            };
            fill('fCatMain', CATS_LIST);
            fill('fRegMain', Object.keys(ZONES_DATA));
            fill('fRegMaint', Object.keys(ZONES_DATA));
            
            await renderMain();
            await renderMaint();
            await renderEff();
            await renderTickets();
            if(isAdmin) { await renderUsers(); await renderTrack(); }
            await logActivity("تسجيل دخول", `قام بتسجيل الدخول إلى النظام في ${getCurrentTime()}`);
            showToast(`مرحباً ${username}`);
        } catch(error) {
            errorDiv.innerHTML = "خطأ في الاتصال بالسيرفر!";
            errorDiv.style.display = "block";
        }
    }
    
    async function logout() {
        if (trackingInterval) stopTracking();
        if(currentUser) await logActivity("تسجيل خروج", `قام بتسجيل الخروج في ${getCurrentTime()}`);
        currentUser = null;
        document.getElementById('loginOverlay').style.display = 'flex';
        document.getElementById('mainApp').style.display = 'none';
        document.getElementById('username').value = '';
        document.getElementById('password').value = '';
        document.getElementById('loginError').style.display = 'none';
    }

    // ==================== دوال إدارة المراكب ====================
    async function addItem() {
        if(!canEdit()) { showToast("ليس لديك صلاحية للإضافة!", true); return; }
        const name = document.getElementById('iName').value.trim();
        if(!name) return showToast("الاسم مطلوب", true);
        
        const stat = document.getElementById('iStat').value;
        const fDate = document.getElementById('iDate').value;
        
        if((stat === 'معطب' || stat === 'صيانة') && !fDate) {
            showToast("تاريخ العطب إلزامي للمراكب المعطوبة أو التي تحت الصيانة!", true);
            return;
        }
        
        const newItem = {
            name: name,
            num: document.getElementById('iNum').value,
            len: parseFloat(document.getElementById('iLen').value) || 0,
            reg: document.getElementById('iReg').value,
            zone: document.getElementById('iZone').value,
            port: document.getElementById('iPort').value,
            supp: document.getElementById('iSupp').value,
            stat: stat,
            break: document.getElementById('iBreak').value,
            fDate: fDate,
            eDate: document.getElementById('iEnd').value,
            ref: document.getElementById('iRef').value,
            cat: getCat(document.getElementById('iLen').value)
        };
        
        try {
            await saveVessel(newItem);
            await logActivity("إضافة مركب", `قام بإضافة مركب "${name}" رقم ${newItem.num || 'غير محدد'} في ${getCurrentTime()}`);
            
            ['iName','iNum','iLen','iPort','iSupp','iBreak','iDate','iEnd','iRef'].forEach(id => {
                const el = document.getElementById(id);
                if(el) el.value = "";
            });
            document.getElementById('iReg').value = "";
            document.getElementById('iZone').innerHTML = '<option value="">المنطقة</option>';
            
            await renderMain();
            await renderMaint();
            await renderEff();
            showToast(`✅ تم حفظ المركب بنجاح`);
        } catch(error) {
            showToast("خطأ في حفظ المركب: " + error.message, true);
        }
    }
    
    async function editItem(id, name) {
        if(!canEdit()) { showToast("ليس لديك صلاحية للتعديل!", true); return; }
        let data = await loadVessels();
        let item = data.find(x => (x._id || x.id).toString() === id.toString());
        if(item) {
            document.getElementById('iName').value = item.name;
            document.getElementById('iNum').value = item.num || '';
            document.getElementById('iLen').value = item.len || '';
            document.getElementById('iReg').value = item.reg || '';
            updateZones();
            setTimeout(() => { document.getElementById('iZone').value = item.zone; }, 50);
            document.getElementById('iPort').value = item.port || '';
            document.getElementById('iSupp').value = item.supp || '';
            document.getElementById('iStat').value = item.stat;
            document.getElementById('iBreak').value = item.break || '';
            document.getElementById('iDate').value = item.fDate || '';
            document.getElementById('iEnd').value = item.eDate || '';
            document.getElementById('iRef').value = item.ref || '';
            window.scrollTo(0,0);
            
            const oldName = item.name;
            const saveBtn = document.querySelector('#inputArea .btn-green');
            const originalClick = saveBtn.onclick;
            saveBtn.onclick = async () => {
                const updatedItem = {
                    name: document.getElementById('iName').value.trim(),
                    num: document.getElementById('iNum').value,
                    len: parseFloat(document.getElementById('iLen').value) || 0,
                    reg: document.getElementById('iReg').value,
                    zone: document.getElementById('iZone').value,
                    port: document.getElementById('iPort').value,
                    supp: document.getElementById('iSupp').value,
                    stat: document.getElementById('iStat').value,
                    break: document.getElementById('iBreak').value,
                    fDate: document.getElementById('iDate').value,
                    eDate: document.getElementById('iEnd').value,
                    ref: document.getElementById('iRef').value,
                    cat: getCat(document.getElementById('iLen').value)
                };
                try {
                    await updateVessel(item._id || item.id, updatedItem);
                    await logActivity("تعديل مركب", `قام بتعديل مركب "${oldName}" إلى "${updatedItem.name}"`);
                    await renderMain();
                    await renderMaint();
                    await renderEff();
                    showToast("✅ تم تحديث المركب بنجاح");
                    saveBtn.onclick = originalClick;
                    ['iName','iNum','iLen','iPort','iSupp','iBreak','iDate','iEnd','iRef'].forEach(id => {
                        const el = document.getElementById(id);
                        if(el) el.value = "";
                    });
                    document.getElementById('iReg').value = "";
                    document.getElementById('iZone').innerHTML = '<option value="">المنطقة</option>';
                } catch(error) {
                    showToast("خطأ في التحديث: " + error.message, true);
                }
            };
            showToast("✏️ قم بتعديل البيانات ثم اضغط حفظ");
        }
    }
    
    async function delItem(id, name) {
        if(!canDelete()) { showToast("ليس لديك صلاحية للحذف!", true); return; }
        if(confirm(`هل أنت متأكد من حذف المركب "${name}"؟`)) {
            try {
                await deleteVessel(id);
                await logActivity("حذف مركب", `قام بحذف مركب "${name}"`);
                await renderMain();
                await renderMaint();
                await renderEff();
                showToast("✅ تم حذف المركب بنجاح");
            } catch(error) {
                showToast("خطأ في الحذف: " + error.message, true);
            }
        }
    }
    
    function updateZones() {
        const reg = document.getElementById('iReg').value;
        const zoneSel = document.getElementById('iZone');
        zoneSel.innerHTML = '<option value="">المنطقة</option>';
        if(ZONES_DATA[reg]) {
            ZONES_DATA[reg].forEach(z => zoneSel.innerHTML += `<option value="${z}">${z}</option>`);
        }
    }
    
    async function renderMain() {
        try {
            let data = await loadVessels();
            const fCat = document.getElementById('fCatMain').value;
            const fReg = document.getElementById('fRegMain').value;
            const searchText = document.getElementById('searchMain').value.toLowerCase();
            
            let filtered = data.filter(x => {
                let matchCat = (fCat === "الكل" || (x.cat && x.cat === fCat));
                let matchReg = (fReg === "الكل" || (x.reg && x.reg === fReg));
                let matchSearch = !searchText || 
                    (x.name && x.name.toLowerCase().includes(searchText)) ||
                    (x.num && x.num.toLowerCase().includes(searchText)) ||
                    (x.reg && x.reg.toLowerCase().includes(searchText)) ||
                    (x.zone && x.zone.toLowerCase().includes(searchText)) ||
                    (x.port && x.port.toLowerCase().includes(searchText));
                return matchCat && matchReg && matchSearch;
            });
            
            let html = "";
            const isAdmin = currentUser?.role === "مسؤول";
            
            if(filtered.length === 0) {
                html = '<tr><td colspan="13" style="text-align:center;">⚠️ لا توجد مراكب مسجلة</td></tr>';
            } else {
                filtered.forEach(x => {
                    let regionDisplay = REGION_NAMES[x.reg] || x.reg || '-';
                    html += `<tr>
                        <td><b>${x.name}</b></td>
                        <td>${x.num || '-'}</td>
                        <td>${x.len || '-'}</td>
                        <td>${x.cat || '-'}</td>
                        <td>${regionDisplay}</td>
                        <td>${x.zone || '-'}</td>
                        <td>${x.port || '-'}</td>
                        <td>${x.supp || '-'}</td>
                        <td class="status-${x.stat}">${x.stat}</td>
                        <td>${x.break || '-'}</td>
                        <td>${formatDate(x.fDate)}</td>
                        <td>${formatDate(x.eDate)}</td>
                        <td>
                            ${canEdit() ? `<button class="btn-sm btn-orange" onclick="editItem('${x._id || x.id}', '${x.name}')">تعديل</button>` : ''}
                            ${isAdmin ? `<button class="btn-sm btn-red" onclick="delItem('${x._id || x.id}', '${x.name}')">حذف</button>` : ''}
                        </td>
                    </tr>`;
                });
            }
            document.getElementById('mainBody').innerHTML = html;
        } catch(error) {
            console.error('خطأ في renderMain:', error);
            document.getElementById('mainBody').innerHTML = '<tr><td colspan="13">❌ خطأ في تحميل البيانات</td></tr>';
        }
    }
    
    function clearMainSearch() {
        document.getElementById('searchMain').value = '';
        renderMain();
    }
    
    async function renderMaint() {
        try {
            let data = await loadVessels();
            const fReg = document.getElementById('fRegMaint').value;
            const dStart = document.getElementById('fDateStart').value;
            const dEnd = document.getElementById('fDateEnd').value;
            const searchText = document.getElementById('searchMaint').value.toLowerCase();
            
            let filtered = data.filter(x => x.stat === 'معطب' || x.stat === 'صيانة');
            
            if(fReg !== "الكل") filtered = filtered.filter(x => x.reg === fReg);
            
            if(dStart || dEnd) {
                const start = dStart ? new Date(dStart) : null;
                const end = dEnd ? new Date(dEnd) : null;
                filtered = filtered.filter(x => {
                    if(!x.fDate) return false;
                    const itemDate = new Date(x.fDate);
                    if(start && itemDate < start) return false;
                    if(end && itemDate > end) return false;
                    return true;
                });
            }
            
            if(searchText) {
                filtered = filtered.filter(x => 
                    (x.name && x.name.toLowerCase().includes(searchText)) ||
                    (x.break && x.break.toLowerCase().includes(searchText)) ||
                    (x.ref && x.ref.toLowerCase().includes(searchText)) ||
                    (x.num && x.num.toLowerCase().includes(searchText))
                );
            }
            
            filtered.sort((a, b) => {
                if(!a.fDate) return 1;
                if(!b.fDate) return -1;
                return new Date(b.fDate) - new Date(a.fDate);
            });

    // ==================== دوال التذاكر ====================
    async function sendTicket() {
        if(!currentUser) { showToast("الرجاء تسجيل الدخول أولاً", true); return; }
        
        const subject = document.getElementById('ticketSubject').value.trim();
        const message = document.getElementById('ticketMessage').value.trim();
        
        if(!subject || !message) { 
            showToast("يرجى إدخال عنوان ورسالة الطلب", true); 
            return; 
        }
        
        try {
            const newTicket = {
                userName: currentUser.name,
                userRole: currentUser.role,
                subject: subject,
                message: message,
                date: getCurrentDate(),
                time: getCurrentTime(),
                status: 'قيد المعالجة',
                replies: []
            };
            
            await saveTicket(newTicket);
            
            document.getElementById('ticketSubject').value = "";
            document.getElementById('ticketMessage').value = "";
            document.getElementById('ticketResponse').innerHTML = "✅ تم إرسال طلبك بنجاح! سيتم الرد عليك قريباً.";
            setTimeout(() => { document.getElementById('ticketResponse').innerHTML = ""; }, 3000);
            
            await renderTickets();
            await logActivity("إرسال تذكرة", `قام بإرسال تذكرة دعم: ${subject}`);
            showToast("✅ تم إرسال طلبك بنجاح");
        } catch(error) {
            showToast("خطأ في الإرسال: " + error.message, true);
        }
    }
    
    async function replyToTicket(ticketId) {
        if(!canManageUsers()) { 
            showToast("غير مسموح - فقط للمسؤول", true); 
            return; 
        }
        
        if (!ticketId) {
            showToast("خطأ: معرف التذكرة غير صالح", true);
            return;
        }
        
        const replyText = prompt("✏️ أدخل ردك على هذه التذكرة:");
        if(!replyText) return;
        
        try {
            const response = await fetch(`/api/tickets/${ticketId}/reply`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    reply: {
                        adminName: currentUser.name,
                        reply: replyText,
                        date: getCurrentDate(),
                        time: getCurrentTime()
                    }
                })
            });
            
            if (!response.ok) {
                const error = await response.json();
                throw new Error(error.error || 'فشل في حفظ الرد');
            }
            
            await renderTickets();
            await logActivity("رد على تذكرة", `قام بالرد على التذكرة`);
            showToast("✅ تم إرسال الرد بنجاح");
            
        } catch(error) {
            console.error('خطأ في الرد:', error);
            showToast("خطأ في الرد: " + error.message, true);
        }
    }
    
    async function closeTicket(ticketId) {
        if(!canManageUsers()) { 
            showToast("غير مسموح - فقط للمسؤول", true); 
            return; 
        }
        
        if (!ticketId) {
            showToast("خطأ: معرف التذكرة غير صالح", true);
            return;
        }
        
        if(!confirm("هل أنت متأكد من إغلاق هذه التذكرة؟")) return;
        
        try {
            const response = await fetch(`/api/tickets/${ticketId}/close`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' }
            });
            
            if (!response.ok) {
                const error = await response.json();
                throw new Error(error.error || 'فشل في إغلاق التذكرة');
            }
            
            await renderTickets();
            await logActivity("إغلاق تذكرة", `قام بإغلاق التذكرة`);
            showToast("✅ تم إغلاق التذكرة");
            
        } catch(error) {
            showToast("خطأ في الإغلاق: " + error.message, true);
        }
    }

        try {
            let logs = await loadLogs();
            const start = document.getElementById('trackDateStart').value;
            const end = document.getElementById('trackDateEnd').value;
            let filtered = [...logs];
            
            if(start) {
                const s = new Date(start);
                filtered = filtered.filter(l => {
                    const [d,m,y] = l.date.split('/');
                    return new Date(`${y}-${m}-${d}`) >= s;

            document.getElementById('trackContent').innerHTML = html;
        } catch(error) {
            console.error('خطأ في renderTrack:', error);
            document.getElementById('trackContent').innerHTML = '<div class="region-table-card"><div class="region-table-header">❌ خطأ في تحميل سجل التتبع</div></div>';
        }
    }
    
    function resetTrackFilters() {
        document.getElementById('trackDateStart').value = "";
        document.getElementById('trackDateEnd').value = "";
        renderTrack();
        showToast("✅ تم إعادة ضبط فلاتر التتبع");
    }
    
    // ==================== دوال المستخدمين ====================
    async function renderUsers() {
        if(!canManageUsers()) return;
        try {
            let users = await loadUsers();
            document.getElementById('usersBody').innerHTML = users.map(u => `
                <tr>
                    <td>${u.name}</td>
                    <td>${u.role}</td>
                    <td class="${u.enabled ? 'status-صالح' : 'status-معطب'}">${u.enabled ? 'مفعل' : 'معطل'}</td>
                    <td><button class="btn-sm btn-warning" onclick="openPasswordModal('${u._id || u.id}', '${u.name}')">تغيير</button></td>
                    <td>${u.enabled ? `<button class="btn-sm btn-orange" onclick="toggleUser('${u._id || u.id}', false)">تعطيل</button>` : `<button class="btn-sm btn-green" onclick="toggleUser('${u._id || u.id}', true)">تفعيل</button>`}</td>
                    <td><button class="btn-sm btn-red" onclick="deleteUser('${u._id || u.id}')">حذف</button></td>
                </tr>
            `).join('');
        } catch(error) {
            console.error('خطأ:', error);
        }
    }
    
    async function addUser() {
        if(!canManageUsers()) { showToast("ليس لديك صلاحية!", true); return; }
        let u = document.getElementById('un').value.trim();
        let p = document.getElementById('up').value.trim();
        let r = document.getElementById('ur').value;
        if(!u || !p) return showToast("يرجى إدخال اسم المستخدم وكلمة المرور", true);
        
        try {
            let users = await loadUsers();
            if(users.find(x => x.name === u)) { showToast("اسم المستخدم موجود!", true); return; }
            await saveUser({ name: u, pass: p, role: r, enabled: true });
            document.getElementById('un').value = "";
            document.getElementById('up').value = "";
            await renderUsers();
            await logActivity("إضافة مستخدم", `قام بإضافة مستخدم جديد: ${u} (${r})`);
            showToast("✅ تم إضافة المستخدم");
        } catch(error) {
            showToast("خطأ في الإضافة: " + error.message, true);
        }
    }
    
    function openPasswordModal(userId, userName) {
        selectedUserId = userId;
        document.getElementById('modalUserName').innerHTML = `تغيير كلمة المرور للمستخدم: <strong>${userName}</strong>`;
        document.getElementById('newPassword').value = '';
        document.getElementById('confirmPassword').value = '';
        document.getElementById('passwordModal').style.display = 'flex';
    }
    
    function closePasswordModal() {
        document.getElementById('passwordModal').style.display = 'none';
        selectedUserId = null;
    }
    
    async function saveNewPassword() {
        if(!canManageUsers()) return;
        const np = document.getElementById('newPassword').value.trim();
        const cp = document.getElementById('confirmPassword').value.trim();
        if(!np) { showToast("كلمة المرور الجديدة مطلوبة", true); return; }
        if(np !== cp) { showToast("كلمة المرور غير متطابقة", true); return; }
        
        try {
            let users = await loadUsers();
            let user = users.find(u => (u._id || u.id).toString() === selectedUserId.toString());
            if(user) {
                user.pass = np;
                await updateUser(selectedUserId, user);
                closePasswordModal();
                await renderUsers();
                await logActivity("تغيير كلمة مرور", `قام بتغيير كلمة مرور المستخدم: ${user.name}`);
                showToast("✅ تم تغيير كلمة المرور");
            }
        } catch(error) {
            showToast("خطأ في تغيير كلمة المرور: " + error.message, true);
        }
    }
    
    async function toggleUser(userId, enable) {
        try {
            let users = await loadUsers();
            let user = users.find(u => (u._id || u.id).toString() === userId.toString());
            if(user) {
                user.enabled = enable;
                await updateUser(userId, user);
                await renderUsers();
                await logActivity(enable ? "تفعيل مستخدم" : "تعطيل مستخدم", `قام ${enable ? 'بتفعيل' : 'بتعطيل'} المستخدم: ${user.name}`);
                showToast(enable ? "✅ تم تفعيل المستخدم" : "⚠️ تم تعطيل المستخدم");
            }
        } catch(error) {
            showToast("خطأ: " + error.message, true);
        }
    }
    
    async function deleteUser(userId) {
        if(confirm("هل أنت متأكد من حذف هذا المستخدم؟")) {
            try {
                let users = await loadUsers();
                let user = users.find(u => (u._id || u.id).toString() === userId.toString());
                await deleteUserAPI(userId);
                await renderUsers();
                await logActivity("حذف مستخدم", `قام بحذف المستخدم: ${user?.name}`);
                showToast("✅ تم حذف المستخدم");
            } catch(error) {
                showToast("خطأ في الحذف: " + error.message, true);
            }
        }
    }
    
    // ==================== دوال تصدير واستيراد ====================
    async function exportAllData() {
        if(!canManageUsers()) { showToast("غير مسموح - هذه الخاصية للمسؤول فقط", true); return; }
        try {
            const exportData = await exportAllDataAPI();
            const dataStr = JSON.stringify(exportData, null, 2);
            const blob = new Blob([dataStr], {type: "application/json"});
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = `marine_data_backup_${new Date().toISOString().split('T')[0]}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            await logActivity("تصدير بيانات", "قام بتصدير جميع البيانات إلى ملف JSON");
            showToast("✅ تم تصدير البيانات بنجاح!");
        } catch(error) {
            showToast("خطأ في التصدير: " + error.message, true);
        }
    }
    
    async function importAllData(input) {
        if(!canManageUsers()) { showToast("غير مسموح - هذه الخاصية للمسؤول فقط", true); return; }
        if(!input.files || !input.files[0]) return;
        const file = input.files[0];
        const reader = new FileReader();
        reader.onload = async function(e) {
            try {
                const importedData = JSON.parse(e.target.result);
                await importAllDataAPI(importedData);
                await refreshAllPages();
                await logActivity("استيراد بيانات", "قام باستيراد البيانات من ملف JSON");
                showToast("✅ تم استيراد البيانات بنجاح!");
            } catch(err) {
                showToast("❌ خطأ في قراءة الملف: " + err.message, true);
            }
        };
        reader.readAsText(file);
        input.value = "";
    }
    
    // ==================== دوال التنقل ====================
    function showPage(page) {
        const pages = ['pageMain', 'pageMaint', 'pageEff', 'pageSupport', 'pageTrack', 'pageMap', 'pageUsers'];
        pages.forEach(p => document.getElementById(p).classList.add('hidden'));
        
        const isAdmin = currentUser && currentUser.role === "مسؤول";
        
        if(page === 'main') { 
            document.getElementById('pageMain').classList.remove('hidden');
        }
        else if(page === 'maint') { 
            document.getElementById('pageMaint').classList.remove('hidden'); 
            renderMaint();
        }
        else if(page === 'eff') { 
            document.getElementById('pageEff').classList.remove('hidden'); 
            renderEff(); 
        }
        else if(page === 'support') { 
            document.getElementById('pageSupport').classList.remove('hidden'); 
            renderTickets(); 
        }
        else if(page === 'track') { 
            if(isAdmin) { 
                document.getElementById('pageTrack').classList.remove('hidden'); 
                renderTrack(); 
            } else { 
                showToast("غير مسموح - هذه الصفحة للمسؤول فقط", true); 
            }
        }
        else if(page === 'map') { 
            document.getElementById('pageMap').classList.remove('hidden');
            setTimeout(() => {
                if (trackingMap) trackingMap.invalidateSize();
                loadLocations();
            }, 100);
        }
        else if(page === 'users') { 
            if(isAdmin) { 
                document.getElementById('pageUsers').classList.remove('hidden'); 
                renderUsers(); 
            } else { 
                showToast("غير مسموح - هذه الصفحة للمسؤول فقط", true); 
            }
        }
    }
    
    // ==================== ربط الدوال ====================
    window.doLogin = doLogin;
    window.logout = logout;
    window.showPage = showPage;
    window.updateZones = updateZones;
    window.addItem = addItem;
    window.editItem = editItem;
    window.delItem = delItem;
    window.renderMain = renderMain;
    window.renderMaint = renderMaint;
    window.renderEff = renderEff;
    window.renderTrack = renderTrack;
    window.resetMaintFilters = resetMaintFilters;
    window.resetTrackFilters = resetTrackFilters;
    window.clearMainSearch = clearMainSearch;
    window.switchChartType = switchChartType;
    window.sendTicket = sendTicket;
    window.replyToTicket = replyToTicket;
    window.closeTicket = closeTicket;
    window.addUser = addUser;
    window.openPasswordModal = openPasswordModal;
    window.closePasswordModal = closePasswordModal;
    window.saveNewPassword = saveNewPassword;
    window.toggleUser = toggleUser;
    window.deleteUser = deleteUser;
    window.exportAllData = exportAllData;
    window.importAllData = importAllData;
    window.refreshMain = refreshMain;
    window.refreshMaint = refreshMaint;
    window.refreshEff = refreshEff;
    window.refreshTickets = refreshTickets;
    window.refreshTrack = refreshTrack;
    window.refreshUsers = refreshUsers;
    window.refreshAllPages = refreshAllPages;
    window.scrollToTop = scrollToTop;
    window.scrollToBottom = scrollToBottom;
    window.startTracking = startTracking;
    window.stopTracking = stopTracking;
    window.loadLocations = loadLocations;
    window.centerMapOnUser = centerMapOnUser;
</script>
