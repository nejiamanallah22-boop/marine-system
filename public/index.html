<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منظومة الوسائل البحرية - نظام متكامل</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #2e7d32;
            --primary-dark: #1b5e20;
            --accent: #d9534f;
            --success: #28a745;
            --warning: #f39c12;
            --dark: #343a40;
            --light: #f8f9fa;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        /* شاشة تسجيل الدخول */
        .login-container {
            max-width: 450px;
            margin: 100px auto;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }
        
        .login-container h2 {
            color: var(--primary);
            margin-bottom: 30px;
        }
        
        .login-container input {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: 0.3s;
        }
        
        .login-container input:focus {
            border-color: var(--primary);
            outline: none;
        }
        
        .login-container button {
            width: 100%;
            padding: 15px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        
        .login-container button:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }
        
        /* التطبيق الرئيسي */
        .container {
            max-width: 1550px;
            margin: auto;
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        
        .header {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            padding: 20px 30px;
            border-radius: 15px;
            margin-bottom: 25px;
            position: relative;
        }
        
        .nav {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            color: white;
        }
        
        .btn-primary { background: var(--primary); }
        .btn-primary:hover { background: var(--primary-dark); transform: translateY(-2px); }
        .btn-danger { background: var(--accent); }
        .btn-warning { background: var(--warning); color: #333; }
        .btn-info { background: #17a2b8; }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
        }
        
        .stat-card:hover { transform: translateY(-5px); }
        .stat-card .number { font-size: 36px; font-weight: bold; }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        
        th, td {
            padding: 12px;
            text-align: center;
            border: 1px solid #ddd;
        }
        
        th {
            background: var(--primary);
            color: white;
            position: sticky;
            top: 0;
        }
        
        .status-صالح { color: var(--success); font-weight: bold; }
        .status-معطب { color: var(--accent); font-weight: bold; }
        .status-صيانة { color: var(--warning); font-weight: bold; }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 10000;
            justify-content: center;
            align-items: center;
        }
        
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            width: 400px;
            text-align: center;
        }
        
        .modal-content input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        
        .hidden { display: none; }
        
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--success);
            color: white;
            padding: 12px 24px;
            border-radius: 10px;
            z-index: 10001;
            animation: fadeOut 3s ease forwards;
        }
        
        @keyframes fadeOut {
            0% { opacity: 1; transform: translateY(0); }
            70% { opacity: 1; }
            100% { opacity: 0; transform: translateY(20px); visibility: hidden; }
        }
        
        @media (max-width: 768px) {
            th, td { font-size: 12px; padding: 8px; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

<!-- شاشة تسجيل الدخول -->
<div id="loginScreen" class="login-container">
    <i class="fas fa-ship" style="font-size: 60px; color: var(--primary); margin-bottom: 20px;"></i>
    <h2>⚓ منظومة الوسائل البحرية</h2>
    <p style="color: #666; margin-bottom: 20px;">نظام متكامل لإدارة الأسطول</p>
    <input type="text" id="loginUsername" placeholder="اسم المستخدم">
    <input type="password" id="loginPassword" placeholder="كلمة المرور">
    <button onclick="login()">دخول</button>
    <div id="loginError" style="color: red; margin-top: 15px; display: none;"></div>
</div>

<!-- التطبيق الرئيسي -->
<div id="appScreen" style="display: none;">
    <div class="container">
        <div class="header">
            <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px;">
                <h1><i class="fas fa-anchor"></i> منظومة متابعة الوسائل البحرية</h1>
                <div>
                    <span id="userInfo" style="background: rgba(255,255,255,0.2); padding: 8px 16px; border-radius: 30px;"></span>
                    <button class="btn btn-danger" onclick="logout()" style="margin-right: 10px;">خروج</button>
                </div>
            </div>
        </div>
        
        <div class="nav">
            <button class="btn btn-primary" onclick="showPage('dashboard')">📊 لوحة التحكم</button>
            <button class="btn btn-primary" onclick="showPage('vessels')">🚢 السجل العام</button>
            <button class="btn btn-warning" onclick="showPage('maintenance')">🛠️ سجل الصيانة</button>
            <button class="btn btn-info" onclick="showPage('stats')">📈 الإحصائيات</button>
            <button class="btn btn-info" onclick="showPage('support')">📞 الدعم الفني</button>
            <button id="trackBtn" class="btn btn-info" onclick="showPage('track')" style="display: none;">📊 التتبع</button>
            <button id="usersBtn" class="btn btn-danger" onclick="showPage('users')" style="display: none;">👥 المستخدمين</button>
        </div>
        
        <!-- صفحة لوحة التحكم -->
        <div id="pageDashboard">
            <div class="stats-grid" id="statsGrid"></div>
            <h3>🆕 آخر المراكب المضافة</h3>
            <div id="recentVessels"></div>
        </div>
        
        <!-- صفحة السجل العام -->
        <div id="pageVessels" style="display: none;">
            <div style="margin-bottom: 15px; display: flex; gap: 10px; flex-wrap: wrap;">
                <input type="text" id="searchInput" placeholder="🔍 بحث..." style="flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #ddd;">
                <button class="btn btn-primary" onclick="loadVessels()">🔄 تحديث</button>
                <button id="addVesselBtn" class="btn btn-success" onclick="showAddForm()" style="background: #28a745;">➕ إضافة مركب</button>
            </div>
            <div id="vesselsTable"></div>
        </div>
        
        <!-- صفحة إضافة/تعديل مركب -->
        <div id="pageAddForm" style="display: none;">
            <h3 id="formTitle">➕ إضافة مركب جديد</h3>
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin: 20px 0;">
                <input type="text" id="vesselName" placeholder="اسم المركب *">
                <input type="text" id="vesselNumber" placeholder="الرقم">
                <input type="number" id="vesselLength" placeholder="الطول (م)">
                <select id="vesselRegion">
                    <option value="">اختر الإقليم</option>
                    <option value="الشمال">الشمال</option>
                    <option value="الساحل">الساحل</option>
                    <option value="الوسط">الوسط</option>
                    <option value="الجنوب">الجنوب</option>
                </select>
                <input type="text" id="vesselZone" placeholder="المنطقة">
                <input type="text" id="vesselPort" placeholder="الميناء">
                <select id="vesselStatus">
                    <option value="صالح">صالح</option>
                    <option value="صيانة">صيانة</option>
                    <option value="معطب">معطب</option>
                </select>
                <input type="text" id="vesselBreakdown" placeholder="نوع العطب">
                <input type="date" id="vesselBreakdownDate">
                <input type="date" id="vesselEndDate">
            </div>
            <button class="btn btn-primary" onclick="saveVessel()">💾 حفظ</button>
            <button class="btn btn-warning" onclick="cancelForm()">❌ إلغاء</button>
        </div>
        
        <!-- صفحة سجل الصيانة -->
        <div id="pageMaintenance" style="display: none;">
            <div style="margin-bottom: 15px;">
                <input type="text" id="maintSearch" placeholder="🔍 بحث..." style="padding: 10px; border-radius: 8px; border: 1px solid #ddd; width: 100%;">
            </div>
            <div id="maintenanceTable"></div>
        </div>
        
        <!-- صفحة الإحصائيات -->
        <div id="pageStats" style="display: none;">
            <canvas id="statusChart" width="400" height="200"></canvas>
        </div>
        
        <!-- صفحة الدعم -->
        <div id="pageSupport" style="display: none;">
            <div style="background: #f8f9fa; padding: 20px; border-radius: 15px; margin-bottom: 20px;">
                <h3>📞 تواصل مع الدعم الفني</h3>
                <p><i class="fas fa-envelope"></i> support@marine.gov.tn</p>
                <p><i class="fas fa-phone"></i> +216 29 659 945</p>
                <hr style="margin: 15px 0;">
                <h4>📨 أرسل طلب دعم</h4>
                <input type="text" id="ticketSubject" placeholder="العنوان" style="width: 100%; padding: 10px; margin: 10px 0; border-radius: 8px; border: 1px solid #ddd;">
                <textarea id="ticketMessage" rows="5" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd;"></textarea>
                <button class="btn btn-primary" onclick="sendTicket()">إرسال</button>
            </div>
            <h3>📋 طلباتي السابقة</h3>
            <div id="ticketsList"></div>
        </div>
        
        <!-- صفحة التتبع (للمسؤول) -->
        <div id="pageTrack" style="display: none;">
            <div id="logsTable"></div>
        </div>
        
        <!-- صفحة إدارة المستخدمين (للمسؤول) -->
        <div id="pageUsers" style="display: none;">
            <div style="margin-bottom: 20px; padding: 20px; background: #f8f9fa; border-radius: 15px;">
                <h3>➕ إضافة مستخدم جديد</h3>
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-top: 15px;">
                    <input type="text" id="newUsername" placeholder="اسم المستخدم">
                    <input type="password" id="newPassword" placeholder="كلمة المرور">
                    <select id="newRole">
                        <option value="مشاهد">مشاهد</option>
                        <option value="محرر">محرر</option>
                        <option value="مسؤول">مسؤول</option>
                    </select>
                    <button class="btn btn-primary" onclick="addUser()">➕ إضافة</button>
                </div>
            </div>
            <div id="usersTable"></div>
        </div>
    </div>
</div>

<!-- نافذة تغيير كلمة المرور -->
<div id="passwordModal" class="modal">
    <div class="modal-content">
        <h3>🔐 تغيير كلمة المرور</h3>
        <input type="password" id="oldPassword" placeholder="كلمة المرور الحالية">
        <input type="password" id="newPassword1" placeholder="كلمة المرور الجديدة">
        <input type="password" id="newPassword2" placeholder="تأكيد كلمة المرور">
        <button class="btn btn-primary" onclick="changePassword()">تغيير</button>
        <button class="btn btn-warning" onclick="closePasswordModal()">إلغاء</button>
    </div>
</div>

<script>
    let currentUser = null;
    let vessels = [];
    let statusChart = null;
    let editingVesselId = null;
    
    // دوال مساعدة
    function showToast(message, isError = false) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.style.background = isError ? '#d9534f' : '#28a745';
        toast.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-triangle' : 'fa-check-circle'}"></i> ${message}`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    
    // تسجيل الدخول
    async function login() {
        const username = document.getElementById('loginUsername').value.trim();
        const password = document.getElementById('loginPassword').value;
        const errorDiv = document.getElementById('loginError');
        
        if (!username || !password) {
            errorDiv.innerHTML = 'يرجى إدخال اسم المستخدم وكلمة المرور';
            errorDiv.style.display = 'block';
            return;
        }
        
        try {
            const response = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            
            const data = await response.json();
            
            if (data.success) {
                currentUser = data.user;
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('appScreen').style.display = 'block';
                document.getElementById('userInfo').innerHTML = `<i class="fas fa-user"></i> ${currentUser.username} | ${currentUser.role}`;
                
                // إظهار/إخفاء أزرار المسؤول
                const isAdmin = currentUser.role === 'مسؤول';
                const isEditor = currentUser.role === 'محرر';
                
                document.getElementById('trackBtn').style.display = isAdmin ? 'inline-flex' : 'none';
                document.getElementById('usersBtn').style.display = isAdmin ? 'inline-flex' : 'none';
                document.getElementById('addVesselBtn').style.display = (isAdmin || isEditor) ? 'inline-flex' : 'none';
                
                await loadVessels();
                await loadStats();
                showPage('dashboard');
                showToast(`مرحباً ${username}`);
            } else {
                errorDiv.innerHTML = data.error || 'بيانات الدخول غير صحيحة';
                errorDiv.style.display = 'block';
            }
        } catch (err) {
            errorDiv.innerHTML = 'خطأ في الاتصال بالخادم';
            errorDiv.style.display = 'block';
        }
    }
    
    // تسجيل الخروج
    function logout() {
        currentUser = null;
        document.getElementById('loginScreen').style.display = 'block';
        document.getElementById('appScreen').style.display = 'none';
        document.getElementById('loginUsername').value = '';
        document.getElementById('loginPassword').value = '';
        document.getElementById('loginError').style.display = 'none';
        showToast('تم تسجيل الخروج');
    }
    
    // تحميل المراكب
    async function loadVessels() {
        try {
            const response = await fetch('/api/vessels');
            vessels = await response.json();
            renderVesselsTable();
            renderMaintenanceTable();
            updateRecentVessels();
        } catch (err) {
            showToast('خطأ في تحميل البيانات', true);
        }
    }
    
    // عرض جدول المراكب
    function renderVesselsTable() {
        const searchTerm = document.getElementById('searchInput')?.value.toLowerCase() || '';
        let filtered = vessels;
        
        if (searchTerm) {
            filtered = vessels.filter(v => 
                v.name.toLowerCase().includes(searchTerm) || 
                (v.number && v.number.toLowerCase().includes(searchTerm))
            );
        }
        
        if (!filtered.length) {
            document.getElementById('vesselsTable').innerHTML = '<p style="text-align:center; padding: 40px;">لا توجد مراكب مسجلة</p>';
            return;
        }
        
        let html = `<table>
            <thead>
                <tr><th>الاسم</th><th>الرقم</th><th>الطول</th><th>الفئة</th><th>الإقليم</th><th>المنطقة</th><th>الحالة</th><th>الإجراءات</th></tr>
            </thead>
            <tbody>`;
        
        filtered.forEach(v => {
            html += `<tr>
                <td><strong>${v.name}</strong></td>
                <td>${v.number || '-'}</td>
                <td>${v.length || '-'}ｍ</td>
                <td>${v.category || '-'}</td>
                <td>${v.region || '-'}</td>
                <td>${v.zone || '-'}</td>
                <td class="status-${v.status}">${v.status}</td>
                <td>
                    ${(currentUser?.role === 'مسؤول' || currentUser?.role === 'محرر') ? `<button class="btn btn-warning" style="padding: 5px 10px; font-size: 12px;" onclick="editVessel(${v.id})">✏️ تعديل</button>` : ''}
                    ${currentUser?.role === 'مسؤول' ? `<button class="btn btn-danger" style="padding: 5px 10px; font-size: 12px;" onclick="deleteVessel(${v.id})">🗑️ حذف</button>` : ''}
                </td>
            </tr>`;
        });
        
        html += `</tbody></table>`;
        document.getElementById('vesselsTable').innerHTML = html;
    }
    
    // عرض جدول الصيانة
    function renderMaintenanceTable() {
        const searchTerm = document.getElementById('maintSearch')?.value.toLowerCase() || '';
        const maintenanceVessels = vessels.filter(v => v.status === 'معطب' || v.status === 'صيانة');
        let filtered = maintenanceVessels;
        
        if (searchTerm) {
            filtered = maintenanceVessels.filter(v => 
                v.name.toLowerCase().includes(searchTerm) ||
                (v.breakdown_type && v.breakdown_type.toLowerCase().includes(searchTerm))
            );
        }
        
        if (!filtered.length) {
            document.getElementById('maintenanceTable').innerHTML = '<p style="text-align:center; padding: 40px;">⚠️ لا توجد مراكب معطوبة أو تحت الصيانة</p>';
            return;
        }
        
        let html = `<table>
            <thead>
                <tr><th>الاسم</th><th>الإقليم</th><th>نوع العطب</th><th>تاريخ العطب</th><th>تاريخ الانتهاء</th><th>الحالة</th></tr>
            </thead>
            <tbody>`;
        
        filtered.forEach(v => {
            html += `<tr>
                <td><strong>${v.name}</strong></td>
                <td>${v.region || '-'}</td>
                <td>${v.breakdown_type || '-'}</td>
                <td>${v.breakdown_date || '-'}</td>
                <td>${v.end_date || '-'}</td>
                <td class="status-${v.status}">${v.status}</td>
            </tr>`;
        });
        
        html += `</tbody><table>`;
        document.getElementById('maintenanceTable').innerHTML = html;
    }
    
    // إظهار نموذج الإضافة
    function showAddForm() {
        editingVesselId = null;
        document.getElementById('formTitle').innerHTML = '➕ إضافة مركب جديد';
        document.getElementById('vesselName').value = '';
        document.getElementById('vesselNumber').value = '';
        document.getElementById('vesselLength').value = '';
        document.getElementById('vesselRegion').value = '';
        document.getElementById('vesselZone').value = '';
        document.getElementById('vesselPort').value = '';
        document.getElementById('vesselStatus').value = 'صالح';
        document.getElementById('vesselBreakdown').value = '';
        document.getElementById('vesselBreakdownDate').value = '';
        document.getElementById('vesselEndDate').value = '';
        showPage('addForm');
    }
    
    // تعديل مركب
    function editVessel(id) {
        const vessel = vessels.find(v => v.id === id);
        if (!vessel) return;
        
        editingVesselId = id;
        document.getElementById('formTitle').innerHTML = '✏️ تعديل مركب';
        document.getElementById('vesselName').value = vessel.name;
        document.getElementById('vesselNumber').value = vessel.number || '';
        document.getElementById('vesselLength').value = vessel.length || '';
        document.getElementById('vesselRegion').value = vessel.region || '';
        document.getElementById('vesselZone').value = vessel.zone || '';
        document.getElementById('vesselPort').value = vessel.port || '';
        document.getElementById('vesselStatus').value = vessel.status;
        document.getElementById('vesselBreakdown').value = vessel.breakdown_type || '';
        document.getElementById('vesselBreakdownDate').value = vessel.breakdown_date || '';
        document.getElementById('vesselEndDate').value = vessel.end_date || '';
        showPage('addForm');
    }
    
    // حفظ مركب
    async function saveVessel() {
        const name = document.getElementById('vesselName').value.trim();
        if (!name) {
            showToast('اسم المركب مطلوب', true);
            return;
        }
        
        const vessel = {
            name: name,
            number: document.getElementById('vesselNumber').value,
            length: parseFloat(document.getElementById('vesselLength').value) || 0,
            region: document.getElementById('vesselRegion').value,
            zone: document.getElementById('vesselZone').value,
            port: document.getElementById('vesselPort').value,
            support_location: '',
            status: document.getElementById('vesselStatus').value,
            breakdown_type: document.getElementById('vesselBreakdown').value,
            breakdown_date: document.getElementById('vesselBreakdownDate').value,
            end_date: document.getElementById('vesselEndDate').value,
            reference: ''
        };
        
        try {
            let url = '/api/vessels';
            let method = 'POST';
            
            if (editingVesselId) {
                url = `/api/vessels/${editingVesselId}`;
                method = 'PUT';
            }
            
            const response = await fetch(url, {
                method: method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(vessel)
            });
            
            const data = await response.json();
            
            if (data.success) {
                showToast(editingVesselId ? '✅ تم التعديل بنجاح' : '✅ تم الإضافة بنجاح');
                await loadVessels();
                await loadStats();
                showPage('vessels');
            } else {
                showToast('خطأ في الحفظ', true);
            }
        } catch (err) {
            showToast('خطأ في الاتصال', true);
        }
    }
    
    // حذف مركب
    async function deleteVessel(id) {
        if (!confirm('⚠️ هل أنت متأكد من حذف هذا المركب؟')) return;
        
        try {
            const response = await fetch(`/api/vessels/${id}`, { method: 'DELETE' });
            const data = await response.json();
            
            if (data.success) {
                showToast('✅ تم الحذف بنجاح');
                await loadVessels();
                await loadStats();
            }
        } catch (err) {
            showToast('خطأ في الحذف', true);
        }
    }
    
    // إلغاء النموذج
    function cancelForm() {
        showPage('vessels');
    }
    
    // تحميل الإحصائيات
    async function loadStats() {
        try {
            const response = await fetch('/api/stats');
            const stats = await response.json();
            
            document.getElementById('statsGrid').innerHTML = `
                <div class="stat-card"><div class="number">${stats.total}</div><div>🚢 إجمالي المراكب</div></div>
                <div class="stat-card"><div class="number">${stats.active}</div><div>✅ الصالح</div></div>
                <div class="stat-card"><div class="number">${stats.maintenance}</div><div>🔧 تحت الصيانة</div></div>
                <div class="stat-card"><div class="number">${stats.broken}</div><div>⚠️ المعطوب</div></div>
                <div class="stat-card"><div class="number">${stats.efficiency}%</div><div>📈 نسبة النجاعة</div></div>
                <div class="stat-card"><div class="number">${stats.totalUsers}</div><div>👥 المستخدمين</div></div>
            `;
            
            // تحديث الرسم البياني
            if (statusChart) statusChart.destroy();
            const ctx = document.getElementById('statusChart').getContext('2d');
            statusChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['صالح', 'صيانة', 'معطب'],
                    datasets: [{
                        data: [stats.active, stats.maintenance, stats.broken],
                        backgroundColor: ['#28a745', '#f39c12', '#d9534f']
                    }]
                },
                options: { responsive: true }
            });
        } catch (err) {
            console.error('خطأ في تحميل الإحصائيات', err);
        }
    }
    
    // تحديث آخر المراكب
    function updateRecentVessels() {
        const recent = vessels.slice(0, 5);
        let html = `<tr>
            <thead><tr><th>الاسم</th><th>الرقم</th><th>الحالة</th></tr></thead>
            <tbody>`;
        recent.forEach(v => {
            html += `<tr><td>${v.name}</td><td>${v.number || '-'}</td><td class="status-${v.status}">${v.status}</td></tr>`;
        });
        html += `</tbody>`;
        document.getElementById('recentVessels').innerHTML = html;
    }
    
    // إرسال تذكرة دعم
    async function sendTicket() {
        const subject = document.getElementById('ticketSubject').value.trim();
        const message = document.getElementById('ticketMessage').value.trim();
        
        if (!subject || !message) {
            showToast('يرجى إدخال عنوان ورسالة', true);
            return;
        }
        
        try {
            const response = await fetch('/api/tickets', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    username: currentUser.username,
                    subject: subject,
                    message: message
                })
            });
            
            const data = await response.json();
            
            if (data.success) {
                showToast('✅ تم إرسال طلبك بنجاح');
                document.getElementById('ticketSubject').value = '';
                document.getElementById('ticketMessage').value = '';
                await loadTickets();
            }
        } catch (err) {
            showToast('خطأ في الإرسال', true);
        }
    }
    
    // تحميل التذاكر
    async function loadTickets() {
        try {
            const response = await fetch('/api/tickets');
            const tickets = await response.json();
            const userTickets = tickets.filter(t => t.username === currentUser.username);
            
            let html = `<table>
                <thead><tr><th>التاريخ</th><th>العنوان</th><th>الحالة</th></tr></thead>
                <tbody>`;
            
            userTickets.slice(0, 10).forEach(t => {
                const date = new Date(t.createdAt).toLocaleDateString('ar-EG');
                html += `<tr>
                    <td>${date}</td>
                    <td>${t.subject}</td>
                    <td style="color: #f39c12;">${t.status}</td>
                </tr>`;
            });
            
            html += `</tbody>`;
            document.getElementById('ticketsList').innerHTML = html || '<p>لا توجد تذاكر</p>';
        } catch (err) {
            console.error('خطأ في تحميل التذاكر', err);
        }
    }
    
    // تغيير كلمة المرور
    function openPasswordModal() {
        document.getElementById('passwordModal').style.display = 'flex';
    }
    
    function closePasswordModal() {
        document.getElementById('passwordModal').style.display = 'none';
        document.getElementById('oldPassword').value = '';
        document.getElementById('newPassword1').value = '';
        document.getElementById('newPassword2').value = '';
    }
    
    async function changePassword() {
        const oldPassword = document.getElementById('oldPassword').value;
        const newPassword1 = document.getElementById('newPassword1').value;
        const newPassword2 = document.getElementById('newPassword2').value;
        
        if (!oldPassword || !newPassword1) {
            showToast('جميع الحقول مطلوبة', true);
            return;
        }
        
        if (newPassword1 !== newPassword2) {
            showToast('كلمة المرور الجديدة غير متطابقة', true);
            return;
        }
        
        if (newPassword1.length < 4) {
            showToast('كلمة المرور يجب أن تكون 4 أحرف على الأقل', true);
            return;
        }
        
        try {
            const response = await fetch('/api/change-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    userId: currentUser.id,
                    oldPassword: oldPassword,
                    newPassword: newPassword1
                })
            });
            
            const data = await response.json();
            
            if (data.success) {
                showToast('✅ تم تغيير كلمة المرور بنجاح');
                closePasswordModal();
            } else {
                showToast(data.error || 'خطأ في تغيير كلمة المرور', true);
            }
        } catch (err) {
            showToast('خطأ في الاتصال', true);
        }
    }
    
    // إدارة المستخدمين (للمسؤول)
    async function loadUsers() {
        if (currentUser?.role !== 'مسؤول') return;
        
        try {
            const response = await fetch('/api/users');
            const users = await response.json();
            
            let html = `<table>
                <thead><tr><th>اسم المستخدم</th><th>الصلاحية</th><th>الحالة</th><th>الإجراءات</th></tr></thead>
                <tbody>`;
            
            users.forEach(u => {
                html += `<tr>
                    <td>${u.username}</td>
                    <td>${u.role}</td>
                    <td class="${u.enabled ? 'status-صالح' : 'status-معطب'}">${u.enabled ? 'مفعل' : 'معطل'}</td>
                    <td>
                        <button class="btn btn-warning" style="padding: 5px 10px; font-size: 12px;" onclick="resetUserPassword(${u.id})">🔑 تغيير كلمة المرور</button>
                        ${u.enabled ? 
                            `<button class="btn btn-warning" style="padding: 5px 10px; font-size: 12px;" onclick="toggleUser(${u.id}, false)">🔒 تعطيل</button>` :
                            `<button class="btn btn-primary" style="padding: 5px 10px; font-size: 12px;" onclick="toggleUser(${u.id}, true)">🔓 تفعيل</button>`
                        }
                        ${u.username !== 'admin' ? 
                            `<button class="btn btn-danger" style="padding: 5px 10px; font-size: 12px;" onclick="deleteUser(${u.id})">🗑️ حذف</button>` : ''
                        }
                    </td>
                </tr>`;
            });
            
            html += `</tbody>`;
            document.getElementById('usersTable').innerHTML = html;
        } catch (err) {
            showToast('خطأ في تحميل المستخدمين', true);
        }
    }
    
    async function addUser() {
        const username = document.getElementById('newUsername').value.trim();
        const password = document.getElementById('newPassword').value;
        const role = document.getElementById('newRole').value;
        
        if (!username || !password) {
            showToast('اسم المستخدم وكلمة المرور مطلوبة', true);
            return;
        }
        
        try {
            const response = await fetch('/api/users', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password, role, adminId: currentUser.id })
            });
            
            const data = await response.json();
            
            if (data.success) {
                showToast('✅ تم إضافة المستخدم');
                document.getElementById('newUsername').value = '';
                document.getElementById('newPassword').value = '';
                await loadUsers();
            } else {
                showToast(data.error || 'خطأ في الإضافة', true);
            }
        } catch (err) {
            showToast('خطأ في الاتصال', true);
        }
    }
    
    async function resetUserPassword(userId) {
        const newPassword = prompt('أدخل كلمة المرور الجديدة:');
        if (!newPassword || newPassword.length < 4) {
            showToast('كلمة المرور يجب أن تكون 4 أحرف على الأقل', true);
            return;
        }
        
        try {
            const response = await fetch(`/api/users/${userId}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password: newPassword, adminId: currentUser.id })
            });
            
            const data = await response.json();
            
            if (data.success) {
                showToast('✅ تم تغيير كلمة المرور');
            } else {
                showToast(data.error || 'خطأ', true);
            }
        } catch (err) {
            showToast('خطأ في الاتصال', true);
        }
    }
    
    async function toggleUser(userId, enabled) {
        try {
            const response = await fetch(`/api/users/${userId}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ enabled: enabled, adminId: currentUser.id })
            });
            
            const data = await response.json();
            
            if (data.success) {
                showToast(enabled ? '✅ تم تفعيل المستخدم' : '⚠️ تم تعطيل المستخدم');
                await loadUsers();
            }
        } catch (err) {
            showToast('خطأ', true);
        }
    }
    
    async function deleteUser(userId) {
        if (!confirm('⚠️ هل أنت متأكد من حذف هذا المستخدم؟')) return;
        
        try {
            const response = await fetch(`/api/users/${userId}`, {
                method: 'DELETE',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ adminId: currentUser.id })
            });
            
            const data = await response.json();
            
            if (data.success) {
                showToast('✅ تم حذف المستخدم');
                await loadUsers();
            }
        } catch (err) {
            showToast('خطأ في الحذف', true);
        }
    }
    
    // تحميل سجل النشاطات
    async function loadLogs() {
        if (currentUser?.role !== 'مسؤول') return;
        
        try {
            const response = await fetch('/api/logs');
            const logs = await response.json();
            
            let html = `<table>
                <thead><tr><th>التاريخ</th><th>المستخدم</th><th>الإجراء</th><th>التفاصيل</th><th>IP</th></tr></thead>
                <tbody>`;
            
            logs.slice(0, 50).forEach(l => {
                const date = new Date(l.date).toLocaleString('ar-EG');
                html += `<tr>
                    <td>${date}</td>
                    <td>${l.username}</td>
                    <td>${l.action}</td>
                    <td>${l.details}</td>
                    <td>${l.ip}</td>
                </tr>`;
            });
            
            html += `</tbody>`;
            document.getElementById('logsTable').innerHTML = html;
        } catch (err) {
            console.error('خطأ في تحميل السجلات', err);
        }
    }
    
    // التنقل بين الصفحات
    function showPage(page) {
        const pages = ['dashboard', 'vessels', 'addForm', 'maintenance', 'stats', 'support', 'track', 'users'];
        pages.forEach(p => {
            const el = document.getElementById(`page${p.charAt(0).toUpperCase() + p.slice(1)}`);
            if (el) el.style.display = 'none';
        });
        
        document.getElementById(`page${page.charAt(0).toUpperCase() + page.slice(1)}`).style.display = 'block';
        
        if (page === 'track' && currentUser?.role === 'مسؤول') loadLogs();
        if (page === 'users' && currentUser?.role === 'مسؤول') loadUsers();
        if (page === 'support') loadTickets();
    }
    
    // ربط الدوال العامة
    window.login = login;
    window.logout = logout;
    window.showPage = showPage;
    window.loadVessels = loadVessels;
    window.showAddForm = showAddForm;
    window.saveVessel = saveVessel;
    window.cancelForm = cancelForm;
    window.editVessel = editVessel;
    window.deleteVessel = deleteVessel;
    window.sendTicket = sendTicket;
    window.openPasswordModal = openPasswordModal;
    window.closePasswordModal = closePasswordModal;
    window.changePassword = changePassword;
    window.addUser = addUser;
    window.resetUserPassword = resetUserPassword;
    window.toggleUser = toggleUser;
    window.deleteUser = deleteUser;
</script>
</body>
</html>
