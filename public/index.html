<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منظومة الوسائل البحرية</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Segoe UI',sans-serif;background:#f4f7f9;direction:rtl;padding:20px}
        .container{max-width:1400px;margin:auto;background:#fff;padding:20px;border-radius:10px;box-shadow:0 5px 20px rgba(0,0,0,0.1)}
        header{background:#2e7d32;color:#fff;padding:15px;border-radius:10px;text-align:center;margin-bottom:20px}
        .nav{display:flex;gap:10px;justify-content:center;margin-bottom:20px;flex-wrap:wrap}
        .btn{padding:10px 20px;border:none;border-radius:5px;cursor:pointer;font-weight:bold;color:#fff}
        .btn-primary{background:#2e7d32}
        .btn-warning{background:#f39c12}
        .btn-danger{background:#d9534f}
        .btn-info{background:#17a2b8}
        .btn-sm{padding:5px 10px;font-size:0.85em}
        .form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;background:#f9f9f9;padding:20px;border-radius:10px;margin-bottom:20px}
        input,select{padding:10px;border:1px solid #ddd;border-radius:5px;width:100%}
        table{width:100%;border-collapse:collapse;margin-top:10px}
        th,td{border:1px solid #ddd;padding:10px;text-align:center}
        th{background:#2e7d32;color:#fff}
        .hidden{display:none}
        .status-صالح{color:green;font-weight:bold}
        .status-معطب{color:red;font-weight:bold}
        .status-صيانة{color:orange;font-weight:bold}
        .filter-bar{background:#e9ecef;padding:15px;border-radius:8px;margin-bottom:15px;display:flex;gap:15px;flex-wrap:wrap;align-items:center}
        .login-box{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#fff;padding:30px;border-radius:15px;width:350px;text-align:center;box-shadow:0 10px 30px rgba(0,0,0,0.3);z-index:9999}
        .login-box input{width:100%;padding:12px;margin-bottom:15px;border:1px solid #ccc;border-radius:8px}
        .login-box button{width:100%}
        .stats-cards{display:flex;gap:15px;margin-bottom:25px;flex-wrap:wrap;justify-content:center}
        .stat-card{background:#fff;border-radius:12px;padding:15px 25px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,0.1);border-top:4px solid #2e7d32}
        .stat-card .number{font-size:28px;font-weight:bold;color:#2e7d32}
        .map-container{height:500px;margin:15px 0;border-radius:10px;overflow:hidden;border:2px solid #2e7d32}
        #trackMap{height:100%;width:100%}
        .toast{position:fixed;bottom:20px;right:20px;background:#2e7d32;color:#fff;padding:12px 24px;border-radius:8px;z-index:10001;animation:fadeOut 3s forwards}
        @keyframes fadeOut{0%{opacity:1}70%{opacity:1}100%{opacity:0;visibility:hidden}}
        .role-badge{background:#ffd966;color:#2e7d32;padding:4px 12px;border-radius:20px}
        .scrollable-table{overflow-x:auto;max-height:500px;overflow-y:auto}
        .chart-box{background:#f9f9f9;padding:20px;border-radius:12px;margin:10px}
        .charts-container{display:flex;flex-wrap:wrap;gap:20px}
        canvas{max-height:300px}
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-box">
        <h2 style="color:#2e7d32">⚓ منظومة الوسائل البحرية</h2>
        <input type="text" id="username" placeholder="اسم المستخدم">
        <input type="password" id="password" placeholder="كلمة المرور">
        <button class="btn btn-primary" onclick="doLogin()">دخول</button>
        <div id="loginError" style="color:red;margin-top:10px"></div>
    </div>
</div>

<div id="mainApp" class="container" style="display:none">
    <header>
        <h1>⚓ منظومة متابعة الوسائل البحرية</h1>
        <div style="display:flex; justify-content:space-between; margin-top:10px; flex-wrap:wrap">
            <span id="userRoleDisplay" class="role-badge"></span>
            <button class="btn btn-danger btn-sm" onclick="logout()">خروج</button>
        </div>
    </header>

    <div class="nav">
        <button class="btn btn-primary" onclick="showPage('main')">⚓ الأسطول</button>
        <button class="btn btn-warning" onclick="showPage('maint')">🛠️ الصيانة</button>
        <button class="btn btn-info" onclick="showPage('eff')">📈 الجاهزية</button>
        <button class="btn btn-info" onclick="showPage('map')">🗺️ الخريطة</button>
        <button id="usersBtn" class="btn btn-danger" onclick="showPage('users')" style="display:none">👥 المستخدمين</button>
    </div>

    <div id="inputArea" class="form-grid">
        <input type="text" id="iName" placeholder="اسم المركب">
        <input type="text" id="iNum" placeholder="الرقم">
        <input type="number" id="iLen" placeholder="الطول (م)">
        <select id="iReg" onchange="updateZones()">
            <option value="">الإقليم</option>
            <option value="الشمال">الشمال</option>
            <option value="الساحل">الساحل</option>
            <option value="الوسط">الوسط</option>
            <option value="الجنوب">الجنوب</option>
        </select>
        <select id="iZone"><option value="">المنطقة</option></select>
        <input type="text" id="iPort" placeholder="الميناء">
        <input type="text" id="iSupp" placeholder="التعزيز">
        <select id="iStat">
            <option value="صالح">صالح</option>
            <option value="معطب">معطب</option>
            <option value="صيانة">صيانة</option>
        </select>
        <input type="text" id="iBreak" placeholder="العطب">
        <input type="date" id="iDate" placeholder="تاريخ العطب">
        <input type="date" id="iEnd" placeholder="تاريخ الانتهاء">
        <input type="text" id="iRef" placeholder="المرجع">
        <button class="btn btn-primary" onclick="addItem()">حفظ</button>
        <button class="btn btn-warning" onclick="clearForm()">مسح</button>
    </div>

    <div id="pageMain">
        <div class="filter-bar">
            <input type="text" id="searchMain" placeholder="بحث" onkeyup="renderMain()" style="flex:1">
            <select id="fCatMain" onchange="renderMain()"><option value="الكل">الكل</option></select>
            <select id="fRegMain" onchange="renderMain()"><option value="الكل">الكل</option></select>
            <button class="btn btn-primary btn-sm" onclick="renderMain()">تحديث</button>
        </div>
        <div class="scrollable-table">
            <table>
                <thead><tr><th>الاسم</th><th>الرقم</th><th>الطول</th><th>الفئة</th><th>الإقليم</th><th>المنطقة</th><th>الحالة</th><th>العطب</th><th>إجراء</th></tr></thead>
                <tbody id="mainBody"></tbody>
            </table>
        </div>
    </div>

    <div id="pageMaint" class="hidden">
        <div class="filter-bar">
            <input type="text" id="searchMaint" placeholder="بحث" onkeyup="renderMaint()" style="flex:1">
            <select id="fRegMaint" onchange="renderMaint()"><option value="الكل">الكل</option></select>
            <button class="btn btn-primary btn-sm" onclick="renderMaint()">تحديث</button>
        </div>
        <div class="scrollable-table">
            <table>
                <thead><tr><th>الاسم</th><th>الرقم</th><th>الإقليم</th><th>الحالة</th><th>العطب</th><th>تاريخ العطب</th><th>الانتهاء</th><th>إجراء</th></tr></thead>
                <tbody id="maintBody"></tbody>
            </table>
        </div>
    </div>

    <div id="pageEff" class="hidden">
        <div class="stats-cards" id="statsCards"></div>
        <div class="charts-container">
            <div class="chart-box"><canvas id="statusChart"></canvas></div>
        </div>
    </div>

    <div id="pageMap" class="hidden">
        <div class="filter-bar">
            <button class="btn btn-info btn-sm" onclick="startTracking()">📍 مشاركة الموقع</button>
            <button class="btn btn-danger btn-sm" onclick="stopTracking()" id="stopBtn" style="display:none">⏹️ إيقاف</button>
            <button class="btn btn-primary btn-sm" onclick="loadLocations()">تحديث الخريطة</button>
        </div>
        <div class="map-container"><div id="trackMap"></div></div>
    </div>

    <div id="pageUsers" class="hidden">
        <div class="form-grid">
            <input type="text" id="un" placeholder="اسم المستخدم">
            <input type="password" id="up" placeholder="كلمة السر">
            <select id="ur"><option value="مشاهد">مشاهد</option><option value="محرر">محرر</option><option value="مسؤول">مسؤول</option></select>
            <button class="btn btn-primary" onclick="addUser()">إضافة</button>
        </div>
        <div class="scrollable-table">
            <table>
                <thead><tr><th>الاسم</th><th>الصلاحية</th><th>الحالة</th><th>إجراءات</th></tr></thead>
                <tbody id="usersBody"></tbody>
            </table>
        </div>
    </div>
</div>

<div id="passwordModal" class="modal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:10000;justify-content:center;align-items:center">
    <div style="background:#fff;padding:25px;border-radius:15px;width:350px;text-align:center">
        <h3>تغيير كلمة المرور</h3>
        <p id="modalUserName"></p>
        <input type="password" id="newPassword" placeholder="كلمة المرور الجديدة" style="width:100%;padding:10px;margin:10px 0">
        <input type="password" id="confirmPassword" placeholder="تأكيد" style="width:100%;padding:10px;margin:10px 0">
        <button class="btn btn-primary" onclick="saveNewPassword()">حفظ</button>
        <button class="btn btn-danger" onclick="closePasswordModal()">إلغاء</button>
    </div>
</div>

<script>
// ==================== المتغيرات ====================
let currentUser = null;
let selectedUserId = null;
let statusChart = null;
let trackingMap = null;
let trackingMarkers = {};
let trackingInterval = null;
let socket = null;

const ZONES = {
    "الشمال": ["تونس", "بنزرت", "طبرقة"],
    "الساحل": ["سوسة", "المنستير", "نابل"],
    "الوسط": ["صفاقس", "المهدية", "قرقنة"],
    "الجنوب": ["جرجيس", "جربة", "قابس"]
};

// ==================== دوال مساعدة ====================
function showToast(msg, isError) {
    let t = document.createElement('div');
    t.className = 'toast';
    t.style.background = isError ? '#d9534f' : '#2e7d32';
    t.innerHTML = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 3000);
}

function formatDate(d) {
    if (!d) return '-';
    let date = new Date(d);
    return date.getDate().toString().padStart(2,'0') + '/' + (date.getMonth()+1).toString().padStart(2,'0') + '/' + date.getFullYear();
}

function getCat(len) {
    let n = parseFloat(len);
    if (n === 11) return "البروق";
    if (n >= 8 && n <= 12) return "صقور";
    if (n > 12 && n <= 25) return "خوافر";
    if (n >= 30) return "طوافات";
    return "زوارق مزدوجة";
}

function canEdit() {
    return currentUser && (currentUser.role === "مسؤول" || currentUser.role === "محرر");
}

function canDelete() {
    return currentUser && currentUser.role === "مسؤول";
}

function canManageUsers() {
    return currentUser && currentUser.role === "مسؤول";
}

function clearForm() {
    document.getElementById('iName').value = '';
    document.getElementById('iNum').value = '';
    document.getElementById('iLen').value = '';
    document.getElementById('iReg').value = '';
    document.getElementById('iZone').innerHTML = '<option value="">المنطقة</option>';
    document.getElementById('iPort').value = '';
    document.getElementById('iSupp').value = '';
    document.getElementById('iStat').value = 'صالح';
    document.getElementById('iBreak').value = '';
    document.getElementById('iDate').value = '';
    document.getElementById('iEnd').value = '';
    document.getElementById('iRef').value = '';
}

// ==================== API ====================
async function apiCall(url, method, body) {
    let opt = { method, headers: { 'Content-Type': 'application/json' } };
    if (body) opt.body = JSON.stringify(body);
    let res = await fetch(url, opt);
    if (!res.ok) throw new Error(await res.text());
    return res.json();
}

async function loadVessels() { return apiCall('/api/vessels', 'GET'); }
async function saveVessel(v) { return apiCall('/api/vessels', 'POST', v); }
async function updateVessel(id, v) { return apiCall(`/api/vessels/${id}`, 'PUT', v); }
async function deleteVessel(id) { return apiCall(`/api/vessels/${id}`, 'DELETE'); }
async function loadUsers() { return apiCall('/api/users', 'GET'); }
async function saveUser(u) { return apiCall('/api/users', 'POST', u); }
async function updateUser(id, u) { return apiCall(`/api/users/${id}`, 'PUT', u); }
async function deleteUserAPI(id) { return apiCall(`/api/users/${id}`, 'DELETE'); }
async function loginAPI(n, p) { return apiCall('/api/login', 'POST', { name: n, pass: p }); }

// ==================== Socket ====================
function initSocket() {
    if (socket) return;
    socket = io();
    socket.on('connect', () => {
        if (currentUser) {
            socket.emit('register-user', { userId: currentUser.id, userName: currentUser.name, userRole: currentUser.role });
        }
    });
    socket.on('receive-location', (data) => {
        if (currentUser.role === 'مسؤول' || data.userId === currentUser.id) {
            updateMarker(data.userName, data.lat, data.lng);
        }
    });
}

function initMap() {
    if (trackingMap) return;
    trackingMap = L.map('trackMap').setView([34.5, 9.5], 7);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; OpenStreetMap'
    }).addTo(trackingMap);
}

function updateMarker(name, lat, lng) {
    if (!trackingMap) initMap();
    if (trackingMarkers[name]) {
        trackingMarkers[name].setLatLng([lat, lng]);
    } else {
        trackingMarkers[name] = L.marker([lat, lng]).addTo(trackingMap);
        trackingMarkers[name].bindPopup(`<b>${name}</b><br>📍 ${lat}, ${lng}`);
    }
}

function startTracking() {
    if (!currentUser) { showToast("تسجيل الدخول أولاً", true); return; }
    if (!navigator.geolocation) { showToast("المتصفح لا يدعم الموقع", true); return; }
    if (!socket) initSocket();
    
    trackingInterval = setInterval(() => {
        navigator.geolocation.getCurrentPosition(pos => {
            socket.emit('send-location', { lat: pos.coords.latitude, lng: pos.coords.longitude });
        });
    }, 5000);
    
    document.getElementById('stopBtn').style.display = 'inline-block';
    showToast("بدأ مشاركة الموقع", false);
}

function stopTracking() {
    if (trackingInterval) clearInterval(trackingInterval);
    document.getElementById('stopBtn').style.display = 'none';
    showToast("تم إيقاف المشاركة", false);
}

async function loadLocations() {
    try {
        let locs = await apiCall('/api/locations', 'GET');
        if (!trackingMap) initMap();
        Object.values(trackingMarkers).forEach(m => m.remove());
        trackingMarkers = {};
        locs.forEach(l => updateMarker(l.userName, l.lat, l.lng));
        showToast(`تم تحميل ${locs.length} موقع`, false);
    } catch(e) { showToast("خطأ", true); }
}

// ==================== تسجيل الدخول ====================
async function doLogin() {
    let u = document.getElementById('username').value.trim();
    let p = document.getElementById('password').value.trim();
    if (!u || !p) {
        document.getElementById('loginError').innerHTML = "يرجى إدخال البيانات";
        return;
    }
    try {
        let user = await loginAPI(u, p);
        currentUser = user;
        document.getElementById('loginOverlay').style.display = 'none';
        document.getElementById('mainApp').style.display = 'block';
        document.getElementById('userRoleDisplay').innerHTML = `👤 ${currentUser.name} | 🔑 ${currentUser.role}`;
        
        let isAdmin = currentUser.role === "مسؤول";
        document.getElementById('usersBtn').style.display = isAdmin ? "inline-block" : "none";
        
        initSocket();
        initMap();
        
        // تحميل الفئات للأقاليم
        let cats = [...new Set(await loadVessels().then(v => v.map(v => v.cat)))];
        let catSelect = document.getElementById('fCatMain');
        cats.forEach(c => { let opt = document.createElement('option'); opt.value = c; opt.textContent = c; catSelect.appendChild(opt); });
        
        let regions = Object.keys(ZONES);
        let regSelectMain = document.getElementById('fRegMain');
        let regSelectMaint = document.getElementById('fRegMaint');
        regions.forEach(r => {
            let opt1 = document.createElement('option'); opt1.value = r; opt1.textContent = r; regSelectMain.appendChild(opt1);
            let opt2 = document.createElement('option'); opt2.value = r; opt2.textContent = r; regSelectMaint.appendChild(opt2);
        });
        
        await renderMain();
        await renderMaint();
        await renderEff();
        if (isAdmin) await renderUsers();
        
        showToast(`مرحباً ${u}`, false);
    } catch(e) {
        document.getElementById('loginError').innerHTML = e.message;
    }
}

function logout() {
    if (trackingInterval) clearInterval(trackingInterval);
    currentUser = null;
    document.getElementById('loginOverlay').style.display = 'flex';
    document.getElementById('mainApp').style.display = 'none';
    document.getElementById('username').value = '';
    document.getElementById('password').value = '';
}

// ==================== المراكب ====================
async function addItem() {
    if (!canEdit()) { showToast("ليس لديك صلاحية!", true); return; }
    let name = document.getElementById('iName').value.trim();
    if (!name) return showToast("الاسم مطلوب", true);
    
    let newItem = {
        name: name,
        num: document.getElementById('iNum').value,
        len: parseFloat(document.getElementById('iLen').value) || 0,
        reg: document.getElementById('iReg').value,
        zone: document.getElementById('iZone').value,
        port: document.getElementById('iPort').value,
        supp: document.getElementById('iSupp').value,
        stat: document.getElementById('iStat').value,
        break: document.getElementById('iBreak').value,
        fDate: document.getElementById('iDate').value,
        eDate: document.getElementById('iEnd').value,
        ref: document.getElementById('iRef').value,
        cat: getCat(document.getElementById('iLen').value)
    };
    try {
        await saveVessel(newItem);
        clearForm();
        await renderMain();
        await renderMaint();
        await renderEff();
        showToast("تم الحفظ", false);
    } catch(e) { showToast(e.message, true); }
}

async function editItem(id) {
    let vessels = await loadVessels();
    let item = vessels.find(x => x.id === id);
    if (item) {
        document.getElementById('iName').value = item.name;
        document.getElementById('iNum').value = item.num || '';
        document.getElementById('iLen').value = item.len || '';
        document.getElementById('iReg').value = item.reg || '';
        updateZones();
        setTimeout(() => document.getElementById('iZone').value = item.zone, 100);
        document.getElementById('iPort').value = item.port || '';
        document.getElementById('iSupp').value = item.supp || '';
        document.getElementById('iStat').value = item.stat;
        document.getElementById('iBreak').value = item.break || '';
        document.getElementById('iDate').value = item.fDate || '';
        document.getElementById('iEnd').value = item.eDate || '';
        document.getElementById('iRef').value = item.ref || '';
        window.scrollTo({ top: 0, behavior: 'smooth' });
        
        let saveBtn = document.querySelector('#inputArea .btn-primary');
        let origClick = saveBtn.onclick;
        saveBtn.onclick = async () => {
            let updated = {
                name: document.getElementById('iName').value.trim(),
                num: document.getElementById('iNum').value,
                len: parseFloat(document.getElementById('iLen').value) || 0,
                reg: document.getElementById('iReg').value,
                zone: document.getElementById('iZone').value,
                port: document.getElementById('iPort').value,
                supp: document.getElementById('iSupp').value,
                stat: document.getElementById('iStat').value,
                break: document.getElementById('iBreak').value,
                fDate: document.getElementById('iDate').value,
                eDate: document.getElementById('iEnd').value,
                ref: document.getElementById('iRef').value,
                cat: getCat(document.getElementById('iLen').value)
            };
            try {
                await updateVessel(id, updated);
                clearForm();
                await renderMain();
                await renderMaint();
                await renderEff();
                showToast("تم التحديث", false);
                saveBtn.onclick = origClick;
            } catch(e) { showToast(e.message, true); }
        };
        showToast("قم بالتعديل ثم حفظ", false);
    }
}

async function delItem(id, name) {
    if (!canDelete()) { showToast("ليس لديك صلاحية!", true); return; }
    if (confirm(`حذف "${name}"؟`)) {
        try {
            await deleteVessel(id);
            await renderMain();
            await renderMaint();
            await renderEff();
            showToast("تم الحذف", false);
        } catch(e) { showToast(e.message, true); }
    }
}

function updateZones() {
    let reg = document.getElementById('iReg').value;
    let zoneSel = document.getElementById('iZone');
    zoneSel.innerHTML = '<option value="">المنطقة</option>';
    if (ZONES[reg]) {
        ZONES[reg].forEach(z => {
            let opt = document.createElement('option');
            opt.value = z;
            opt.textContent = z;
            zoneSel.appendChild(opt);
        });
    }
}

async function renderMain() {
    try {
        let data = await loadVessels();
        let fCat = document.getElementById('fCatMain').value;
        let fReg = document.getElementById('fRegMain').value;
        let search = document.getElementById('searchMain').value.toLowerCase();
        
        let filtered = data.filter(x => {
            return (fCat === "الكل" || x.cat === fCat) &&
                   (fReg === "الكل" || x.reg === fReg) &&
                   (!search || x.name.toLowerCase().includes(search));
        });
        
        let html = '';
        for (let x of filtered) {
            html += `<tr>
                <td><b>${x.name}</b></td>
                <td>${x.num || '-'}</td>
                <td>${x.len || '-'}</td>
                <td>${x.cat || '-'}</td>
                <td>${x.reg || '-'}</td>
                <td>${x.zone || '-'}</td>
                <td class="status-${x.stat}">${x.stat}</td>
                <td>${x.break || '-'}</td>
                <td>
                    ${canEdit() ? `<button class="btn btn-warning btn-sm" onclick="editItem('${x.id}')">تعديل</button>` : ''}
                    ${canDelete() ? `<button class="btn btn-danger btn-sm" onclick="delItem('${x.id}','${x.name}')">حذف</button>` : ''}
                </td>
            </tr>`;
        }
        document.getElementById('mainBody').innerHTML = html || '<tr><td colspan="9">لا توجد مراكب</td></tr>';
    } catch(e) { showToast("خطأ", true); }
}

async function renderMaint() {
    try {
        let data = await loadVessels();
        let filtered = data.filter(x => x.stat === 'معطب' || x.stat === 'صيانة');
        let fReg = document.getElementById('fRegMaint').value;
        let search = document.getElementById('searchMaint').value.toLowerCase();
        
        if (fReg !== "الكل") filtered = filtered.filter(x => x.reg === fReg);
        if (search) filtered = filtered.filter(x => x.name.toLowerCase().includes(search));
        
        let html = '';
        for (let x of filtered) {
            html += `<tr>
                <td><b>${x.name}</b></td>
                <td>${x.num || '-'}</td>
                <td>${x.reg || '-'}</td>
                <td class="status-${x.stat}">${x.stat}</td>
                <td>${x.break || '-'}</td>
                <td>${formatDate(x.fDate)}</td>
                <td>${formatDate(x.eDate)}</td>
                <td>${canEdit() ? `<button class="btn btn-warning btn-sm" onclick="editItem('${x.id}')">تعديل</button>` : ''}</td>
            </tr>`;
        }
        document.getElementById('maintBody').innerHTML = html || '<tr><td colspan="8">لا توجد مراكب معطوبة</td></tr>';
    } catch(e) { showToast("خطأ", true); }
}

async function renderEff() {
    try {
        let data = await loadVessels();
        let total = data.length;
        let good = data.filter(x => x.stat === 'صالح').length;
        let maint = data.filter(x => x.stat === 'صيانة').length;
        let broken = data.filter(x => x.stat === 'معطب').length;
        let efficiency = total ? ((good / total) * 100).toFixed(1) : 0;
        
        document.getElementById('statsCards').innerHTML = `
            <div class="stat-card"><div class="number">${total}</div><div>الإجمالي</div></div>
            <div class="stat-card"><div class="number" style="color:green">${good}</div><div>الصالح</div></div>
            <div class="stat-card"><div class="number" style="color:orange">${maint}</div><div>الصيانة</div></div>
            <div class="stat-card"><div class="number" style="color:red">${broken}</div><div>المعطوب</div></div>
            <div class="stat-card"><div class="number">${efficiency}%</div><div>النجاعة</div></div>
        `;
        
        if (statusChart) statusChart.destroy();
        let ctx = document.getElementById('statusChart').getContext('2d');
        statusChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['صالح', 'صيانة', 'معطب'],
                datasets: [{ data: [good, maint, broken], backgroundColor: ['#28a745', '#ffc107', '#dc3545'] }]
            }
        });
    } catch(e) {}
}

// ==================== المستخدمين ====================
async function renderUsers() {
    if (!canManageUsers()) return;
    try {
        let users = await loadUsers();
        let html = '';
        for (let u of users) {
            html += `<tr>
                <td>${u.name}</td>
                <td>${u.role}</td>
                <td class="${u.enabled ? 'status-صالح' : 'status-معطب'}">${u.enabled ? 'مفعل' : 'معطل'}</td>
                <td>
                    <button class="btn btn-warning btn-sm" onclick="openPasswordModal('${u.id}','${u.name}')">تغيير كلمة المرور</button>
                    ${u.enabled ? `<button class="btn btn-danger btn-sm" onclick="toggleUser('${u.id}',false)">تعطيل</button>` : `<button class="btn btn-primary btn-sm" onclick="toggleUser('${u.id}',true)">تفعيل</button>`}
                    ${u.name !== 'admin' ? `<button class="btn btn-danger btn-sm" onclick="deleteUser('${u.id}')">حذف</button>` : ''}
                </td>
            </tr>`;
        }
        document.getElementById('usersBody').innerHTML = html;
    } catch(e) {}
}

async function addUser() {
    if (!canManageUsers()) return;
    let u = document.getElementById('un').value.trim();
    let p = document.getElementById('up').value.trim();
    let r = document.getElementById('ur').value;
    if (!u || !p) return showToast("اسم المستخدم وكلمة المرور مطلوبان", true);
    try {
        await saveUser({ name: u, pass: p, role: r, enabled: true });
        document.getElementById('un').value = '';
        document.getElementById('up').value = '';
        await renderUsers();
        showToast("تم الإضافة", false);
    } catch(e) { showToast(e.message, true); }
}

function openPasswordModal(id, name) {
    selectedUserId = id;
    document.getElementById('modalUserName').innerHTML = `تغيير كلمة المرور لـ: ${name}`;
    document.getElementById('newPassword').value = '';
    document.getElementById('confirmPassword').value = '';
    document.getElementById('passwordModal').style.display = 'flex';
}

function closePasswordModal() {
    document.getElementById('passwordModal').style.display = 'none';
    selectedUserId = null;
}

async function saveNewPassword() {
    if (!canManageUsers()) return;
    let np = document.getElementById('newPassword').value.trim();
    let cp = document.getElementById('confirmPassword').value.trim();
    if (!np) return showToast("كلمة المرور مطلوبة", true);
    if (np !== cp) return showToast("غير متطابقة", true);
    try {
        let users = await loadUsers();
        let user = users.find(u => u.id === selectedUserId);
        if (user) {
            user.pass = np;
            await updateUser(selectedUserId, user);
            closePasswordModal();
            await renderUsers();
            showToast("تم التغيير", false);
        }
    } catch(e) { showToast(e.message, true); }
}

async function toggleUser(id, enable) {
    try {
        let users = await loadUsers();
        let user = users.find(u => u.id === id);
        if (user) {
            user.enabled = enable;
            await updateUser(id, user);
            await renderUsers();
            showToast(enable ? "تم التفعيل" : "تم التعطيل", false);
        }
    } catch(e) { showToast(e.message, true); }
}

async function deleteUser(id) {
    if (!confirm("حذف المستخدم؟")) return;
    try {
        await deleteUserAPI(id);
        await renderUsers();
        showToast("تم الحذف", false);
    } catch(e) { showToast(e.message, true); }
}

// ==================== تبديل الصفحات ====================
function showPage(page) {
    document.getElementById('pageMain').classList.add('hidden');
    document.getElementById('pageMaint').classList.add('hidden');
    document.getElementById('pageEff').classList.add('hidden');
    document.getElementById('pageMap').classList.add('hidden');
    document.getElementById('pageUsers').classList.add('hidden');
    let inputArea = document.getElementById('inputArea');
    
    if (page === 'main') {
        document.getElementById('pageMain').classList.remove('hidden');
        inputArea.classList.remove('hidden');
    } else {
        inputArea.classList.add('hidden');
        if (page === 'maint') {
            document.getElementById('pageMaint').classList.remove('hidden');
            renderMaint();
        } else if (page === 'eff') {
            document.getElementById('pageEff').classList.remove('hidden');
            renderEff();
        } else if (page === 'map') {
            document.getElementById('pageMap').classList.remove('hidden');
            setTimeout(() => { if (trackingMap) trackingMap.invalidateSize(); loadLocations(); }, 100);
        } else if (page === 'users') {
            if (canManageUsers()) {
                document.getElementById('pageUsers').classList.remove('hidden');
                renderUsers();
            } else showToast("غير مسموح", true);
        }
    }
}

// دوال التحديث
async function refreshMain() { await renderMain(); showToast("تم تحديث الأسطول", false); }
async function refreshMaint() { await renderMaint(); showToast("تم تحديث الصيانة", false); }
async function refreshEff() { await renderEff(); showToast("تم تحديث الجاهزية", false); }
async function refreshAllPages() { await renderMain(); await renderMaint(); await renderEff(); showToast("تم تحديث الكل", false); }

// ربط الدوال
window.doLogin = doLogin;
window.logout = logout;
window.showPage = showPage;
window.updateZones = updateZones;
window.addItem = addItem;
window.editItem = editItem;
window.delItem = delItem;
window.renderMain = renderMain;
window.renderMaint = renderMaint;
window.renderEff = renderEff;
window.refreshMain = refreshMain;
window.refreshMaint = refreshMaint;
window.refreshEff = refreshEff;
window.refreshAllPages = refreshAllPages;
window.clearForm = clearForm;
window.startTracking = startTracking;
window.stopTracking = stopTracking;
window.loadLocations = loadLocations;
window.addUser = addUser;
window.openPasswordModal = openPasswordModal;
window.closePasswordModal = closePasswordModal;
window.saveNewPassword = saveNewPassword;
window.toggleUser = toggleUser;
window.deleteUser = deleteUser;
</script>
