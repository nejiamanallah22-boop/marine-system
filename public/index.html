<script>
let currentUser=null,selectedUserId=null,fleetChart=null,categoriesChart=null,comparisonChart=null,currentChartType='doughnut';
let trackingInterval=null,trackingMap=null,trackingMarkers={},socket=null;
const ZONES_DATA={"الشمال":["تونس","بنزرت","طبرقة"],"الساحل":["سوسة","المنستير","نابل"],"الوسط":["صفاقس","المهدية","قرقنة"],"الجنوب":["جرجيس","جربة","قابس"]};
const CATS_LIST=["البروق","صقور","خوافر","زوارق مزدوجة","طوافات"];
const REGION_NAMES={"الشمال":"الحرس البحري بالشمال","الساحل":"الحرس البحري بالساحل","الوسط":"الحرس البحري بالوسط","الجنوب":"الحرس البحري بالجنوب"};
function scrollToTop(){window.scrollTo({top:0,behavior:'smooth'})}
function scrollToBottom(){window.scrollTo({top:document.body.scrollHeight,behavior:'smooth'})}
function showToast(m,e){let t=document.createElement('div');t.className='toast';t.style.background=e?'#d9534f':'#2e7d32';t.innerHTML=m;document.body.appendChild(t);setTimeout(()=>t.remove(),3000)}
function formatDate(d){if(!d)return'-';try{let date=new Date(d);if(isNaN(date.getTime()))return d;return`${date.getDate().toString().padStart(2,'0')}/${(date.getMonth()+1).toString().padStart(2,'0')}/${date.getFullYear()}`}catch(e){return d}}
function getCat(l){let n=parseFloat(l);if(n===11)return"البروق";if(n>=8&&n<=12)return"صقور";if(n>12&&n<=25)return"خوافر";if(n>=30)return"طوافات";return"زوارق مزدوجة"}
function canEdit(){return currentUser&&(currentUser.role==="مسؤول"||currentUser.role==="محرر")}
function canDelete(){return currentUser&&currentUser.role==="مسؤول"}
function canManageUsers(){return currentUser&&currentUser.role==="مسؤول"}
function getCurrentDate(){let n=new Date();return`${n.getDate().toString().padStart(2,'0')}/${(n.getMonth()+1).toString().padStart(2,'0')}/${n.getFullYear()}`}
function getCurrentTime(){let n=new Date();return`${n.getHours().toString().padStart(2,'0')}:${n.getMinutes().toString().padStart(2,'0')}`}
async function apiCall(u,m='GET',b=null){let o={method:m,headers:{'Content-Type':'application/json'}};if(b)o.body=JSON.stringify(b);let r=await fetch(u,o);if(!r.ok)throw new Error(await r.text());return r.json()}
async function loadVessels(){return apiCall('/api/vessels')}
async function saveVessel(v){return apiCall('/api/vessels','POST',v)}
async function updateVessel(i,v){return apiCall(`/api/vessels/${i}`,'PUT',v)}
async function deleteVessel(i){return apiCall(`/api/vessels/${i}`,'DELETE')}
async function loadUsers(){return apiCall('/api/users')}
async function saveUser(u){return apiCall('/api/users','POST',u)}
async function updateUser(i,u){return apiCall(`/api/users/${i}`,'PUT',u)}
async function deleteUserAPI(i){return apiCall(`/api/users/${i}`,'DELETE')}
async function loadTickets(){return apiCall('/api/tickets')}
async function saveTicket(t){return apiCall('/api/tickets','POST',t)}
async function loadLogs(){return apiCall('/api/logs')}
async function saveLog(l){return apiCall('/api/logs','POST',l)}
async function loginAPI(n,p){return apiCall('/api/login','POST',{name:n,pass:p})}
async function exportAllDataAPI(){return apiCall('/api/export-all')}
async function importAllDataAPI(d){return apiCall('/api/import-all','POST',d)}
async function loadLocationsAPI(){return apiCall('/api/locations')}
async function logActivity(a,d){if(!currentUser)return;try{await saveLog({userName:currentUser.name,userRole:currentUser.role,action:a,details:d,date:getCurrentDate(),time:getCurrentTime()})}catch(e){}}
function initSocket(){if(socket)return;socket=io();socket.on('receive-location',(d)=>{updateMapMarker(d.userName,d.lat,d.lng,d.time);showToast(`📍 تم تحديث موقع ${d.userName}`)})}
function initTrackingMap(){if(trackingMap)return;trackingMap=L.map('trackMap').setView([34.5,9.5],7);L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{attribution:'&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a>'}).addTo(trackingMap)}
function updateMapMarker(n,lat,lng,t){if(!trackingMap)initTrackingMap();let key=n;if(trackingMarkers[key]){trackingMarkers[key].setLatLng([lat,lng]);trackingMarkers[key].bindPopup(`<b>${n}</b><br>📍 ${lat},${lng}<br>🕐 ${new Date(t).toLocaleString('ar-EG')}`)}else{let m=L.marker([lat,lng]).addTo(trackingMap);m.bindPopup(`<b>${n}</b><br>📍 ${lat},${lng}<br>🕐 ${new Date(t).toLocaleString('ar-EG')}`);trackingMarkers[key]=m}trackingMap.setView([lat,lng],12)}
function startTracking(){if(!currentUser)return showToast("الرجاء تسجيل الدخول أولاً",1);if(!navigator.geolocation)return showToast("المتصفح لا يدعم تحديد الموقع",1);if(!socket)initSocket();trackingInterval=setInterval(()=>{navigator.geolocation.getCurrentPosition(p=>{let{latitude:lat,longitude:lng}=p.coords;if(socket&&currentUser){socket.emit('send-location',{userName:currentUser.name,userRole:currentUser.role,lat:lat,lng:lng});document.getElementById('mapStatus').innerHTML=`📍 يتم مشاركة موقعك... ${lat.toFixed(6)}, ${lng.toFixed(6)}`}},(e)=>{document.getElementById('mapStatus').innerHTML='❌ تعذر الحصول على الموقع'},{enableHighAccuracy:!0,timeout:5e3,maximumAge:0})},5e3);document.getElementById('startTrackingBtn').style.display='none';document.getElementById('stopTrackingBtn').style.display='inline-block';showToast("✅ بدأ مشاركة الموقع لحظة بلحظة")}
function stopTracking(){if(trackingInterval)clearInterval(trackingInterval);document.getElementById('startTrackingBtn').style.display='inline-block';document.getElementById('stopTrackingBtn').style.display='none';document.getElementById('mapStatus').innerHTML='⏹️ توقفت مشاركة الموقع';showToast("⏹️ تم إيقاف مشاركة الموقع")}
async function loadLocations(){try{let l=await loadLocationsAPI();if(!trackingMap)initTrackingMap();Object.values(trackingMarkers).forEach(m=>m.remove());trackingMarkers={};l.forEach(loc=>{updateMapMarker(loc.userName,loc.lat,loc.lng,loc.timestamp)});showToast(`✅ تم تحميل ${l.length} موقع`)}catch(e){showToast("❌ خطأ في تحميل المواقع",1)}}
function centerMapOnUser(){if(!trackingMap)initTrackingMap();if(navigator.geolocation){navigator.geolocation.getCurrentPosition(p=>{trackingMap.setView([p.coords.latitude,p.coords.longitude],13);showToast("🎯 تم التمركز على موقعك")},()=>showToast("لا يمكن الحصول على موقعك",1))}}
async function refreshMain(){await renderMain();showToast("✅ تم تحديث الأسطول")}
async function refreshMaint(){await renderMaint();showToast("✅ تم تحديث سجل الصيانة")}
async function refreshEff(){await renderEff();showToast("✅ تم تحديث الجاهزية")}
async function refreshTickets(){await renderTickets();showToast("✅ تم تحديث التذاكر")}
async function refreshTrack(){if(canManageUsers()){await renderTrack();showToast("✅ تم تحديث سجل التتبع")}}
async function refreshUsers(){if(canManageUsers()){await renderUsers();showToast("✅ تم تحديث المستخدمين")}}
async function refreshAllPages(){await renderMain();await renderMaint();await renderEff();await renderTickets();if(canManageUsers()){await renderUsers();await renderTrack()}showToast("✅ تم تحديث الكل")}
async function doLogin(){let u=document.getElementById('username').value.trim(),p=document.getElementById('password').value.trim(),e=document.getElementById('loginError');if(!u||!p){e.innerHTML="يرجى إدخال اسم المستخدم وكلمة المرور";e.style.display="block";return}try{let user=await loginAPI(u,p);if(user.error){e.innerHTML=user.error;e.style.display="block";return}currentUser=user;document.getElementById('loginOverlay').style.display='none';document.getElementById('mainApp').style.display='block';document.getElementById('userRoleDisplay').innerHTML=`👤 ${currentUser.name} | 🔑 ${currentUser.role}`;initSocket();initTrackingMap();let isAdmin=currentUser.role==="مسؤول",isViewer=currentUser.role==="مشاهد";document.getElementById('trackBtn').classList.toggle('hidden',!isAdmin);document.getElementById('admBtn').classList.toggle('hidden',!isAdmin);document.getElementById('printBtn').style.display=isAdmin?"inline-block":"none";document.getElementById('exportBtn').style.display=isAdmin?"inline-flex":"none";document.querySelector('#inputArea .btn-sm-cyan')?null:null;document.getElementById('inputArea').classList.toggle('hidden',isViewer);let fill=(id,l)=>{let s=document.getElementById(id);if(s){s.innerHTML='<option value="الكل">الكل</option>';l.forEach(i=>s.innerHTML+=`<option value="${i}">${i}</option>`)}};fill('fCatMain',CATS_LIST);fill('fRegMain',Object.keys(ZONES_DATA));fill('fRegMaint',Object.keys(ZONES_DATA));await renderMain();await renderMaint();await renderEff();await renderTickets();if(isAdmin){await renderUsers();await renderTrack()}await logActivity("تسجيل دخول",`قام بتسجيل الدخول في ${getCurrentTime()}`);showToast(`مرحباً ${u}`)}catch(e){e.innerHTML="خطأ في الاتصال بالسيرفر!";e.style.display="block"}}
async function logout(){if(currentUser)await logActivity("تسجيل خروج",`قام بتسجيل الخروج في ${getCurrentTime()}`);if(trackingInterval)stopTracking();currentUser=null;document.getElementById('loginOverlay').style.display='flex';document.getElementById('mainApp').style.display='none';document.getElementById('username').value='';document.getElementById('password').value='';document.getElementById('loginError').style.display='none'}
async function addItem(){if(!canEdit())return showToast("ليس لديك صلاحية للإضافة!",1);let n=document.getElementById('iName').value.trim();if(!n)return showToast("الاسم مطلوب",1);let stat=document.getElementById('iStat').value,fDate=document.getElementById('iDate').value;if((stat==='معطب'||stat==='صيانة')&&!fDate)return showToast("تاريخ العطب إلزامي",1);let newItem={name:n,num:document.getElementById('iNum').value,len:parseFloat(document.getElementById('iLen').value)||0,reg:document.getElementById('iReg').value,zone:document.getElementById('iZone').value,port:document.getElementById('iPort').value,supp:document.getElementById('iSupp').value,stat:stat,break:document.getElementById('iBreak').value,fDate:fDate,eDate:document.getElementById('iEnd').value,ref:document.getElementById('iRef').value,cat:getCat(document.getElementById('iLen').value)};try{await saveVessel(newItem);await logActivity("إضافة مركب",`قام بإضافة مركب "${n}"`);['iName','iNum','iLen','iPort','iSupp','iBreak','iDate','iEnd','iRef'].forEach(id=>{let el=document.getElementById(id);if(el)el.value=""});document.getElementById('iReg').value="";document.getElementById('iZone').innerHTML='<option value="">المنطقة</option>';await renderMain();await renderMaint();await renderEff();showToast("✅ تم حفظ المركب")}catch(e){showToast("خطأ في الحفظ: "+e.message,1)}}
async function editItem(id,name){if(!canEdit())return showToast("ليس لديك صلاحية للتعديل!",1);let data=await loadVessels(),item=data.find(x=>(x._id||x.id).toString()===id.toString());if(item){document.getElementById('iName').value=item.name;document.getElementById('iNum').value=item.num||'';document.getElementById('iLen').value=item.len||'';document.getElementById('iReg').value=item.reg||'';updateZones();setTimeout(()=>{document.getElementById('iZone').value=item.zone},50);document.getElementById('iPort').value=item.port||'';document.getElementById('iSupp').value=item.supp||'';document.getElementById('iStat').value=item.stat;document.getElementById('iBreak').value=item.break||'';document.getElementById('iDate').value=item.fDate||'';document.getElementById('iEnd').value=item.eDate||'';document.getElementById('iRef').value=item.ref||'';window.scrollTo(0,0);let oldName=item.name,saveBtn=document.querySelector('#inputArea .btn-green'),originalClick=saveBtn.onclick;saveBtn.onclick=async()=>{let updatedItem={name:document.getElementById('iName').value.trim(),num:document.getElementById('iNum').value,len:parseFloat(document.getElementById('iLen').value)||0,reg:document.getElementById('iReg').value,zone:document.getElementById('iZone').value,port:document.getElementById('iPort').value,supp:document.getElementById('iSupp').value,stat:document.getElementById('iStat').value,break:document.getElementById('iBreak').value,fDate:document.getElementById('iDate').value,eDate:document.getElementById('iEnd').value,ref:document.getElementById('iRef').value,cat:getCat(document.getElementById('iLen').value)};try{await updateVessel(item._id||item.id,updatedItem);await logActivity("تعديل مركب",`قام بتعديل مركب "${oldName}" إلى "${updatedItem.name}"`);await renderMain();await renderMaint();await renderEff();showToast("✅ تم تحديث المركب");saveBtn.onclick=originalClick;['iName','iNum','iLen','iPort','iSupp','iBreak','iDate','iEnd','iRef'].forEach(i=>{let el=document.getElementById(i);if(el)el.value=""});document.getElementById('iReg').value="";document.getElementById('iZone').innerHTML='<option value="">المنطقة</option>'}catch(e){showToast("خطأ في التحديث: "+e.message,1)}};showToast("✏️ قم بتعديل البيانات ثم اضغط حفظ")}}
async function delItem(id,name){if(!canDelete())return showToast("ليس لديك صلاحية للحذف!",1);if(confirm(`هل أنت متأكد من حذف المركب "${name}"؟`)){try{await deleteVessel(id);await logActivity("حذف مركب",`قام بحذف مركب "${name}"`);await renderMain();await renderMaint();await renderEff();showToast("✅ تم حذف المركب")}catch(e){showToast("خطأ في الحذف: "+e.message,1)}}}
function updateZones(){let reg=document.getElementById('iReg').value,zoneSel=document.getElementById('iZone');zoneSel.innerHTML='<option value="">المنطقة</option>';if(ZONES_DATA[reg])ZONES_DATA[reg].forEach(z=>zoneSel.innerHTML+=`<option value="${z}">${z}</option>`)}
async function renderMain(){try{let data=await loadVessels(),fCat=document.getElementById('fCatMain').value,fReg=document.getElementById('fRegMain').value,searchText=document.getElementById('searchMain').value.toLowerCase(),filtered=data.filter(x=>{(fCat==="الكل"||(x.cat&&x.cat===fCat))&&(fReg==="الكل"||(x.reg&&x.reg===fReg))&&(!searchText||(x.name&&x.name.toLowerCase().includes(searchText))||(x.num&&x.num.toLowerCase().includes(searchText))||(x.reg&&x.reg.toLowerCase().includes(searchText))||(x.zone&&x.zone.toLowerCase().includes(searchText))||(x.port&&x.port.toLowerCase().includes(searchText)))}),html="",isAdmin=currentUser?.role==="مسؤول";if(filtered.length===0)html='<tr><td colspan="13" style="text-align:center;">⚠️ لا توجد مراكب مسجلة</td></tr>';else filtered.forEach(x=>{let regionDisplay=REGION_NAMES[x.reg]||x.reg||'-';html+=`<tr><td><b>${x.name}</b></td><td>${x.num||'-'}</td><td>${x.len||'-'}</td><td>${x.cat||'-'}</td><td>${regionDisplay}</td><td>${x.zone||'-'}</td><td>${x.port||'-'}</td><td>${x.supp||'-'}</td><td class="status-${x.stat}">${x.stat}</td><td>${x.break||'-'}</td><td>${formatDate(x.fDate)}</td><td>${formatDate(x.eDate)}</td><td>${canEdit()?`<button class="btn-sm btn-orange" onclick="editItem('${x._id||x.id}','${x.name}')">تعديل</button>`:''}${isAdmin?`<button class="btn-sm btn-red" onclick="delItem('${x._id||x.id}','${x.name}')">حذف</button>`:''}</td></tr>`});document.getElementById('mainBody').innerHTML=html}catch(e){console.error(e);document.getElementById('mainBody').innerHTML='<tr><td colspan="13">❌ خطأ في تحميل البيانات</td></tr>'}}
function clearMainSearch(){document.getElementById('searchMain').value='';renderMain()}
async function renderMaint(){try{let data=await loadVessels(),fReg=document.getElementById('fRegMaint').value,dStart=document.getElementById('fDateStart').value,dEnd=document.getElementById('fDateEnd').value,searchText=document.getElementById('searchMaint').value.toLowerCase(),filtered=data.filter(x=>x.stat==='معطب'||x.stat==='صيانة');if(fReg!=="الكل")filtered=filtered.filter(x=>x.reg===fReg);if(dStart||dEnd){let start=dStart?new Date(dStart):null,end=dEnd?new Date(dEnd):null;filtered=filtered.filter(x=>{if(!x.fDate)return!1;let itemDate=new Date(x.fDate);return!(start&&itemDate<start)&&!(end&&itemDate>end)})}if(searchText)filtered=filtered.filter(x=>(x.name&&x.name.toLowerCase().includes(searchText))||(x.break&&x.break.toLowerCase().includes(searchText))||(x.ref&&x.ref.toLowerCase().includes(searchText))||(x.num&&x.num.toLowerCase().includes(searchText)));filtered.sort((a,b)=>new Date(b.fDate)-new Date(a.fDate));let html="",isAdmin=currentUser?.role==="مسؤول";if(filtered.length===0)html='<tr><td colspan="10">⚠️ لا توجد مراكب معطوبة</td></tr>';else filtered.forEach(x=>{let regionDisplay=REGION_NAMES[x.reg]||x.reg||'-';html+=`<tr><td><b>${x.name}</b></td><td>${x.num||'-'}</td><td>${regionDisplay}</td><td>${x.zone||'-'}</td><td class="status-${x.stat}">${x.stat}</td><td class="damage-column">${x.break||'-'}</td><td>${formatDate(x.fDate)}</td><td>${formatDate(x.eDate)}</td><td>${x.ref||'-'}</td><td>${isAdmin?`<button class="btn-sm btn-red" onclick="delItem('${x._id||x.id}','${x.name}')">حذف</button>`:''}</td></tr>`});document.getElementById('maintBody').innerHTML=html}catch(e){console.error(e);document.getElementById('maintBody').innerHTML='<tr><td colspan="10">❌ خطأ</td></tr>'}}
function resetMaintFilters(){document.getElementById('fRegMaint').value="الكل";document.getElementById('fDateStart').value="";document.getElementById('fDateEnd').value="";document.getElementById('searchMaint').value="";renderMaint()}
async function renderStatsCards(){let data=await loadVessels(),total=data.length,ok=data.filter(x=>x.stat==='صالح').length,maint=data.filter(x=>x.stat==='صيانة').length,broken=data.filter(x=>x.stat==='معطب').length,eff=total?(ok/total*100).toFixed(1):0;document.getElementById('statsCards').innerHTML=`<div class="stat-card"><div class="number">${total}</div><div>🚢 الإجمالي</div></div><div class="stat-card"><div class="number">${ok}</div><div>✅ الصالح</div></div><div class="stat-card"><div class="number">${maint}</div><div>🔧 الصيانة</div></div><div class="stat-card"><div class="number">${broken}</div><div>⚠️ المعطل</div></div><div class="stat-card"><div class="number">${eff}%</div><div>📈 النجاعة</div></div>`}
async function renderGeneralEfficiencyTable(){let data=await loadVessels(),totalOk=data.filter(x=>x.stat==='صالح').length,totalAll=data.length,generalEff=totalAll?(totalOk/totalAll*100).toFixed(1):0,html=`<div class="region-table-card"><div class="region-table-header">📊 النجاعة العامة: ${generalEff}% (${totalOk}/${totalAll})</div><div class="scrollable-table"><table class="region-table"><thead><tr><th>الفئة</th><th>صالح</th><th>معطل</th><th>النجاعة</th></tr></thead><tbody>`;CATS_LIST.forEach(cat=>{let catData=data.filter(x=>x.cat===cat),ok=catData.filter(x=>x.stat==='صالح').length,broken=catData.length-ok,percent=catData.length?(ok/catData.length*100).toFixed(1):0;html+=`<tr><td>${cat}</td><td>${ok}</td><td>${broken}</td><td>${percent}%</td></tr>`});html+=`</tbody></table></div></div>`;document.getElementById('generalEffTableContainer').innerHTML=html}
async function renderRegionTables(){let data=await loadVessels(),selected=document.getElementById('fRegEff').value,html="",regions=["الشمال","الساحل","الوسط","الجنوب"];if(selected==="الكل"){for(let r of regions){let regData=data.filter(x=>x.reg===r),ok=regData.filter(x=>x.stat==='صالح').length,percent=regData.length?(ok/regData.length*100).toFixed(1):0;html+=`<div class="region-table-card"><div class="region-table-header">${REGION_NAMES[r]} - النجاعة: ${percent}%</div><div class="scrollable-table"><table class="region-table"><thead><tr><th>الفئة</th><th>صالح</th><th>معطل</th><th>النجاعة</th></tr></thead><tbody>`;for(let cat of CATS_LIST){let catData=regData.filter(x=>x.cat===cat),okk=catData.filter(x=>x.stat==='صالح').length,perc=catData.length?(okk/catData.length*100).toFixed(1):0;html+=`<tr><td>${cat}</td><td>${okk}</td><td>${catData.length-okk}</td><td>${perc}%</td></tr>`}html+=`</tbody></table></div></div>`}}document.getElementById('regionTables').innerHTML=html}
async function renderCharts(){let data=await loadVessels(),ok=data.filter(x=>x.stat==='صالح').length,maint=data.filter(x=>x.stat==='صيانة').length,broken=data.filter(x=>x.stat==='معطب').length,catCount={};CATS_LIST.forEach(c=>catCount[c]=data.filter(x=>x.cat===c).length);document.getElementById('chartsArea').innerHTML=`<div class="charts-container"><div class="chart-box"><canvas id="fleetChartCanvas"></canvas></div><div class="chart-box"><canvas id="categoriesChartCanvas"></canvas></div></div>`;if(fleetChart)fleetChart.destroy();fleetChart=new Chart(document.getElementById('fleetChartCanvas'),{type:'doughnut',data:{labels:['صالح','صيانة','معطب'],datasets:[{data:[ok,maint,broken],backgroundColor:['#28a745','#ffc107','#dc3545']}]}});if(categoriesChart)categoriesChart.destroy();categoriesChart=new Chart(document.getElementById('categoriesChartCanvas'),{type:'bar',data:{labels:CATS_LIST,datasets:[{label:'العدد',data:CATS_LIST.map(c=>catCount[c]||0),backgroundColor:'#2e7d32'}]}})}
async function renderEff(){await renderStatsCards();await renderGeneralEfficiencyTable();await renderRegionTables();await renderCharts()}
function switchChartType(t,b){currentChartType=t;renderCharts()}
async function sendTicket(){if(!currentUser)return showToast("الرجاء تسجيل الدخول",1);let s=document.getElementById('ticketSubject').value.trim(),m=document.getElementById('ticketMessage').value.trim();if(!s||!m)return showToast("املأ العنوان والرسالة",1);try{await saveTicket({userName:currentUser.name,userRole:currentUser.role,subject:s,message:m,date:getCurrentDate(),time:getCurrentTime(),status:'قيد المعالجة',replies:[]});document.getElementById('ticketSubject').value="";document.getElementById('ticketMessage').value="";showToast("✅ تم الإرسال");await renderTickets()}catch(e){showToast("خطأ: "+e.message,1)}}
async function replyToTicket(tId){if(!canManageUsers())return showToast("غير مسموح",1);let r=prompt("أدخل ردك:");if(!r)return;try{await fetch(`/api/tickets/${tId}/reply`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({reply:{adminName:currentUser.name,reply:r,date:getCurrentDate(),time:getCurrentTime()}})});await renderTickets();showToast("✅ تم الرد")}catch(e){showToast("خطأ: "+e.message,1)}}
async function closeTicket(tId){if(!canManageUsers())return showToast("غير مسموح",1);if(!confirm("إغلاق التذكرة؟"))return;try{await fetch(`/api/tickets/${tId}/close`,{method:'PUT'});await renderTickets();showToast("✅ تم الإغلاق")}catch(e){showToast("خطأ: "+e.message,1)}}
async function renderTickets(){if(!canManageUsers())return;let tickets=await loadTickets(),html='<div class="scrollable-table"><table class="region-table"><thead><tr><th>#</th><th>التاريخ</th><th>المستخدم</th><th>العنوان</th><th>الحالة</th><th>الرسالة</th><th>الردود</th><th>إجراء</th></tr></thead><tbody>';tickets.forEach((t,i)=>{html+=`<tr><td>${i+1}</td><td>${t.date}</td><td>${t.userName}</td><td>${t.subject}</td><td>${t.status}</td><td>${t.message}</td><td>${t.replies?.map(r=>`<div>${r.reply}</div>`).join('')||'-'}</td>`;if(t.status!=='مغلقة')html+=`<td><button onclick="replyToTicket('${t._id}')">رد</button> <button onclick="closeTicket('${t._id}')">إغلاق</button></td>`;else html+=`<td>مغلقة</td>`;html+=`</tr>`});html+=`</tbody></table></div>`;document.getElementById('ticketsList').innerHTML=html}
async function renderTrack(){if(!canManageUsers())return;let logs=await loadLogs(),start=document.getElementById('trackDateStart').value,end=document.getElementById('trackDateEnd').value,filtered=logs.filter(l=>(!start||l.date>=start)&&(!end||l.date<=end)),html=`<div class="stats-cards"><div class="stat-card"><div class="number">${filtered.length}</div><div>النشاطات</div></div></div><div class="scrollable-table"><table><thead><tr><th>#</th><th>التاريخ</th><th>الوقت</th><th>المستخدم</th><th>الصلاحية</th><th>الإجراء</th><th>التفاصيل</th></tr></thead><tbody>`;filtered.forEach((l,i)=>{html+=`<tr><td>${i+1}</td><td>${l.date}</td><td>${l.time}</td><td>${l.userName}</td><td>${l.userRole}</td><td>${l.action}</td><td>${l.details}</td></tr>`});html+=`</tbody></table></div>`;document.getElementById('trackContent').innerHTML=html}
function resetTrackFilters(){document.getElementById('trackDateStart').value="";document.getElementById('trackDateEnd').value="";renderTrack()}
async function renderUsers(){if(!canManageUsers())return;let users=await loadUsers();document.getElementById('usersBody').innerHTML=users.map(u=>`<tr><td>${u.name}</td><td>${u.role}</td><td class="${u.enabled?'status-صالح':'status-معطب'}">${u.enabled?'مفعل':'معطل'}</td><td><button onclick="openPasswordModal('${u._id}','${u.name}')">تغيير</button></td><td>${u.enabled?`<button onclick="toggleUser('${u._id}',false)">تعطيل</button>`:`<button onclick="toggleUser('${u._id}',true)">تفعيل</button>`}</td><td><button onclick="deleteUser('${u._id}')">حذف</button></td></tr>`).join('')}
async function addUser(){let n=document.getElementById('un').value.trim(),p=document.getElementById('up').value.trim(),r=document.getElementById('ur').value;if(!n||!p)return showToast("املأ الحقول",1);try{await saveUser({name:n,pass:p,role:r,enabled:!0});await renderUsers();showToast("✅ تمت الإضافة")}catch(e){showToast(e.message,1)}}
function openPasswordModal(id,name){selectedUserId=id;document.getElementById('modalUserName').innerHTML=`تغيير كلمة ${name}`;document.getElementById('passwordModal').style.display='flex'}
function closePasswordModal(){document.getElementById('passwordModal').style.display='none';selectedUserId=null}
async function saveNewPassword(){let np=document.getElementById('newPassword').value,cp=document.getElementById('confirmPassword').value;if(np!==cp)return showToast("غير متطابقة",1);let users=await loadUsers(),user=users.find(u=>u._id===selectedUserId);if(user){user.pass=np;await updateUser(selectedUserId,user);closePasswordModal();renderUsers();showToast("✅ تم التغيير")}}
async function toggleUser(id,enable){let users=await loadUsers(),u=users.find(u=>u._id===id);if(u){u.enabled=enable;await updateUser(id,u);renderUsers()}}
async function deleteUser(id){if(confirm("حذف المستخدم؟")){await deleteUserAPI(id);renderUsers()}}
async function exportAllData(){let data=await exportAllDataAPI(),blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`backup_${new Date().toISOString().split('T')[0]}.json`;a.click();URL.revokeObjectURL(a.href)}
async function importAllData(i){if(!i.files[0])return;let f=i.files[0],r=new FileReader();r.onload=async e=>{let d=JSON.parse(e.target.result);await importAllDataAPI(d);refreshAllPages();showToast("✅ تم الاستيراد")};r.readAsText(f);i.value=""}
function showPage(p){['pageMain','pageMaint','pageEff','pageSupport','pageTrack','pageMap','pageUsers'].forEach(p=>document.getElementById(p)?.classList.add('hidden'));if(p==='main')document.getElementById('pageMain').classList.remove('hidden');else if(p==='maint'){document.getElementById('pageMaint').classList.remove('hidden');renderMaint()}else if(p==='eff'){document.getElementById('pageEff').classList.remove('hidden');renderEff()}else if(p==='support'){document.getElementById('pageSupport').classList.remove('hidden');renderTickets()}else if(p==='track'){if(canManageUsers()){document.getElementById('pageTrack').classList.remove('hidden');renderTrack()}else showToast("غير مسموح",1)}else if(p==='map'){document.getElementById('pageMap').classList.remove('hidden');setTimeout(()=>{if(trackingMap)trackingMap.invalidateSize();loadLocations()},100)}else if(p==='users'){if(canManageUsers()){document.getElementById('pageUsers').classList.remove('hidden');renderUsers()}else showToast("غير مسموح",1)}}
window.doLogin=doLogin;window.logout=logout;window.showPage=showPage;window.updateZones=updateZones;window.addItem=addItem;window.editItem=editItem;window.delItem=delItem;window.renderMain=renderMain;window.renderMaint=renderMaint;window.renderEff=renderEff;window.renderTrack=renderTrack;window.resetMaintFilters=resetMaintFilters;window.resetTrackFilters=resetTrackFilters;window.clearMainSearch=clearMainSearch;window.switchChartType=switchChartType;window.sendTicket=sendTicket;window.replyToTicket=replyToTicket;window.closeTicket=closeTicket;window.addUser=addUser;window.openPasswordModal=openPasswordModal;window.closePasswordModal=closePasswordModal;window.saveNewPassword=saveNewPassword;window.toggleUser=toggleUser;window.deleteUser=deleteUser;window.exportAllData=exportAllData;window.importAllData=importAllData;window.refreshMain=refreshMain;window.refreshMaint=refreshMaint;window.refreshEff=refreshEff;window.refreshTickets=refreshTickets;window.refreshTrack=refreshTrack;window.refreshUsers=refreshUsers;window.refreshAllPages=refreshAllPages;window.startTracking=startTracking;window.stopTracking=stopTracking;window.loadLocations=loadLocations;window.centerMapOnUser=centerMapOnUser;window.scrollToTop=scrollToTop;window.scrollToBottom=scrollToBottom;
</script>
</body>
</html>
