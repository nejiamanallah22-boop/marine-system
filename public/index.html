<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>منظومة الوسائل البحرية - نظام متكامل</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--primary:#2e7d32;--accent:#d9534f;--success:#28a745;--orange:#f39c12;--bg:#f4f7f9}
        body{font-family:'Segoe UI',Tahoma,sans-serif;background:var(--bg);padding:20px;direction:rtl}
        @media(max-width:768px){body{padding:10px}}
        #loginOverlay{position:fixed;top:0;left:0;width:100%;height:100%;background:var(--primary);display:flex;justify-content:center;align-items:center;z-index:9999}
        .login-box{background:white;padding:30px;border-radius:15px;width:350px;text-align:center;box-shadow:0 10px 30px rgba(0,0,0,0.5)}
        .login-box input{width:100%;padding:12px;margin-bottom:15px;border:1px solid #ccc;border-radius:8px}
        .login-box button{width:100%;padding:12px;background:var(--primary);color:white;border:none;border-radius:8px;cursor:pointer}
        .container{max-width:1400px;margin:auto;background:white;padding:20px;border-radius:15px;box-shadow:0 5px 20px rgba(0,0,0,0.1)}
        .nav{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
        .nav button{padding:10px 20px;background:var(--primary);color:white;border:none;border-radius:5px;cursor:pointer}
        table{width:100%;border-collapse:collapse;margin-top:10px}
        th,td{border:1px solid #ddd;padding:8px;text-align:center}
        th{background:var(--primary);color:white}
        .hidden{display:none}
        input,select{padding:8px;border:1px solid #ddd;border-radius:5px;width:100%}
        .input-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:20px;padding:15px;background:#f8f9fa;border-radius:10px}
        .btn{padding:8px 15px;border:none;border-radius:5px;cursor:pointer;color:white}
        .btn-green{background:#28a745}
        .btn-red{background:#dc3545}
        .btn-blue{background:#007bff}
        .btn-orange{background:#fd7e14}
        .btn-sm{padding:5px 10px;font-size:12px;margin:2px;border:none;border-radius:3px;cursor:pointer;color:white}
        .btn-cyan{background:#17a2b8}
        .btn-purple{background:#6f42c1}
        .filter-bar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:15px;padding:10px;background:#e9ecef;border-radius:8px;align-items:center}
        .stat-card{background:white;border-radius:12px;padding:15px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,0.1);flex:1;min-width:120px;border-top:4px solid var(--primary)}
        .stat-card .number{font-size:28px;font-weight:bold;color:var(--primary)}
        .stats{display:flex;gap:15px;flex-wrap:wrap;margin-bottom:20px}
        .error-msg{color:red;margin-top:10px;display:none}
        .toast{position:fixed;bottom:20px;right:20px;background:#2e7d32;color:white;padding:12px 24px;border-radius:8px;z-index:1000;animation:fadeOut 3s ease forwards}
        @keyframes fadeOut{0%{opacity:1}70%{opacity:1}100%{opacity:0;visibility:hidden}}
        .map-container{height:500px;width:100%;margin:20px 0;border-radius:10px;overflow:hidden;border:2px solid var(--primary)}
        #locationMap{height:100%;width:100%}
        .region-table-card{background:white;border-radius:12px;margin-bottom:20px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.1)}
        .region-table-header{background:var(--primary);color:white;padding:12px;font-weight:bold}
        .scrollable-table{overflow-x:auto;max-height:500px;overflow-y:auto}
        .status-صالح{color:green;font-weight:bold}
        .status-معطب{color:red;font-weight:bold}
        .status-صيانة{color:orange;font-weight:bold}
        .high-eff{background-color:#d4edda}
        .mid-eff{background-color:#fff3cd}
        .low-eff{background-color:#f8d7da}
        .role-badge{background:#ffd966;color:#2e7d32;padding:4px 12px;border-radius:20px}
        .damage-column{min-width:200px;word-break:break-word}
        .ticket-reply{background:#e9ecef;margin:5px 0;padding:8px;border-radius:8px}
        .search-input{flex:1;min-width:200px}
        .search-input input{width:100%;padding:8px;border-radius:20px}
        .chart-switch{display:flex;gap:10px;justify-content:center;margin:15px 0}
        .chart-switch button{padding:5px 15px;border-radius:20px;background:#e9ecef;border:none;cursor:pointer}
        .chart-switch button.active{background:var(--primary);color:white}
        .chart-box{background:#f9f9f9;padding:20px;border-radius:12px;margin-bottom:20px}
        canvas{max-height:350px;width:100%}
        .watermark{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:100%;height:100%;opacity:0.05;z-index:0;pointer-events:none}
        .watermark img{width:70%;max-width:500px;height:auto}
        @media print{.nav,#inputArea,.btn-sm,.filter-bar,.btn,.header-logo,.chart-switch,.map-container,.watermark{display:none}}
    </style>
</head>
<body>

<div class="watermark">
    <img src="https://cdn-icons-png.flaticon.com/512/10428/10428984.png" alt="مركب">
</div>

<div id="loginOverlay">
    <div class="login-box">
        <h2 style="color:#2e7d32">⚓ منظومة الوسائل البحرية</h2>
        <input type="text" id="username" placeholder="اسم المستخدم">
        <input type="password" id="password" placeholder="كلمة المرور">
        <button onclick="doLogin()">دخول</button>
        <div id="loginError" class="error-msg"></div>
    </div>
</div>

<div id="mainApp" class="container" style="display:none">
    <div class="nav">
        <button onclick="showPage('main')">⚓ الأسطول البحري</button>
        <button onclick="showPage('maint')">🛠️ سجل الصيانة</button>
        <button onclick="showPage('eff')">📈 جاهزية الأسطول</button>
        <button onclick="showPage('support')">📞 الدعم الفني</button>
        <button onclick="showPage('track')">📊 تتبع المستخدمين</button>
        <button onclick="showPage('map')">🗺️ خريطة التتبع</button>
        <button onclick="showPage('users')">👥 المستخدمين</button>
        <button onclick="logout()">🚪 خروج</button>
    </div>

    <div id="inputArea" class="input-grid">
        <input type="text" id="iName" placeholder="اسم المركب">
        <input type="text" id="iNum" placeholder="الرقم">
        <input type="number" id="iLen" placeholder="الطول (م)">
        <select id="iReg" onchange="updateZones()">
            <option value="">الإقليم</option>
            <option value="الشمال">الشمال</option>
            <option value="الساحل">الساحل</option>
            <option value="الوسط">الوسط</option>
            <option value="الجنوب">الجنوب</option>
            <option value="وحدة الصيانة والإسناد البحري تونس">وحدة الصيانة تونس</option>
            <option value="وحدة الصيانة والإسناد البحري المنستير">وحدة الصيانة المنستير</option>
            <option value="وحدة الصيانة والإسناد البحري صفاقس">وحدة الصيانة صفاقس</option>
            <option value="وحدة الصيانة والإسناد البحري جرجيس">وحدة الصيانة جرجيس</option>
            <option value="المجمع الأمني بقبيبة">المجمع الأمني بقبيبة</option>
        </select>
        <select id="iZone"><option value="">المنطقة</option></select>
        <input type="text" id="iPort" placeholder="الميناء">
        <input type="text" id="iSupp" placeholder="مكان التعزيز">
        <select id="iStat"><option value="صالح">صالح</option><option value="معطب">معطب</option><option value="صيانة">صيانة</option></select>
        <input type="text" id="iBreak" placeholder="نوع العطب">
        <input type="date" id="iDate">
        <input type="date" id="iEnd">
        <input type="text" id="iRef" placeholder="المرجع">
        <button class="btn btn-green" onclick="addItem()">حفظ</button>
    </div>

    <div id="pageMain">
        <div class="filter-bar">
            <div class="search-input"><input type="text" id="searchMain" placeholder="بحث" onkeyup="renderMain()"></div>
            <label>الفئة:</label><select id="fCatMain" onchange="renderMain()"><option value="
