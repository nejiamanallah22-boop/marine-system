<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام إدارة الأسطول البحري</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* ========== CSS العام الموحد لجميع صفحات التطبيق ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        :root {
            --primary-navy: #0a2b4e;
            --secondary-deep: #0f3b6f;
            --accent-gold: #d4af37;
            --success-emerald: #2ecc71;
            --danger-crimson: #e74c3c;
            --warning-amber: #f39c12;
            --light-mist: #f0f4f8;
            --dark-slate: #1e2a47;
            --gray-bg: #f8fafc;
            --card-shadow: 0 12px 28px rgba(0, 0, 0, 0.08);
            --transition: all 0.3s ease;
        }

        body {
            background: var(--light-mist);
            color: #1f2a3e;
            transition: var(--transition);
        }

        body.dark-mode {
            background: #121826;
            color: #eef2ff;
        }

        /* ========== الهيدر الموحد ========== */
        .app-header {
            background: linear-gradient(125deg, var(--primary-navy) 0%, #0b2b44 100%);
            color: white;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        .logo-area h2 {
            font-size: 1.4rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-area i {
            color: var(--accent-gold);
        }

        .nav-links {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .nav-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            padding: 8px 18px;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-btn:hover, .nav-btn.active {
            background: var(--accent-gold);
            color: var(--primary-navy);
        }

        .dark-toggle {
            background: rgba(255,255,255,0.15);
            border: none;
            padding: 8px 16px;
            border-radius: 30px;
            color: white;
            cursor: pointer;
        }

        /* ========== الحاوية الرئيسية ========== */
        .main-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 25px;
            min-height: calc(100vh - 160px);
        }

        /* ========== بطاقات الإحصائيات ========== */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            box-shadow: var(--card-shadow);
            transition: transform 0.2s;
            border-bottom: 4px solid var(--primary-navy);
        }

        body.dark-mode .stat-card {
            background: #1e293b;
        }

        .stat-card:hover {
            transform: translateY(-3px);
        }

        .stat-number {
            font-size: 2.2rem;
            font-weight: 800;
        }

        /* ========== نماذج وبطاقات ========== */
        .form-card {
            background: white;
            border-radius: 24px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: var(--card-shadow);
        }

        body.dark-mode .form-card,
        body.dark-mode .table-card {
            background: #1e293b;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-group label {
            font-weight: 600;
            font-size: 0.85rem;
        }

        input, select {
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 14px;
            font-size: 0.95rem;
            background: white;
        }

        body.dark-mode input, body.dark-mode select {
            background: #0f172a;
            border-color: #475569;
            color: white;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 40px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: var(--success-emerald);
            color: white;
        }

        .btn-outline {
            background: transparent;
            border: 2px solid var(--primary-navy);
            color: var(--primary-navy);
        }

        body.dark-mode .btn-outline {
            border-color: var(--accent-gold);
            color: var(--accent-gold);
        }

        /* ========== الجدول ========== */
        .table-card {
            background: white;
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 25px;
            box-shadow: var(--card-shadow);
        }

        .table-wrapper {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: var(--secondary-deep);
            color: white;
            padding: 14px;
            text-align: right;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #e2e8f0;
        }

        body.dark-mode td {
            border-bottom-color: #334155;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 14px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 700;
        }

        .status-صالح { background: #d4edda; color: #155724; }
        .status-معطب { background: #f8d7da; color: #721c24; }
        .status-صيانة { background: #fff3cd; color: #856404; }

        body.dark-mode .status-صالح { background: #064e3b; color: #86efac; }
        body.dark-mode .status-معطب { background: #7f1a1a; color: #fecaca; }
        body.dark-mode .status-صيانة { background: #78350f; color: #fed7aa; }

        /* ========== الرسوم البيانية ========== */
        .charts-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 25px;
            margin-top: 20px;
        }

        .chart-box {
            background: white;
            border-radius: 24px;
            padding: 15px;
            box-shadow: var(--card-shadow);
        }

        body.dark-mode .chart-box {
            background: #1e293b;
        }

        /* ========== الفوتر الموحد ========== */
        .app-footer {
            background: var(--primary-navy);
            color: white;
            text-align: center;
            padding: 20px;
            margin-top: 40px;
        }

        @media (max-width: 768px) {
            .app-header {
                flex-direction: column;
                text-align: center;
            }
            .main-container {
                padding: 15px;
            }
        }
    </style>
</head>
<body>

    <!-- ========== الهيدر الموحد (يظهر في كل الصفحات) ========== -->
    <header class="app-header">
        <div class="logo-area">
            <h2><i class="fas fa-ship"></i> البحرية المحترفة | نظام الأسطول</h2>
        </div>
        <div class="nav-links">
            <button class="nav-btn active" onclick="showPage('dashboard')"><i class="fas fa-tachometer-alt"></i> الرئيسية</button>
            <button class="nav-btn" onclick="showPage('fleet')"><i class="fas fa-anchor"></i> إدارة الأسطول</button>
            <button class="nav-btn" onclick="showPage('reports')"><i class="fas fa-chart-line"></i> التقارير</button>
            <button class="nav-btn" onclick="showPage('settings')"><i class="fas fa-cog"></i> الإعدادات</button>
        </div>
        <button class="dark-toggle" onclick="toggleDarkMode()"><i class="fas fa-moon"></i> الوضع الداكن</button>
    </header>

    <!-- ========== المحتوى الديناميكي ========== -->
    <div class="main-container" id="appContent">
        <!-- سيتم تحميل المحتوى هنا ديناميكياً -->
    </div>

    <!-- ========== الفوتر الموحد ========== -->
    <footer class="app-footer">
        <p><i class="fas fa-code"></i> تطوير: أمان الله ناجي | نظام متكامل لإدارة الأسطول البحري © 2025</p>
    </footer>

    <script>
        // ========== البيانات والتخزين ==========
        let fleetData = [];

        function loadData() {
            const stored = localStorage.getItem("ProFleetMarine");
            if(stored) {
                fleetData = JSON.parse(stored);
            } else {
                fleetData = [
                    { id: 101, name: "الصقر البحري", num: "F-110", reg: "الشمال", stat: "صالح", date: "2025-02-10" },
                    { id: 102, name: "الموج الأزرق", num: "W-204", reg: "الساحل", stat: "معطب", date: "2025-03-01" },
                    { id: 103, name: "نسر اليم", num: "E-089", reg: "الجنوب", stat: "صيانة", date: "2025-03-15" },
                    { id: 104, name: "درع البحر", num: "S-552", reg: "الوسط", stat: "صالح", date: "" },
                    { id: 105, name: "رمح المحيط", num: "O-771", reg: "الشمال", stat: "صالح", date: "2025-01-22" }
                ];
                saveData();
            }
            renderCurrentPage();
        }

        function saveData() {
            localStorage.setItem("ProFleetMarine", JSON.stringify(fleetData));
        }

        // ========== إدارة الصفحات ==========
        let currentPage = 'dashboard';
        let statusChart, regionChart;

        function showPage(page) {
            currentPage = page;
            // تحديث حالة الأزرار
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            event.target.closest('.nav-btn').classList.add('active');
            renderCurrentPage();
        }

        function renderCurrentPage() {
            const container = document.getElementById('appContent');
            if(currentPage === 'dashboard') {
                container.innerHTML = renderDashboard();
                initDashboardCharts();
            } else if(currentPage === 'fleet') {
                container.innerHTML = renderFleetManagement();
                attachFleetEvents();
            } else if(currentPage === 'reports') {
                container.innerHTML = renderReports();
                initReportCharts();
            } else if(currentPage === 'settings') {
                container.innerHTML = renderSettings();
            }
        }

        // ========== صفحة لوحة التحكم ==========
        function renderDashboard() {
            const total = fleetData.length;
            const ok = fleetData.filter(v => v.stat === 'صالح').length;
            const broken = fleetData.filter(v => v.stat === 'معطب').length;
            const maintenance = fleetData.filter(v => v.stat === 'صيانة').length;
            const readiness = total ? Math.round((ok/total)*100) : 0;

            return `
                <div class="stats-grid">
                    <div class="stat-card"><h3><i class="fas fa-ship"></i> الإجمالي</h3><div class="stat-number">${total}</div></div>
                    <div class="stat-card"><h3><i class="fas fa-check-circle"></i> صالح</h3><div class="stat-number" style="color: var(--success-emerald);">${ok}</div></div>
                    <div class="stat-card"><h3><i class="fas fa-exclamation-triangle"></i> معطب</h3><div class="stat-number" style="color: var(--danger-crimson);">${broken}</div></div>
                    <div class="stat-card"><h3><i class="fas fa-chart-line"></i> الجاهزية</h3><div class="stat-number" style="color: var(--warning-amber);">${readiness}%</div></div>
                </div>
                <div class="charts-row">
                    <div class="chart-box"><canvas id="statusChart"></canvas></div>
                    <div class="chart-box"><canvas id="regionChart"></canvas></div>
                </div>
                <div class="table-card">
                    <h3 style="margin-bottom: 15px;"><i class="fas fa-list"></i> آخر 5 وسائل مسجلة</h3>
                    <div class="table-wrapper">
                        <table>
                            <thead><tr><th>الاسم</th><th>الحالة</th><th>الإقليم</th></tr></thead>
                            <tbody>
                                ${fleetData.slice(0,5).map(v => `
                                    <tr><td>${v.name}</td><td><span class="status-badge status-${v.stat}">${v.stat}</span></td><td>${v.reg}</td></tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
        }

        function initDashboardCharts() {
            const statusCounts = [
                fleetData.filter(v => v.stat === 'صالح').length,
                fleetData.filter(v => v.stat === 'معطب').length,
                fleetData.filter(v => v.stat === 'صيانة').length
            ];
            const regions = ['الشمال', 'الساحل', 'الوسط', 'الجنوب'];
            const regionCounts = regions.map(r => fleetData.filter(v => v.reg === r).length);

            const ctxStatus = document.getElementById('statusChart')?.getContext('2d');
            const ctxRegion = document.getElementById('regionChart')?.getContext('2d');
            if(ctxStatus) {
                if(statusChart) statusChart.destroy();
                statusChart = new Chart(ctxStatus, {
                    type: 'doughnut',
                    data: { labels: ['صالح', 'معطب', 'صيانة'], datasets: [{ data: statusCounts, backgroundColor: ['#2ecc71', '#e74c3c', '#f39c12'] }] }
                });
            }
            if(ctxRegion) {
                if(regionChart) regionChart.destroy();
                regionChart = new Chart(ctxRegion, {
                    type: 'bar',
                    data: { labels: regions, datasets: [{ label: 'عدد المراكب', data: regionCounts, backgroundColor: '#0f3b6f' }] }
                });
            }
        }

        // ========== صفحة إدارة الأسطول ==========
        function renderFleetManagement() {
            return `
                <div class="form-card">
                    <h3><i class="fas fa-plus"></i> إضافة وسيلة بحرية جديدة</h3>
                    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(180px,1fr)); gap: 15px; margin-top: 20px;">
                        <div class="input-group"><label>اسم المركب</label><input type="text" id="vName" placeholder="اسم المركب"></div>
                        <div class="input-group"><label>الرقم</label><input type="text" id="vNum" placeholder="الرقم التسلسلي"></div>
                        <div class="input-group"><label>الإقليم</label><select id="vReg"><option value="">اختر</option><option>الشمال</option><option>الساحل</option><option>الوسط</option><option>الجنوب</option></select></div>
                        <div class="input-group"><label>الحالة</label><select id="vStat"><option>صالح</option><option>معطب</option><option>صيانة</option></select></div>
                        <div class="input-group"><label>تاريخ العطب</label><input type="date" id="vDate"></div>
                        <button class="btn btn-primary" onclick="addVessel()"><i class="fas fa-save"></i> حفظ</button>
                    </div>
                </div>
                <div class="table-card">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 15px; flex-wrap: wrap; gap: 10px;">
                        <input type="text" id="searchFleet" placeholder="🔍 بحث..." style="padding: 10px; border-radius: 30px; width: 250px;" onkeyup="filterFleetTable()">
                        <button class="btn btn-outline" onclick="exportToExcel()"><i class="fas fa-file-excel"></i> تصدير Excel</button>
                    </div>
                    <div class="table-wrapper">
                        <table id="fleetTable">
                            <thead><tr><th>الاسم</th><th>الرقم</th><th>الإقليم</th><th>الحالة</th><th>التاريخ</th><th></th></tr></thead>
                            <tbody id="fleetTableBody"></tbody>
                        </table>
                    </div>
                </div>
            `;
        }

        function attachFleetEvents() {
            renderFleetTable();
        }

        function renderFleetTable() {
            const tbody = document.getElementById('fleetTableBody');
            if(!tbody) return;
            tbody.innerHTML = fleetData.map(v => `
                <tr>
                    <td><strong>${v.name}</strong></td>
                    <td>${v.num}</td>
                    <td>${v.reg}</td>
                    <td><span class="status-badge status-${v.stat}">${v.stat}</span></td>
                    <td>${v.date || '-'}</td>
                    <td><button class="btn" style="background: none; color: red;" onclick="deleteVessel(${v.id})"><i class="fas fa-trash"></i></button></td>
                </tr>
            `).join('');
        }

        function filterFleetTable() {
            const search = document.getElementById('searchFleet')?.value.toLowerCase() || '';
            const tbody = document.getElementById('fleetTableBody');
            if(tbody) {
                const filtered = fleetData.filter(v => v.name.toLowerCase().includes(search) || v.num.toLowerCase().includes(search));
                tbody.innerHTML = filtered.map(v => `
                    <tr><td><strong>${v.name}</strong></td><td>${v.num}</td><td>${v.reg}</td><td><span class="status-badge status-${v.stat}">${v.stat}</span></td><td>${v.date || '-'}</td>
                    <td><button style="background:none;color:red;" onclick="deleteVessel(${v.id})"><i class="fas fa-trash"></i></button></td></tr>
                `).join('');
            }
        }

        function addVessel() {
            const name = document.getElementById('vName')?.value;
            const num = document.getElementById('vNum')?.value;
            const reg = document.getElementById('vReg')?.value;
            const stat = document.getElementById('vStat')?.value;
            const date = document.getElementById('vDate')?.value;
            if(!name || !reg) { alert("يرجى ملء البيانات الأساسية"); return; }
            fleetData.unshift({ id: Date.now(), name, num, reg, stat, date });
            saveData();
            renderCurrentPage();
        }

        function deleteVessel(id) {
            if(confirm("حذف الوسيلة؟")) {
                fleetData = fleetData.filter(v => v.id !== id);
                saveData();
                renderCurrentPage();
            }
        }

        // ========== صفحة التقارير ==========
        function renderReports() {
            const total = fleetData.length;
            const ok = fleetData.filter(v => v.stat === 'صالح').length;
            const broken = fleetData.filter(v => v.stat === 'معطب').length;
            const maint = fleetData.filter(v => v.stat === 'صيانة').length;
            return `
                <div class="stats-grid">
                    <div class="stat-card"><h3>إجمالي الأسطول</h3><div class="stat-number">${total}</div></div>
                    <div class="stat-card"><h3>الجاهزية التشغيلية</h3><div class="stat-number">${total ? Math.round((ok/total)*100) : 0}%</div></div>
                </div>
                <div class="charts-row">
                    <div class="chart-box"><canvas id="reportStatusChart"></canvas></div>
                    <div class="chart-box"><canvas id="reportRegionChart"></canvas></div>
                </div>
                <div class="table-card">
                    <h3>تقرير تفصيلي حسب الحالة</h3>
                    <div class="table-wrapper">
                        <table>
                            <thead><tr><th>الحالة</th><th>العدد</th><th>النسبة</th></tr></thead>
                            <tbody>
                                <tr><td>صالح</td><td>${ok}</td><td>${total ? Math.round((ok/total)*100) : 0}%</td></tr>
                                <tr><td>معطب</td><td>${broken}</td><td>${total ? Math.round((broken/total)*100) : 0}%</td></tr>
                                <tr><td>صيانة</td><td>${maint}</td><td>${total ? Math.round((maint/total)*100) : 0}%</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
        }

        function initReportCharts() {
            const statusCounts = [
                fleetData.filter(v => v.stat === 'صالح').length,
                fleetData.filter(v => v.stat === 'معطب').length,
                fleetData.filter(v => v.stat === 'صيانة').length
            ];
            const regions = ['الشمال', 'الساحل', 'الوسط', 'الجنوب'];
            const regionCounts = regions.map(r => fleetData.filter(v => v.reg === r).length);
            const ctxStatus = document.getElementById('reportStatusChart')?.getContext('2d');
            const ctxRegion = document.getElementById('reportRegionChart')?.getContext('2d');
            if(ctxStatus) new Chart(ctxStatus, { type: 'pie', data: { labels: ['صالح', 'معطب', 'صيانة'], datasets: [{ data: statusCounts, backgroundColor: ['#2ecc71', '#e74c3c', '#f39c12'] }] } });
            if(ctxRegion) new Chart(ctxRegion, { type: 'bar', data: { labels: regions, datasets: [{ label: 'العدد', data: regionCounts, backgroundColor: '#0f3b6f' }] } });
        }

        // ========== صفحة الإعدادات ==========
        function renderSettings() {
            return `
                <div class="form-card">
                    <h3><i class="fas fa-database"></i> إدارة البيانات</h3>
                    <div style="display: flex; gap: 15px; margin-top: 20px; flex-wrap: wrap;">
                        <button class="btn btn-outline" onclick="exportToExcel()"><i class="fas fa-download"></i> تصدير البيانات</button>
                        <button class="btn" style="background: var(--danger-crimson); color: white;" onclick="clearAllData()"><i class="fas fa-trash"></i> مسح جميع البيانات</button>
                    </div>
                    <hr style="margin: 20px 0;">
                    <h4><i class="fas fa-info-circle"></i> معلومات النظام</h4>
                    <p>الإصدار: 2.0 | آخر تحديث: أبريل 2026</p>
                    <p>إجمالي الوسائل المسجلة: ${fleetData.length}</p>
                </div>
            `;
        }

        function clearAllData() {
            if(confirm("تحذير: سيتم حذف جميع البيانات نهائياً!")) {
                fleetData = [];
                saveData();
                renderCurrentPage();
            }
        }

        function exportToExcel() {
            if(!fleetData.length) { alert("لا توجد بيانات"); return; }
            const ws = XLSX.utils.json_to_sheet(fleetData.map(v => ({ "الاسم": v.name, "الرقم": v.num, "الإقليم": v.reg, "الحالة": v.stat, "التاريخ": v.date || "" })));
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "الأسطول");
            XLSX.writeFile(wb, `الأسطول_${new Date().toISOString().slice(0,10)}.xlsx`);
        }

        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('marineDarkMode', document.body.classList.contains('dark-mode'));
        }

        function loadDarkMode() {
            if(localStorage.getItem('marineDarkMode') === 'true') document.body.classList.add('dark-mode');
        }

        // جعل الدوال عامة
        window.addVessel = addVessel;
        window.deleteVessel = deleteVessel;
        window.exportToExcel = exportToExcel;
