<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منظومة الوسائل البحرية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #0f3460, #16213e);
            min-height: 100vh;
            direction: rtl;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 15px;
        }
        .header {
            background: #0f3460;
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .role-badge {
            background: #ffd700;
            color: #0f3460;
            padding: 5px 15px;
            border-radius: 20px;
        }
        .nav {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .nav-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: #e9ecef;
            font-weight: bold;
        }
        .nav-btn.active {
            background: #0f3460;
            color: white;
        }
        .input-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .input-grid input, .input-grid select {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .scrollable-table {
            overflow-x: auto;
            max-height: 500px;
            overflow-y: auto;
            border: 1px solid #ddd;
            border-radius: 10px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 10px;
            text-align: center;
            border-bottom: 1px solid #ddd;
        }
        th {
            background: #0f3460;
            color: white;
            position: sticky;
            top: 0;
        }
        .btn {
            padding: 8px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-green { background: #28a745; color: white; }
        .btn-orange { background: #fd7e14; color: white; }
        .btn-red { background: #dc3545; color: white; }
        .btn-blue { background: #0f3460; color: white; }
        .btn-sm { padding: 5px 10px; font-size: 12px; }
        .status-صالح { color: green; font-weight: bold; }
        .status-معطب { color: red; font-weight: bold; }
        .status-صيانة { color: orange; font-weight: bold; }
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #28a745;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            z-index: 1000;
            animation: fadeOut 3s ease forwards;
        }
        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }
        .hidden { display: none !important; }
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 20px;
            width: 350px;
            text-align: center;
            margin: 100px auto;
        }
        .login-box input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        .login-box button {
            width: 100%;
            padding: 12px;
            background: #0f3460;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        #loginOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0f3460, #16213e);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-box">
        <i class="fas fa-ship" style="font-size: 50px; color: #0f3460;"></i>
        <h2>⚓ منظومة الوسائل البحرية</h2>
        <input type="text" id="username" placeholder="اسم المستخدم">
        <input type="password" id="password" placeholder="كلمة المرور">
        <button onclick="doLogin()">دخول</button>
        <div id="loginError" style="color: red; margin-top: 10px; display: none;"></div>
    </div>
</div>

<div id="mainApp" class="container" style="display: none;">
    <div class="header">
        <div>⚓ منظومة متابعة الوسائل البحرية<br><small>Développeur: أمان الله ناجي</small></div>
        <div><span id="userRoleDisplay" class="role-badge"></span> <button class="btn btn-red" onclick="logout()" style="margin-right: 10px;">خروج</button></div>
    </div>

    <div class="nav">
        <button class="nav-btn active" onclick="showPage('main')">السجل العام</button>
        <button class="nav-btn" onclick="showPage('maint')">سجل الصيانة</button>
    </div>

    <div id="inputArea" class="input-grid">
        <input type="text" id="iName" placeholder="اسم المركب">
        <input type="text" id="iNum" placeholder="الرقم">
        <input type="number" id="iLen" placeholder="الطول (م)">
        <select id="iReg"><option value="">الإقليم</option><option value="الشمال">الشمال</option><option value="الساحل">الساحل</option><option value="الوسط">الوسط</option><option value="الجنوب">الجنوب</option></select>
        <select id="iZone"><option value="">المنطقة</option></select>
        <input type="text" id="iPort" placeholder="الميناء">
        <select id="iStat"><option value="صالح">صالح</option><option value="معطب">معطب</option><option value="صيانة">صيانة</option></select>
        <input type="text" id="iBreak" placeholder="نوع العطب">
        <input type="date" id="iDate">
        <button class="btn btn-green" onclick="addItem()">حفظ</button>
    </div>

    <div id="pageMain">
        <div class="scrollable-table">
            <table>
                <thead><tr><th>الاسم</th><th>الرقم</th><th>الطول</th><th>الفئة</th><th>الإقليم</th><th>المنطقة</th><th>الميناء</th><th>الحالة</th><th>العطب</th><th>إجراء</th></tr></thead>
                <tbody id="mainBody"></tbody>
            </table>
        </div>
    </div>

    <div id="pageMaint" class="hidden">
        <div class="scrollable-table">
            <table>
                <thead><tr><th>الاسم</th><th>الإقليم</th><th>المنطقة</th><th>الحالة</th><th>العطب</th><th>تاريخ العطب</th></tr></thead>
                <tbody id="maintBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // بيانات التخزين
    let vessels = JSON.parse(localStorage.getItem('vessels')) || [
        { id: 1, name: 'البروق 1', number: 'B001', length: 11, region: 'الشمال', zone: 'تونس', port: 'تونس', status: 'صالح', breakdown_type: '', breakdown_date: '', category: 'البروق' },
        { id: 2, name: 'صقر 1', number: 'S001', length: 10, region: 'الساحل', zone: 'سوسة', port: 'سوسة', status: 'صالح', breakdown_type: '', breakdown_date: '', category: 'صقور' },
        { id: 3, name: 'خافرة 1', number: 'K001', length: 20, region: 'الوسط', zone: 'صفاقس', port: 'صفاقس', status: 'معطب', breakdown_type: 'عطل محرك', breakdown_date: '2025-03-10', category: 'خوافر' }
    ];
    let nextId = vessels.length > 0 ? Math.max(...vessels.map(v => v.id)) + 1 : 1;
    let currentUser = null;
    let editingId = null;

    function saveVessels() { localStorage.setItem('vessels', JSON.stringify(vessels)); }
    function showToast(msg, isError) {
        let toast = document.createElement('div');
        toast.className = 'toast';
        toast.style.background = isError ? '#dc3545' : '#28a745';
        toast.innerHTML = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    function getCategory(len) {
        let n = parseFloat(len);
        if (n === 11) return "البروق";
        if (n >= 8 && n <= 12) return "صقور";
        if (n > 12 && n <= 25) return "خوافر";
        if (n >= 30) return "طوافات";
        return "زوارق مزدوجة";
    }
    function formatDate(d) { if (!d) return '-'; try { let date = new Date(d); return `${date.getDate()}/${date.getMonth()+1}/${date.getFullYear()}`; } catch(e) { return d; } }
    function canEdit() { return currentUser && currentUser.role === 'مسؤول'; }

    function renderMain() {
        let html = '';
        vessels.forEach(v => {
            html += `<tr>
                <td><b>${v.name}</b>${editingId === v.id ? ' <span style="color:orange">(جاري التعديل)</span>' : ''}</td>
                <td>${v.number || '-'}</td>
                <td>${v.length || '-'}</td>
                <td>${v.category || '-'}</td>
                <td>${v.region || '-'}</td>
                <td>${v.zone || '-'}</td>
                <td>${v.port || '-'}</td>
                <td class="status-${v.status}">${v.status}</td>
                <td>${v.breakdown_type || '-'}</td>
                <td>
                    <button class="btn-sm btn-orange" onclick="editItem(${v.id})">تعديل</button>
                    <button class="btn-sm btn-red" onclick="delItem(${v.id})">حذف</button>
                </td>
            </tr>`;
        });
        document.getElementById('mainBody').innerHTML = html || '<tr><td colspan="10">لا توجد بيانات</td></tr>';
    }

    function renderMaint() {
        let filtered = vessels.filter(v => v.status === 'معطب' || v.status === 'صيانة');
        let html = '';
        filtered.forEach(v => {
            html += `<tr>
                <td><b>${v.name}</b></td>
                <td>${v.region || '-'}</td>
                <td>${v.zone || '-'}</td>
                <td class="status-${v.status}">${v.status}</td>
                <td>${v.breakdown_type || '-'}</td>
                <td>${formatDate(v.breakdown_date)}</td>
            </tr>`;
        });
        document.getElementById('maintBody').innerHTML = html || '<tr><td colspan="6">لا توجد مراكب معطوبة</td></tr>';
    }

    function addItem() {
        const name = document.getElementById('iName').value.trim();
        if (!name) return showToast('الاسم مطلوب', true);
        const stat = document.getElementById('iStat').value;
        const fDate = document.getElementById('iDate').value;
        if ((stat === 'معطب' || stat === 'صيانة') && !fDate) return showToast('تاريخ العطب إلزامي', true);

        const vessel = {
            id: editingId || nextId++,
            name: name,
            number: document.getElementById('iNum').value,
            length: parseFloat(document.getElementById('iLen').value) || 0,
            region: document.getElementById('iReg').value,
            zone: document.getElementById('iZone').value,
            port: document.getElementById('iPort').value,
            status: stat,
            breakdown_type: document.getElementById('iBreak').value,
            breakdown_date: fDate,
            category: getCategory(document.getElementById('iLen').value)
        };

        if (editingId) {
            const index = vessels.findIndex(v => v.id === editingId);
            if (index !== -1) vessels[index] = vessel;
            editingId = null;
            showToast('✅ تم التحديث');
        } else {
            vessels.push(vessel);
            showToast('✅ تم الإضافة');
        }
        saveVessels();
        clearForm();
        renderMain();
        renderMaint();
    }

    function editItem(id) {
        let item = vessels.find(v => v.id === id);
        if (item) {
            editingId = id;
            document.getElementById('iName').value = item.name;
            document.getElementById('iNum').value = item.number;
            document.getElementById('iLen').value = item.length;
            document.getElementById('iReg').value = item.region;
            document.getElementById('iZone').value = item.zone;
            document.getElementById('iPort').value = item.port;
            document.getElementById('iStat').value = item.status;
            document.getElementById('iBreak').value = item.breakdown_type;
            document.getElementById('iDate').value = item.breakdown_date;
            window.scrollTo(0, 0);
            showToast('✏️ قم بالتعديل ثم حفظ');
            renderMain();
        }
    }

    function delItem(id) {
        if (confirm('هل أنت متأكد من الحذف؟')) {
            vessels = vessels.filter(v => v.id !== id);
            saveVessels();
            renderMain();
            renderMaint();
            showToast('✅ تم الحذف');
        }
    }

    function clearForm() {
        editingId = null;
        document.getElementById('iName').value = '';
        document.getElementById('iNum').value = '';
        document.getElementById('iLen').value = '';
        document.getElementById('iReg').value = '';
        document.getElementById('iZone').innerHTML = '<option value="">المنطقة</option>';
        document.getElementById('iPort').value = '';
        document.getElementById('iStat').value = 'صالح';
        document.getElementById('iBreak').value = '';
        document.getElementById('iDate').value = '';
        renderMain();
    }

    function doLogin() {
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value.trim();
        if (username === 'admin' && password === '1234') {
            currentUser = { username: 'admin', role: 'مسؤول' };
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            document.getElementById('userRoleDisplay').innerHTML = `${username} | مسؤول`;
            renderMain();
            renderMaint();
        } else {
            document.getElementById('loginError').style.display = 'block';
            document.getElementById('loginError').innerHTML = 'بيانات الدخول غير صحيحة';
        }
    }

    function logout() {
        currentUser = null;
        editingId = null;
        document.getElementById('loginOverlay').style.display = 'flex';
        document.getElementById('mainApp').style.display = 'none';
        document.getElementById('username').value = '';
        document.getElementById('password').value = '';
        showToast('تم تسجيل الخروج');
    }

    function showPage(page) {
        document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
        document.getElementById('pageMain').classList.add('hidden');
        document.getElementById('pageMaint').classList.add('hidden');
        if (page === 'main') document.getElementById('pageMain').classList.remove('hidden');
        else document.getElementById('pageMaint').classList.remove('hidden');
    }

    window.doLogin = doLogin;
    window.logout = logout;
    window.showPage = showPage;
    window.addItem = addItem;
    window.editItem = editItem;
    window.delItem = delItem;
    window.clearForm = clearForm;
</script>
</body>
</html>
